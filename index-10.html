<style>
:root{
  --bg:#07090d; --card:#0d1117; --panel:#111827;
  --border:#1e2d3d; --gold:#D4A843; --goldL:#f0c96a;
  --text:#e8eaf0; --dimL:#8892a4; --dim:#4a5568;
  --green:#06D6A0; --blue:#58A6FF; --red:#E63946;
  --purple:#CE93D8; --orange:#FF9F1C;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; width:100%;
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden; position:fixed;
  -webkit-text-size-adjust:100%;
}

/* HEADER */
#hdr{
  background:linear-gradient(135deg,#07090d,#0d1420);
  border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,0) 14px 0;
  flex-shrink:0;
}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0 8px;}
.hdr-brand .title{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:.05em;}
.hdr-brand .sub{font-size:10px;color:var(--dimL);letter-spacing:.1em;text-transform:uppercase;}
.hdr-brand .name{font-size:10px;color:var(--gold);font-weight:700;margin-top:1px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
#clk{font-size:20px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
#cld{font-size:10px;color:var(--dimL);}
.hdr-btns{display:flex;gap:6px;align-items:center;}
#sync-dot{width:9px;height:9px;border-radius:50%;background:#555;flex-shrink:0;}
.btn-sm{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--dimL);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold);}

/* NAV */
#nav{
  display:flex; overflow-x:auto; gap:2px;
  padding:0 10px 10px; scrollbar-width:none;
}
#nav::-webkit-scrollbar{display:none;}
.nb{
  padding:7px 13px; border-radius:20px;
  border:1px solid transparent; background:transparent;
  color:var(--dim); font-size:11px; font-weight:700;
  cursor:pointer; white-space:nowrap; font-family:inherit;
  min-height:34px; flex-shrink:0;
}
.nb.on{background:var(--gold);color:#000;border-color:var(--gold);}

/* MAIN */
#main{
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:12px 12px calc(60px + env(safe-area-inset-bottom,0));
  -webkit-overflow-scrolling:touch;
}
.pg{display:none;}
.pg.on{display:block;}

/* CARDS */
.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px; margin-bottom:12px;
}
.ct{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:10px;}

/* FORM ELEMENTS */
label{display:block;font-size:11px;color:var(--dimL);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
input,select,textarea{
  display:block; width:100%; padding:11px 13px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px;
  font-family:inherit; margin-bottom:12px; outline:none;
  -webkit-appearance:none; appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
textarea{min-height:100px;resize:vertical;line-height:1.5;}

/* BUTTONS */
.btn{
  display:block; width:100%; padding:14px;
  border-radius:10px; border:none; font-size:14px;
  font-weight:800; cursor:pointer; font-family:inherit;
  letter-spacing:.03em; margin-bottom:10px;
}
.btn.gold{background:var(--gold);color:#000;}
.btn.sec{background:var(--panel);color:var(--dimL);border:1px solid var(--border);}

/* STATUS COLORS */
.s-complete{color:var(--green);}
.s-progress{color:var(--blue);}
.s-hold{color:var(--red);}
.s-notstart{color:var(--dim);}

/* TICKER */
#ticker{
  position:fixed; bottom:0; left:0; right:0;
  height:calc(48px + env(safe-area-inset-bottom,0));
  background:linear-gradient(90deg,#07090d,#0d1420,#07090d);
  border-top:1px solid var(--border);
  overflow:hidden; z-index:100;
}
#ticker-inner{
  display:flex; align-items:center;
  height:48px; white-space:nowrap;
  animation:scroll-left 40s linear infinite;
}
@keyframes scroll-left{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}
.t-badge{
  background:var(--gold); color:#000; font-size:10px;
  font-weight:900; padding:3px 8px; border-radius:4px;
  margin-right:12px; letter-spacing:.1em; flex-shrink:0;
}
.t-item{font-size:13px;color:var(--gold);margin-right:6px;flex-shrink:0;}
.t-sep{color:var(--dim);margin:0 10px;font-size:16px;flex-shrink:0;}

/* LAYOUT */
body{display:flex;flex-direction:column;}
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.kpi-val{font-size:22px;font-weight:900;line-height:1;}
.kpi-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;}

/* PROGRESS BAR */
.pbar-wrap{height:5px;background:var(--panel);border-radius:3px;overflow:hidden;margin:4px 0;}
.pbar{height:100%;border-radius:3px;transition:width .4s;}

/* STAGE ROW */
.stage-row{
  display:flex;align-items:center;gap:10px;
  padding:11px;border-radius:8px;margin-bottom:6px;
  cursor:pointer;transition:opacity .15s;
}
.stage-row:active{opacity:.7;}

/* MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.on{display:flex;}
#modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px 16px 0 0;width:100%;max-height:80vh;
  overflow-y:auto;padding:20px 16px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0));
}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}

/* PRINT */
@media print{
  #hdr,#nav,#ticker,.no-print,#modal-overlay{display:none!important;}
  #main{padding:0!important;overflow:visible!important;}
  body{position:static!important;overflow:auto!important;height:auto!important;}
  .pg{display:none!important;}
  #pg-dr{display:block!important;}
  .card{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;}
  *{color:#000!important;}
  .gold-text{color:#b8860b!important;}
}

/* RESPONSIVE */
@media(min-width:768px){
  #app{flex-direction:row;}
  #hdr{width:200px;min-height:100vh;flex-direction:column;border-right:1px solid var(--border);border-bottom:none;}
  #nav{flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:10px 10px;}
  .nb{text-align:left;}
  #main{flex:1;}
}
</style>

<!-- VOICE FAB -->

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
var BRIDGES=[
  {id:"A",piers:["1A-ABT","1A","2A","3A","4A","5A","6A","7A","8A","9A","10A","10A-ABT"]},
  {id:"B",piers:["1B-ABT","1B","2B","3B","4B","5B","6B","7B","8B","9B","9B-ABT"]},
  {id:"C",piers:["1C-ABT","1C","2C","3C","4C","5C","6C","7C","8C","9C","10C","11C","11C-ABT"]},
  {id:"D",piers:["1D-ABT","1D","2D","3D","4D","5D","6D","7D","7D-ABT"]},
  {id:"E",piers:["1E","2E","3E","4E","5E","6E","7E","8E","9E","10E","11E","12E","13E","14E","15E","16E","17E"]},
  {id:"G",piers:["1G-ABT","1G","2G","3G","4G","5G","6G","7G","7G-ABT"]},
  {id:"K",piers:["1K-ABT","1K","2K","3K","4K","5K","5K-ABT"]},
  {id:"L",piers:["1LL-ABT","1LL","2LL","3LL","4LL","5LL","6LL","7LL","8LL","8LL-ABT"]},
  {id:"M",piers:["1ML-ABT","1MR-ABT","2ML","2MR","3ML","3MR","4ML","4MR","5ML-ABT","5MR-ABT"]},
  {id:"N",piers:["1NL-ABT","1NR-ABT","2NL","2NR","3NL","3NR","4NL","4NR","5NL","5NR"]}
];

var STAGES=[
  {id:"PRB",name:"Probing",            ar:"بروبنغ",       col:"#CE93D8",w:2},
  {id:"EXC",name:"Excavation",         ar:"حفرية",        col:"#FF9F1C",w:5},
  {id:"BLD",name:"Blinding",           ar:"بلايندنغ",     col:"#FFD166",w:3},
  {id:"FRB",name:"Foundation Rebar",   ar:"حديد أساس",    col:"#4CC9F0",w:8},
  {id:"FRC",name:"Foundation Concrete",ar:"خرسانة أساس",  col:"#7EE8FA",w:10},
  {id:"PIL",name:"Piling",             ar:"خوازيق",       col:"#58A6FF",w:18},
  {id:"STR",name:"Pier Structure",     ar:"جسم العامود",  col:"#2979FF",w:22},
  {id:"BRG",name:"Bearings",           ar:"بيرنغ",        col:"#9B5DE5",w:5},
  {id:"GRD",name:"Girder Supply",      ar:"توريد كمرات",  col:"#D4A843",w:14},
  {id:"ERE",name:"Girder Erection",    ar:"تركيب كمرات",  col:"#06D6A0",w:9},
  {id:"DEC",name:"Deck Slab",          ar:"بلاطة الجسر",  col:"#80ED99",w:4}
];

// Direct foundations (no piling)
var DIRECT=["1NL-ABT","1NR-ABT","2ML","2MR","1ML-ABT","1MR-ABT","5ML-ABT","5MR-ABT","1LL-ABT","8LL-ABT"];

// Road Widening — standalone for abutments of G,K,L,M,N
var EMB_PIERS=["1G-ABT","7G-ABT","1K-ABT","5K-ABT","1LL-ABT","8LL-ABT","1ML-ABT","1MR-ABT","5ML-ABT","5MR-ABT","1NL-ABT","1NR-ABT"];

var STATUS_LIST=["Not Started","In Progress","On Hold","Complete","Inspected"];
var SCOL={"Not Started":"#4a5568","In Progress":"#58A6FF","On Hold":"#E63946","Complete":"#06D6A0","Inspected":"#D4A843"};
var SBGC={"Not Started":"#10161e","In Progress":"#0a1929","On Hold":"#1a0a0a","Complete":"#0a1f17","Inspected":"#1a1400"};

// Storage
var PS={};
var LOGS=[];
var ISSUES=[];
var SC_ACTUALS=[];
var DR_EMAILS=[];
var ANTHROPIC_KEY="";

var CONTACTS=[];
function loadData(){
  try{PS=JSON.parse(localStorage.getItem("ic1b3_ps")||"{}");}catch(e){PS={};}
  try{LOGS=JSON.parse(localStorage.getItem("ic1b3_lg")||"[]");}catch(e){LOGS=[];}
  try{ISSUES=JSON.parse(localStorage.getItem("ic1b3_iss")||"[]");}catch(e){ISSUES=[];}
  try{SC_ACTUALS=JSON.parse(localStorage.getItem("ic1b3_sca")||"[]");}catch(e){SC_ACTUALS=[];}
  try{DR_EMAILS=JSON.parse(localStorage.getItem("ic1_dr_emails")||"[]");}catch(e){DR_EMAILS=[];}
  try{CONTACTS=JSON.parse(localStorage.getItem("ic1_contacts")||"[]");}catch(e){CONTACTS=[];}
  try{ANTHROPIC_KEY=localStorage.getItem("ic1_ak")||"";}catch(e){}
}
function persist(){
  try{localStorage.setItem("ic1b3_ps",JSON.stringify(PS));}catch(e){}
  try{localStorage.setItem("ic1b3_lg",JSON.stringify(LOGS));}catch(e){}
  try{localStorage.setItem("ic1b3_iss",JSON.stringify(ISSUES));}catch(e){}
  try{localStorage.setItem("ic1b3_sca",JSON.stringify(SC_ACTUALS));}catch(e){}
}
loadData();

// Sync
var AS_URL_KEY="ic1_as_url";
var AS_URL="";
var AS_CONNECTED=false;
var asTimer=null;
try{AS_URL=localStorage.getItem(AS_URL_KEY)||"";}catch(e){}
if(AS_URL) AS_CONNECTED=true;

// State
var curBr="A";
var curPier=null;
var deferredPrompt=null;

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function p2(n){return n<10?"0"+n:String(n);}
function td(){var d=new Date();return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());}

function gps(pier,sid){return PS[pier]&&PS[pier][sid]?PS[pier][sid]:"Not Started";}

function stageWeight(sid,isDirect){
  if(sid==="PIL"&&isDirect) return 0;
  var base=0;
  for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===sid){base=STAGES[i].w;break;}}
  if(isDirect){
    var pilW=18; var total=100;
    return Math.round(base*(total/(total-pilW))*10)/10;
  }
  return base;
}

var EMB_WEIGHT=0.5;

function overall(){
  var earned=0,totalW=0;
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i];
    for(var j=0;j<br.piers.length;j++){
      var p=br.piers[j];
      var isDr=DIRECT.indexOf(p)>-1;
      for(var k=0;k<STAGES.length;k++){
        var sid=STAGES[k].id;
        if(sid==="PIL"&&isDr) continue;
        var w=stageWeight(sid,isDr);
        totalW+=w;
        var v=gps(p,sid);
        if(v==="Complete"||v==="Inspected") earned+=w;
        else if(v==="In Progress") earned+=w*0.5;
      }
      // Road Widening weight
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=EMB_WEIGHT;
        var ev=gps(p,"EMB");
        if(ev==="Complete"||ev==="Inspected") earned+=EMB_WEIGHT;
        else if(ev==="In Progress") earned+=EMB_WEIGHT*0.5;
      }
      // Road Widening 0.5% weight per EMB pier
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=0.5;
        var rv=gps(p,"EMB");
        if(rv==="Complete"||rv==="Inspected") earned+=0.5;
        else if(rv==="In Progress") earned+=0.25;
      }
    }
  }
  var pct=totalW?parseFloat((earned/totalW*100).toFixed(2)):0;
  return{earned:Math.round(earned),totalW:Math.round(totalW),pct:pct};
}

function brPct(brId){
  var br=null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===brId){br=BRIDGES[i];break;}}
  if(!br) return 0;
  var earned=0,totalW=0;
  for(var j=0;j<br.piers.length;j++){
    var p=br.piers[j]; var isDr=DIRECT.indexOf(p)>-1;
    for(var k=0;k<STAGES.length;k++){
      var sid=STAGES[k].id;
      if(sid==="PIL"&&isDr) continue;
      var w=stageWeight(sid,isDr); totalW+=w;
      var v=gps(p,sid);
      if(v==="Complete"||v==="Inspected") earned+=w;
      else if(v==="In Progress") earned+=w*0.5;
    }
  }
  return totalW?parseFloat((earned/totalW*100).toFixed(1)):0;
}

function activP(){
  var n=0;
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i];
    for(var j=0;j<br.piers.length;j++){
      var p=br.piers[j]; var pst=PS[p]||{};
      var vals=Object.values(pst);
      if(vals.indexOf("In Progress")>-1||vals.indexOf("On Hold")>-1) n++;
    }
  }
  return n;
}

function pCol(pier){
  var any=false,allD=true,inP=false,hld=false;
  var isDr=DIRECT.indexOf(pier)>-1;
  for(var k=0;k<STAGES.length;k++){
    var sid=STAGES[k].id;
    if(sid==="PIL"&&isDr) continue;
    var v=gps(pier,sid);
    if(v==="Complete"||v==="Inspected") any=true; else allD=false;
    if(v==="In Progress") inP=true;
    if(v==="On Hold") hld=true;
  }
  // Also check EMB
  if(EMB_PIERS.indexOf(pier)>-1){
    var ev=gps(pier,"EMB");
    if(ev==="In Progress") inP=true;
    else if(ev==="Complete"){}
    else allD=false;
  }
  if(allD&&any) return"#06D6A0";
  if(inP) return"#58A6FF";
  if(any) return"#D4A843";
  if(hld) return"#E63946";
  return"#1a2233";
}

function nxt(v){
  var i=STATUS_LIST.indexOf(v);
  return STATUS_LIST[i<0?1:(i+1)%STATUS_LIST.length];
}

function flash(msg){
  var el=document.getElementById("flash-msg");
  el.textContent=msg; el.style.display="block";
  setTimeout(function(){el.style.display="none";},2200);
}

function formatDate(d){
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var dt=new Date(d+"T00:00:00");
  return days[dt.getDay()]+", "+dt.getDate()+" "+months[dt.getMonth()]+" "+dt.getFullYear();
}

function updateClock(){

  document.getElementById("clk").textContent=p2(n.getHours())+":"+p2(n.getMinutes())+":"+p2(n.getSeconds());
  document.getElementById("cld").textContent=n.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
}
setInterval(updateClock,1000); updateClock();

function buildTicker(){
  var items=[];
  items.push({t:"TOTAL "+countAllPiers()+" PIERS",c:"#D4A843"});
  items.push({t:overall().pct+"% OVERALL PROGRESS",c:"#06D6A0"});
  items.push({t:activP()+" ACTIVE PIERS",c:"#58A6FF"});
  for(var i=0;i<BRIDGES.length;i++){
    var bp=brPct(BRIDGES[i].id);
    if(bp>0) items.push({t:"BR-"+BRIDGES[i].id+": "+bp+"%",c:"#D4A843"});
  }
  // Recent logs
  for(var j=LOGS.length-1;j>=Math.max(0,LOGS.length-3);j--){
    var stgN="";
    for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===LOGS[j].stage){stgN=STAGES[s].name;break;}}
    if(LOGS[j].stage==="EMB") stgN="Road Widening";
    items.push({t:"Pier "+LOGS[j].pier+" (Br-"+LOGS[j].bridge+") "+stgN+" "+LOGS[j].status,c:"#8892a4"});
  }
  var h='<span class="t-badge">📡 INT-1</span>';
  for(var k=0;k<items.length;k++){
    if(k>0) h+='<span class="t-sep">◆</span>';
    h+='<span class="t-item" style="color:'+items[k].c+';">'+items[k].t+'</span>';
  }
  document.getElementById("ticker-inner").innerHTML=h;
}

function countAllPiers(){
  var n=0;
  for(var i=0;i<BRIDGES.length;i++) n+=BRIDGES[i].piers.length;
  return n;
}

  }

  document.getElementById("pg-tr").innerHTML=h;

function tStage(pier,sid){
  var cur=gps(pier,sid);
  var nv=nxt(cur);
  if(!PS[pier]) PS[pier]={};
  PS[pier][sid]=nv;
  var stgN="";
  for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===sid){stgN=STAGES[i].name;break;}}
  var br="";
  for(var j=0;j<BRIDGES.length;j++){
    if(BRIDGES[j].piers.indexOf(pier)>-1){br=BRIDGES[j].id;break;}
  }
  LOGS.push({id:Date.now(),date:td(),bridge:br,pier:pier,stage:sid,status:nv,notes:""});
  persist(); rTr(); buildTicker();
  flash(pier+" - "+stgN+": "+nv);
}

function tEmb(pier){
  var cur=gps(pier,"EMB");
  var nv=nxt(cur);
  if(!PS[pier]) PS[pier]={};
  PS[pier]["EMB"]=nv;
  var br="";
  for(var j=0;j<BRIDGES.length;j++){
    if(BRIDGES[j].piers.indexOf(pier)>-1){br=BRIDGES[j].id;break;}
  }
  LOGS.push({id:Date.now(),date:td(),bridge:br,pier:pier,stage:"EMB",status:nv,notes:"Road Widening"});
  persist(); rTr(); buildTicker();
  flash("Road Widening: "+nv);
}

function extractEmail(){
  var txt=document.getElementById("em-text").value.trim();
  if(!txt){flash("Please paste email text first");return;}
  var btn=document.getElementById("em-btn");
  btn.textContent="Extracting..."; btn.disabled=true;

  var prompt='You are analyzing a construction site email for IC1 Bridges project, Diriyah, Saudi Arabia.\n\n'
    +'Extract all construction activities. For each identify:\n'
    +'1. Bridge letter (A,B,C,D,E,G,K,L,M,N)\n'
    +'2. Pier name (e.g. 3E, 1A-ABT)\n'
    +'3. Stage code - one of: PRB=Probing, EXC=Excavation, BLD=Blinding, FRB=Foundation Rebar, FRC=Foundation Concrete, PIL=Piling, STR=Pier Structure, BRG=Bearings, GRD=Girder Supply, ERE=Girder Erection, DEC=Deck Slab, EMB=Road Widening\n'
    +'4. Status: Complete, In Progress, or Not Started\n\n'
    +'EMAIL:\n'+txt+'\n\n'
    +'Respond ONLY with a JSON array:\n'
    +'[{"bridge":"E","pier":"3E","stage":"EXC","status":"Complete"},{"bridge":"E","pier":"4E","stage":"BLD","status":"In Progress"}]\n'
    +'If nothing found return []. No other text.';

  if(!ANTHROPIC_KEY||ANTHROPIC_KEY.length<10){flash("Save your API key first");btn.textContent="EXTRACT WITH AI";btn.disabled=false;return;}
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":ANTHROPIC_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    btn.textContent="EXTRACT WITH AI"; btn.disabled=false;
    var txt2=data.content&&data.content[0]?data.content[0].text:"[]";
    txt2=txt2.replace(/```json|```/g,"").trim();
    var items; try{items=JSON.parse(txt2);}catch(e){items=[];}
    showExtracted(items);
  })
  .catch(function(e){
    btn.textContent="EXTRACT WITH AI"; btn.disabled=false;
    flash("Error connecting to AI");
  });
}

function confirmImport(){

// REPORT
// ═══════════════════════════════════════════════════════════════
function rRp(){
  var h='<div class="card"><div class="ct">Progress Report</div>';
  h+='<div style="font-size:12px;color:var(--dimL);margin-bottom:10px;">Generated: '+td()+'</div>';
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i]; var bp=brPct(br.id);
    var bc=bp===100?"var(--green)":bp>0?"var(--gold)":"var(--dim)";
    h+='<div style="margin-bottom:12px;padding:10px;background:var(--panel);border-radius:8px;">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px;">';
    h+='<span style="font-weight:700;color:var(--gold);">Bridge '+br.id+'</span>';
    h+='<span style="font-weight:700;color:'+bc+';">'+bp+'%</span>';
    h+='</div>';
    var totP=br.piers.length; var actP=0; var doneP=0;
    for(var pi=0;pi<br.piers.length;pi++){
      var p=br.piers[pi]; var pst=PS[p]||{};
      var vals=Object.values(pst);
      if(vals.indexOf("In Progress")>-1) actP++;
      var isDr=DIRECT.indexOf(p)>-1;
      var allDone=true;
      for(var s=0;s<STAGES.length;s++){
        if(STAGES[s].id==="PIL"&&isDr) continue;
        if(gps(p,STAGES[s].id)!=="Complete"&&gps(p,STAGES[s].id)!=="Inspected"){allDone=false;break;}
      }
      if(allDone&&vals.length>0) doneP++;
    }
    h+='<div style="font-size:11px;color:var(--dimL);">'+totP+' piers &nbsp;|&nbsp; '+actP+' active &nbsp;|&nbsp; '+doneP+' complete</div>';
    h+='</div>';
  }
  h+='</div>';

  // Active piers detail
  h+='<div class="card"><div class="ct">Active Piers Detail</div>';
  var hasAny=false;
  for(var j=0;j<BRIDGES.length;j++){
    for(var k=0;k<BRIDGES[j].piers.length;k++){
      var pier=BRIDGES[j].piers[k];
      var pst2=PS[pier]||{};
      var vals2=Object.values(pst2);
      if(vals2.indexOf("In Progress")>-1||vals2.indexOf("On Hold")>-1){
        hasAny=true;
        var inPStages=[];
        for(var s2=0;s2<STAGES.length;s2++){
          var sv=gps(pier,STAGES[s2].id);
          if(sv==="In Progress"||sv==="On Hold") inPStages.push(STAGES[s2].name+": "+sv);
        }
        if(gps(pier,"EMB")==="In Progress") inPStages.push("Road Widening: In Progress");
        h+='<div style="padding:8px 0;border-bottom:1px solid var(--border);">';
        h+='<div style="font-size:13px;font-weight:700;color:var(--gold);">Pier '+pier+'</div>';
        h+='<div style="font-size:11px;color:var(--dimL);">'+inPStages.join(" &nbsp;|&nbsp; ")+'</div>';
        h+='</div>';
      }
    }
  }
  if(!hasAny) h+='<div style="color:var(--dim);font-size:12px;">No active piers currently.</div>';
  h+='</div>';
  document.getElementById("pg-rp").innerHTML=h;
}

function rIs(){
  var h='<div class="card no-print"><div class="ct">Log Issue</div>';
  h+='<label>Date</label><input type="date" id="is-date" value="'+td()+'"/>';
  h+='<label>Bridge</label><select id="is-br">';
  for(var i=0;i<BRIDGES.length;i++) h+='<option value="'+BRIDGES[i].id+'">Bridge '+BRIDGES[i].id+'</option>';
  h+='</select>';
  h+='<label>Priority</label><select id="is-pri"><option>High</option><option selected>Medium</option><option>Low</option></select>';
  h+='<label>Description</label><textarea id="is-desc" placeholder="Describe the issue..."></textarea>';
  h+='<button class="btn gold" onclick="addIssue()">+ LOG ISSUE</button></div>';

  h+='<div class="card"><div class="ct">Issues ('+ISSUES.length+')</div>';
  if(ISSUES.length===0){
    h+='<div style="color:var(--dim);font-size:12px;padding:8px 0;">No issues logged.</div>';
  } else {
    for(var j=ISSUES.length-1;j>=0;j--){
      var iss=ISSUES[j];
      var pc=iss.priority==="High"?"var(--red)":iss.priority==="Medium"?"var(--orange)":"var(--green)";
      h+='<div style="padding:10px 0;border-bottom:1px solid var(--border);">';
      h+='<div style="display:flex;gap:8px;align-items:flex-start;">';
      h+='<div style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:'+pc+'22;color:'+pc+';white-space:nowrap;margin-top:1px;">'+iss.priority+'</div>';
      h+='<div style="flex:1;">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--gold);">Bridge '+iss.bridge+' &mdash; '+iss.date+'</div>';
      h+='<div style="font-size:12px;color:var(--dimL);margin-top:2px;">'+iss.desc+'</div>';
      h+='</div>';
      h+='<span onclick="delIssue('+j+')" style="color:var(--red);cursor:pointer;font-size:18px;padding:0 4px;">&times;</span>';
      h+='</div></div>';
    }
  }
  h+='</div>';
  document.getElementById("pg-is").innerHTML=h;
}

function addIssue(){
  var date=document.getElementById("is-date").value;
  var br=document.getElementById("is-br").value;
  var pri=document.getElementById("is-pri").value;
  var desc=document.getElementById("is-desc").value.trim();
  if(!desc){flash("Please describe the issue");return;}
  ISSUES.push({id:Date.now(),date:date,bridge:br,priority:pri,desc:desc});
  persist(); rIs(); flash("Issue logged");
}

function delIssue(i){
  ISSUES.splice(i,1); persist(); rIs();
}

// SYNC (Apps Script)
// ═══════════════════════════════════════════════════════════════
function setSyncDot(state){
  var dot=document.getElementById("sync-dot");
  if(state==="ok") dot.style.background="#06D6A0";
  else if(state==="sync") dot.style.background="#D4A843";
  else dot.style.background="#555";
}

function openSync(){
  var h='<div class="ct">Team Sync</div>';
  h+='<div style="font-size:12px;color:var(--dimL);margin-bottom:14px;line-height:1.6;">Connect to Google Apps Script to sync with your team in real time.</div>';
  h+='<label>Apps Script Web App URL</label>';
  h+='<input type="url" id="as-url-inp" placeholder="https://script.google.com/macros/s/..." value="'+AS_URL+'">';
  h+='<button class="btn gold" onclick="connectAs()">CONNECT</button>';
  if(AS_CONNECTED) h+='<button class="btn sec" onclick="disconnectAs()">DISCONNECT</button>';
  h+='<div style="font-size:10px;color:var(--dim);margin-top:8px;">Status: '+(AS_CONNECTED?'<span style="color:var(--green);">Connected</span>':'<span style="color:var(--dim);">Not connected</span>')+'</div>';
  openModal(h);
}

function connectAs(){
  var url=document.getElementById("as-url-inp").value.trim();
  if(!url||url.indexOf("script.google.com")<0){flash("Please enter a valid Apps Script URL");return;}
  AS_URL=url; AS_CONNECTED=true;
  try{localStorage.setItem(AS_URL_KEY,AS_URL);}catch(e){}
  setSyncDot("ok");
  if(asTimer) clearInterval(asTimer);
  asTimer=setInterval(pullSync,30000);
  closeModal(); flash("Connected to team sync!");
}

function disconnectAs(){
  AS_CONNECTED=false; AS_URL="";
  try{localStorage.removeItem(AS_URL_KEY);}catch(e){}
  if(asTimer) clearInterval(asTimer);
  setSyncDot(""); closeModal(); flash("Disconnected");
}

function pushSync(){
  if(!AS_CONNECTED||!AS_URL) return;
  setSyncDot("sync");
  var payload={ps:PS,logs:LOGS,issues:ISSUES,ts:Date.now()};
  fetch(AS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
  .then(function(){setSyncDot("ok");})
  .catch(function(){setSyncDot("");});
}

function pullSync(){
  if(!AS_CONNECTED||!AS_URL) return;
  setSyncDot("sync");
  var xhr=new XMLHttpRequest();
  xhr.open("GET",AS_URL+"?action=get",true);
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText);
      if(d.ps) PS=d.ps;
      if(d.logs) LOGS=d.logs;
      persist(); setSyncDot("ok");
    }catch(e){setSyncDot("");}
  };
  xhr.onerror=function(){setSyncDot("");};
  xhr.send();
}

if(AS_CONNECTED){
  setSyncDot("ok");
  asTimer=setInterval(pullSync,30000);
}

function getWeekRange(){
  var now=new Date();
  var day=now.getDay(); // 0=Sun
  var diff=now.getDate()-day+(day===0?-6:1); // Monday
  var mon=new Date(now.setDate(diff));
  var sun=new Date(mon); sun.setDate(mon.getDate()+6);
  var fmt=function(d){return d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1)+"-"+(d.getDate()<10?"0":"")+d.getDate();};
  return{start:fmt(mon),end:fmt(sun)};
}

function getMonthRange(){
  var now=new Date();
  var y=now.getFullYear(); var m=now.getMonth();
  var start=y+"-"+(m<9?"0":"")+(m+1)+"-01";
  var lastDay=new Date(y,m+1,0).getDate();
  var end=y+"-"+(m<9?"0":"")+(m+1)+"-"+lastDay;
  var mNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return{start:start,end:end,name:mNames[m]+" "+y};
}

function buildReportHeader(title, period, pct, active){

  h+='<div style="font-size:18px;font-weight:900;color:var(--gold);">INTERCHANGE 1 — BRIDGES</div>';
  h+='<div style="font-size:13px;color:var(--text);font-weight:700;margin-top:2px;">'+title+'</div>';
  h+='<div style="font-size:12px;color:var(--dimL);margin-top:5px;">'+period+'</div>';
  h+='<div style="display:flex;justify-content:center;gap:24px;margin-top:12px;padding-top:12px;border-top:1px solid #D4A84333;">';
  h+='<div><div style="font-size:9px;color:var(--dim);text-transform:uppercase;">Prepared by</div><div style="font-size:13px;font-weight:700;color:var(--gold);">Kamel Dimachkie</div><div style="font-size:9px;color:var(--dimL);">Head of Surveying</div></div>';
  h+='<div><div style="font-size:9px;color:var(--dim);text-transform:uppercase;">Overall</div><div style="font-size:22px;font-weight:900;color:var(--green);">'+pct+'%</div></div>';
  h+='<div><div style="font-size:9px;color:var(--dim);text-transform:uppercase;">Active</div><div style="font-size:22px;font-weight:900;color:var(--blue);">'+active+'</div></div>';
  h+='</div></div>';
  return h;
}

function buildBridgeSummaryTable(){
  var h='<div class="card"><div class="ct">Bridge Status Summary</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  h+='<tr style="border-bottom:2px solid var(--gold);"><th style="text-align:left;padding:6px;color:var(--gold);">Bridge</th><th style="padding:6px;color:var(--gold);text-align:center;">Piers</th><th style="padding:6px;color:var(--gold);text-align:center;">Active</th><th style="padding:6px;color:var(--gold);text-align:right;">Progress</th></tr>';
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i]; var bp=brPct(br.id);
    var bAct=0;
    for(var pi=0;pi<br.piers.length;pi++){
      var pst=PS[br.piers[pi]]||{};
      if(Object.values(pst).indexOf("In Progress")>-1) bAct++;
    }
    var bc=bp===100?"var(--green)":bp>0?"var(--gold)":"var(--dim)";
    h+='<tr style="border-bottom:1px solid var(--border);">';
    h+='<td style="padding:7px 6px;font-weight:700;color:var(--gold);">Bridge '+br.id+'</td>';
    h+='<td style="padding:7px 6px;text-align:center;color:var(--dimL);">'+br.piers.length+'</td>';
    h+='<td style="padding:7px 6px;text-align:center;color:var(--blue);">'+bAct+'</td>';
    h+='<td style="padding:7px 6px;text-align:right;font-weight:700;color:'+bc+';">'+bp+'%</td>';
    h+='</tr>';
  }
  h+='</table></div>';
  return h;
}

function buildSignature(){
  var h='<div class="card"><div style="display:flex;gap:20px;flex-wrap:wrap;">';

  h+='<div style="border-top:1px solid var(--border);padding-top:5px;font-size:12px;font-weight:700;color:var(--gold);">Kamel Dimachkie</div>';
  h+='<div style="font-size:10px;color:var(--dimL);">Head of Surveying — Khatib &amp; Alami</div></div>';

function buildEmailBody(logs){
  var body="ACTIVITIES:\n";
  if(logs.length===0){body+="No activities logged.\n";}
  else{
    for(var i=0;i<logs.length;i++){
      var stgN=""; for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===logs[i].stage){stgN=STAGES[s].name;break;}}
      if(logs[i].stage==="EMB") stgN="Road Widening";
      body+="- "+logs[i].date+" | "+logs[i].pier+" (Br-"+logs[i].bridge+"): "+stgN+" - "+logs[i].status+"\n";
    }
  }
  body+="\nBRIDGE PROGRESS:\n";
  for(var j=0;j<BRIDGES.length;j++){
    var bp=brPct(BRIDGES[j].id);
    if(bp>0) body+="Bridge "+BRIDGES[j].id+": "+bp+"%\n";
  }
  body+="\nPrepared by: Kamel Dimachkie - Head of Surveying - Khatib & Alami\nInterchange 1 — Bridges, Diriyah, Saudi Arabia";
  return body;
}

function saveContacts(){
  try{localStorage.setItem("ic1_contacts",JSON.stringify(CONTACTS));}catch(e){}
}

function buildContactPicker(reportType){
  var h='';
  // Add new contact
  h+='<div style="display:flex;gap:6px;margin-bottom:8px;">';
  h+='<input type="text" id="ct-name-'+reportType+'" placeholder="Name" style="flex:1;margin:0;">';
  h+='<input type="email" id="ct-email-'+reportType+'" placeholder="Email" style="flex:1;margin:0;">';
  h+='<button onclick="addContact(\''+reportType+'\')" style="padding:11px 12px;background:var(--gold);border:none;border-radius:8px;font-weight:700;color:#000;cursor:pointer;white-space:nowrap;font-family:inherit;">+</button>';
  h+='</div>';

  if(CONTACTS.length===0){
    h+='<div style="font-size:11px;color:var(--dim);padding:6px 0;">No contacts yet. Add names and emails above.</div>';
  } else {
    h+='<div style="font-size:10px;color:var(--dimL);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;">Select recipients:</div>';
    h+='<div style="display:flex;flex-direction:column;gap:6px;">';
    for(var i=0;i<CONTACTS.length;i++){
      var ct=CONTACTS[i];
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel);border-radius:8px;border:1px solid var(--border);">';
      h+='<input type="checkbox" id="ct-chk-'+reportType+'-'+i+'" style="width:18px;height:18px;accent-color:var(--gold);flex-shrink:0;">';
      h+='<div style="flex:1;">';
      h+='<div style="font-size:13px;font-weight:700;color:var(--text);">'+ct.name+'</div>';
      h+='<div style="font-size:11px;color:var(--dimL);">'+ct.email+'</div>';
      h+='</div>';
      h+='<span onclick="delContact('+i+',\''+reportType+'\')" style="color:var(--red);cursor:pointer;font-size:18px;padding:0 4px;">&times;</span>';
      h+='</div>';
    }
    h+='</div>';
    h+='<div style="display:flex;gap:6px;margin-top:8px;">';
    h+='<button onclick="selAllContacts(\''+reportType+'\')" style="flex:1;padding:7px;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--dimL);font-size:11px;cursor:pointer;font-family:inherit;">Select All</button>';
    h+='<button onclick="copyEmails(\''+reportType+'\')" style="flex:1;padding:7px;background:var(--panel);border:1px solid var(--gold);border-radius:6px;color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">📋 Copy All Emails</button>';
    h+='</div>';
  }
  return h;
}

function addContact(rt){
  var name=document.getElementById("ct-name-"+rt).value.trim();
  var email=document.getElementById("ct-email-"+rt).value.trim();
  if(!name||!email||email.indexOf("@")<0){flash("Enter valid name and email");return;}
  CONTACTS.push({name:name,email:email});
  saveContacts();
  flash("Contact added: "+name);
  // Refresh current report
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function delContact(i,rt){
  CONTACTS.splice(i,1); saveContacts();
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function selAllContacts(rt){
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk) chk.checked=true;
  }
}

function getSelectedContacts(rt){
  var out=[];
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk&&chk.checked) out.push(CONTACTS[i].email);
  }
  // Also include DR_EMAILS for backward compat
  for(var j=0;j<DR_EMAILS.length;j++){
    if(out.indexOf(DR_EMAILS[j])<0) out.push(DR_EMAILS[j]);
  }
  return out;
}

function copyEmails(rt){
  // Select all first
  selAllContacts(rt);
  var all=[];
  for(var i=0;i<CONTACTS.length;i++) all.push(CONTACTS[i].email);
  for(var j=0;j<DR_EMAILS.length;j++){
    if(all.indexOf(DR_EMAILS[j])<0) all.push(DR_EMAILS[j]);
  }
  if(all.length===0){flash("No contacts to copy");return;}
  var txt=all.join(", ");
  // Try modern clipboard API first
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){
      flash("Copied "+all.length+" emails to clipboard!");
    }).catch(function(){
      fallbackCopy(txt,all.length);
    });
  } else {
    fallbackCopy(txt,all.length);
  }
}

function fallbackCopy(txt,count){
  var ta=document.createElement("textarea");
  ta.value=txt;
  ta.style.position="fixed";
  ta.style.opacity="0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{
    document.execCommand("copy");
    flash("Copied "+count+" emails — paste into your mail app To: field");
  }catch(e){
    flash("Copy failed — try selecting manually");
  }
  document.body.removeChild(ta);
}
</script>
<script>
// ═══════════════════════════════════════════════════════════════
// VOICE INPUT
// ═══════════════════════════════════════════════════════════════
var voiceRec = null;
var voiceActive = false;

// Build lookup maps for voice parsing
function buildVoiceMaps(){
  // Stage keywords → stage id
  var stageMap = {
    "probing":"PRB","probe":"PRB","prb":"PRB",
    "excavation":"EXC","excavate":"EXC","digging":"EXC","exc":"EXC","dig":"EXC",
    "blinding":"BLD","blind":"BLD","bld":"BLD",
    "foundation rebar":"FRB","rebar":"FRB","reinforcement":"FRB","frb":"FRB","steel":"FRB","iron":"FRB",
    "foundation concrete":"FRC","concrete":"FRC","frc":"FRC","pouring":"FRC","pour":"FRC",
    "piling":"PIL","pile":"PIL","piles":"PIL","pil":"PIL",
    "pier structure":"STR","structure":"STR","str":"STR","column":"STR","shaft":"STR",
    "bearings":"BRG","bearing":"BRG","brg":"BRG",
    "girder supply":"GRD","girder":"GRD","grd":"GRD","beam":"GRD","beams":"GRD","supply":"GRD",
    "girder erection":"ERE","erection":"ERE","ere":"ERE","install":"ERE","placing":"ERE",
    "deck slab":"DEC","deck":"DEC","dec":"DEC","slab":"DEC",
    "road widening":"EMB","widening":"EMB","embankment":"EMB","emb":"EMB","road":"EMB"
  };
  // Status keywords
  var statusMap = {
    "complete":"Complete","completed":"Complete","done":"Complete","finish":"Complete","finished":"Complete","inspected":"Inspected",
    "in progress":"In Progress","progress":"In Progress","started":"In Progress","ongoing":"In Progress","working":"In Progress","active":"In Progress",
    "not started":"Not Started","pending":"Not Started","waiting":"Not Started",
    "on hold":"On Hold","hold":"On Hold","stopped":"On Hold","paused":"On Hold"
  };
  return {stageMap:stageMap, statusMap:statusMap};
}

function parseVoiceText(text){
  var t = text.toLowerCase().trim();
  var maps = buildVoiceMaps();
  var stageMap = maps.stageMap;
  var statusMap = maps.statusMap;

  var foundBridge = null;
  var foundPier = null;
  var foundStage = null;
  var foundStatus = null;

  // Find pier — look for patterns like "3e", "pier 3e", "3-e", "4d"
  // Also handle "pier three e" style
  var pierPattern = /pier\s*([1-9][0-9]?)\s*([a-n])|([1-9][0-9]?)\s*([a-n])\s*(abt|abutment)?/gi;
  var m;
  while((m = pierPattern.exec(t)) !== null){
    var num = m[1]||m[3];
    var letter = (m[2]||m[4]||"").toUpperCase();
    var isAbt = m[5] ? true : false;
    if(letter && ["A","B","C","D","E","G","K","L","M","N"].indexOf(letter) > -1){
      var candidate = num + letter + (isAbt ? "-ABT" : "");
      // Verify it exists
      for(var i=0;i<BRIDGES.length;i++){
        if(BRIDGES[i].piers.indexOf(candidate) > -1){
          foundPier = candidate;
          foundBridge = BRIDGES[i].id;
          break;
        }
        // Try with L/R suffix for M,N bridges
        var candL = num + letter + "L";
        var candR = num + letter + "R";
        if(BRIDGES[i].piers.indexOf(candL) > -1){ foundPier=candL; foundBridge=BRIDGES[i].id; break; }
        if(BRIDGES[i].piers.indexOf(candR) > -1){ foundPier=candR; foundBridge=BRIDGES[i].id; break; }
      }
      if(foundPier) break;
    }
  }

  // If bridge L or M, try LL/ML/MR patterns
  if(!foundPier){
    var llPat = /([1-9])\s*(ll|lr|ml|mr)/gi;
    while((m = llPat.exec(t)) !== null){
      var num2 = m[1];
      var suf = m[2].toUpperCase();
      var cand2 = num2 + suf;
      for(var j=0;j<BRIDGES.length;j++){
        if(BRIDGES[j].piers.indexOf(cand2) > -1){ foundPier=cand2; foundBridge=BRIDGES[j].id; break; }
      }
      if(foundPier) break;
    }
  }

  // Find stage — longest match first
  var stageKeys = Object.keys(stageMap).sort(function(a,b){return b.length-a.length;});
  for(var sk=0;sk<stageKeys.length;sk++){
    if(t.indexOf(stageKeys[sk]) > -1){ foundStage = stageMap[stageKeys[sk]]; break; }
  }

  // Find status — longest match first
  var statusKeys = Object.keys(statusMap).sort(function(a,b){return b.length-a.length;});
  for(var stk=0;stk<statusKeys.length;stk++){
    if(t.indexOf(statusKeys[stk]) > -1){ foundStatus = statusMap[statusKeys[stk]]; break; }
  }

  return {pier:foundPier, bridge:foundBridge, stage:foundStage, status:foundStatus};
}

function startVoice(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    flash("Voice not supported in this browser. Use Chrome on Android.");
    return;
  }

  voiceRec = new SR();
  voiceRec.lang = "en-US";
  voiceRec.continuous = false;
  voiceRec.interimResults = true;
  voiceRec.maxAlternatives = 3;

  // Show overlay
  var ov = document.getElementById("voice-overlay");
  ov.style.display = "flex";
  document.getElementById("voice-status").textContent = "Listening...";
  document.getElementById("voice-heard").textContent = "";
  document.getElementById("voice-result").textContent = "";
  document.getElementById("voice-icon").textContent = "🎤";
  voiceActive = true;

  voiceRec.onresult = function(e){
    var interim = "";
    var final2 = "";
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final2 += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById("voice-heard").textContent = final2 || interim;
    if(final2){
      document.getElementById("voice-status").textContent = "Processing...";
      document.getElementById("voice-icon").textContent = "⚙️";
      processVoice(final2);
    }
  };

  voiceRec.onerror = function(e){
    document.getElementById("voice-status").textContent = "Error: "+e.error;
    document.getElementById("voice-icon").textContent = "❌";
    setTimeout(stopVoice, 2000);
  };

  voiceRec.onend = function(){
    if(voiceActive && !document.getElementById("voice-result").textContent){
      document.getElementById("voice-status").textContent = "Tap mic to try again";
      document.getElementById("voice-icon").textContent = "🎤";
    }
  };

  voiceRec.start();
}

function processVoice(text){
  var parsed = parseVoiceText(text);
  var res = document.getElementById("voice-result");
  var icon = document.getElementById("voice-icon");
  var status = document.getElementById("voice-status");

  if(!parsed.pier){
    res.textContent = "Could not find pier. Say e.g. Pier 3E excavation complete";
    res.style.color = "var(--red)";
    icon.textContent = "❓";
    status.textContent = "Try again";
    return;
  }
  if(!parsed.stage){
    res.textContent = "Pier "+parsed.pier+" found. Say the stage (excavation, piling, rebar...)";
    res.style.color = "var(--orange)";
    icon.textContent = "❓";
    status.textContent = "Need stage";
    return;
  }

  // Default status to In Progress if not specified
  var applyStatus = parsed.status || "In Progress";

  // Apply update
  if(!PS[parsed.pier]) PS[parsed.pier] = {};
  PS[parsed.pier][parsed.stage] = applyStatus;

  // Get stage name
  var stgName = parsed.stage;
  for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===parsed.stage){stgName=STAGES[s].name;break;}}
  if(parsed.stage==="EMB") stgName="Road Widening";

  LOGS.push({id:Date.now(),date:td(),bridge:parsed.bridge,pier:parsed.pier,stage:parsed.stage,status:applyStatus,notes:"Voice input",source:"voice"});
  persist();

  // Show success
  res.textContent = "Updated: Pier "+parsed.pier+" — "+stgName+" → "+applyStatus;
  res.style.color = "var(--green)";
  icon.textContent = "✅";
  status.textContent = "Done!";

  // Navigate to pier in tracker
  curBr = parsed.bridge;
  curPier = parsed.pier;

  buildTicker();

  // Auto close after 2 seconds
  setTimeout(function(){
    stopVoice();
    rTr();
  }, 2000);
}

function stopVoice(){
  voiceActive = false;
  if(voiceRec){
    try{voiceRec.stop();}catch(e){}
    voiceRec = null;
  }
  document.getElementById("voice-overlay").style.display = "none";
}
</script>
