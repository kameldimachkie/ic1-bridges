<style>
:root{
  --bg:#07090d; --card:#0d1117; --panel:#111827;
  --border:#1e2d3d; --gold:#D4A843; --goldL:#f0c96a;
  --text:#e8eaf0; --dimL:#8892a4; --dim:#4a5568;
  --green:#06D6A0; --blue:#58A6FF; --red:#E63946;
  --purple:#CE93D8; --orange:#FF9F1C;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; width:100%;
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden; position:fixed;
  -webkit-text-size-adjust:100%;
}

/* HEADER */
#hdr{
  background:linear-gradient(135deg,#07090d,#0d1420);
  border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,0) 14px 0;
  flex-shrink:0;
}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0 8px;}
.hdr-brand .title{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:.05em;}
.hdr-brand .sub{font-size:10px;color:var(--dimL);letter-spacing:.1em;text-transform:uppercase;}
.hdr-brand .name{font-size:10px;color:var(--gold);font-weight:700;margin-top:1px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
#clk{font-size:20px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
#cld{font-size:10px;color:var(--dimL);}
.hdr-btns{display:flex;gap:6px;align-items:center;}
#sync-dot{width:9px;height:9px;border-radius:50%;background:#555;flex-shrink:0;}
.btn-sm{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--dimL);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold);}

/* NAV */
#nav{
  display:flex; overflow-x:auto; gap:2px;
  padding:0 10px 10px; scrollbar-width:none;
}
#nav::-webkit-scrollbar{display:none;}
.nb{
  padding:7px 13px; border-radius:20px;
  border:1px solid transparent; background:transparent;
  color:var(--dim); font-size:11px; font-weight:700;
  cursor:pointer; white-space:nowrap; font-family:inherit;
  min-height:34px; flex-shrink:0;
}
.nb.on{background:var(--gold);color:#000;border-color:var(--gold);}

/* MAIN */
#main{
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:12px 12px calc(60px + env(safe-area-inset-bottom,0));
  -webkit-overflow-scrolling:touch;
}
.pg{display:none;}
.pg.on{display:block;}

/* CARDS */
.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px; margin-bottom:12px;
}
.ct{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:10px;}

/* FORM ELEMENTS */
label{display:block;font-size:11px;color:var(--dimL);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
input,select,textarea{
  display:block; width:100%; padding:11px 13px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px;
  font-family:inherit; margin-bottom:12px; outline:none;
  -webkit-appearance:none; appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
textarea{min-height:100px;resize:vertical;line-height:1.5;}

/* BUTTONS */
.btn{
  display:block; width:100%; padding:14px;
  border-radius:10px; border:none; font-size:14px;
  font-weight:800; cursor:pointer; font-family:inherit;
  letter-spacing:.03em; margin-bottom:10px;
}
.btn.gold{background:var(--gold);color:#000;}
.btn.sec{background:var(--panel);color:var(--dimL);border:1px solid var(--border);}

/* STATUS COLORS */
.s-complete{color:var(--green);}
.s-progress{color:var(--blue);}
.s-hold{color:var(--red);}
.s-notstart{color:var(--dim);}

/* TICKER */
#ticker{
  position:fixed; bottom:0; left:0; right:0;
  height:calc(48px + env(safe-area-inset-bottom,0));
  background:linear-gradient(90deg,#07090d,#0d1420,#07090d);
  border-top:1px solid var(--border);
  overflow:hidden; z-index:100;
}
#ticker-inner{
  display:flex; align-items:center;
  height:48px; white-space:nowrap;
  animation:scroll-left 40s linear infinite;
}
@keyframes scroll-left{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}
.t-badge{
  background:var(--gold); color:#000; font-size:10px;
  font-weight:900; padding:3px 8px; border-radius:4px;
  margin-right:12px; letter-spacing:.1em; flex-shrink:0;
}
.t-item{font-size:13px;color:var(--gold);margin-right:6px;flex-shrink:0;}
.t-sep{color:var(--dim);margin:0 10px;font-size:16px;flex-shrink:0;}

/* LAYOUT */
body{display:flex;flex-direction:column;}
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.kpi-val{font-size:22px;font-weight:900;line-height:1;}
.kpi-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;}

/* PROGRESS BAR */
.pbar-wrap{height:5px;background:var(--panel);border-radius:3px;overflow:hidden;margin:4px 0;}
.pbar{height:100%;border-radius:3px;transition:width .4s;}

/* STAGE ROW */
.stage-row{
  display:flex;align-items:center;gap:10px;
  padding:11px;border-radius:8px;margin-bottom:6px;
  cursor:pointer;transition:opacity .15s;
}
.stage-row:active{opacity:.7;}

/* MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.on{display:flex;}
#modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px 16px 0 0;width:100%;max-height:80vh;
  overflow-y:auto;padding:20px 16px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0));
}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}

/* PRINT */
@media print{
  #hdr,#nav,#ticker,.no-print,#modal-overlay{display:none!important;}
  #main{padding:0!important;overflow:visible!important;}
  body{position:static!important;overflow:auto!important;height:auto!important;}
  .pg{display:none!important;}
  #pg-dr{display:block!important;}
  .card{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;}
  *{color:#000!important;}
  .gold-text{color:#b8860b!important;}
}

/* RESPONSIVE */
@media(min-width:768px){
  #app{flex-direction:row;}
  #hdr{width:200px;min-height:100vh;flex-direction:column;border-right:1px solid var(--border);border-bottom:none;}
  #nav{flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:10px 10px;}
  .nb{text-align:left;}
  #main{flex:1;}
}
</style>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
var BRIDGES=[
  {id:"A",piers:["1A-ABT","1A","2A","3A","4A","5A","6A","7A","8A","9A","10A","10A-ABT"]},
  {id:"B",piers:["1B-ABT","1B","2B","3B","4B","5B","6B","7B","8B","9B","9B-ABT"]},
  {id:"C",piers:["1C-ABT","1C","2C","3C","4C","5C","6C","7C","8C","9C","10C","11C","11C-ABT"]},
  {id:"D",piers:["1D-ABT","1D","2D","3D","4D","5D","6D","7D","7D-ABT"]},
  {id:"E",piers:["1E","2E","3E","4E","5E","6E","7E","8E","9E","10E","11E","12E","13E","14E","15E","16E","17E"]},
  {id:"G",piers:["1G-ABT","1G","2G","3G","4G","5G","6G","7G","7G-ABT"]},
  {id:"K",piers:["1K-ABT","1K","2K","3K","4K","5K","5K-ABT"]},
  {id:"L",piers:["1L-ABT","2L-ABT"]},
  {id:"M",piers:["1ML-ABT","1MR-ABT","2ML-ABT","2MR-ABT"]},
  {id:"N",piers:["1NL-ABT","1NR-ABT","2NL-ABT","2NR-ABT"]}
];

var STAGES=[
  {id:"PRB",name:"Probing",            ar:"بروبنغ",       col:"#CE93D8",w:2},
  {id:"EXC",name:"Excavation",         ar:"حفرية",        col:"#FF9F1C",w:5},
  {id:"BLD",name:"Blinding",           ar:"بلايندنغ",     col:"#FFD166",w:3},
  {id:"FRB",name:"Foundation Rebar",   ar:"حديد أساس",    col:"#4CC9F0",w:8},
  {id:"FRC",name:"Foundation Concrete",ar:"خرسانة أساس",  col:"#7EE8FA",w:10},
  {id:"PIL",name:"Piling",             ar:"خوازيق",       col:"#58A6FF",w:18},
  {id:"STR",name:"Pier Structure",     ar:"جسم العامود",  col:"#2979FF",w:22},
  {id:"BRG",name:"Bearings",           ar:"بيرنغ",        col:"#9B5DE5",w:5},
  {id:"GRD",name:"Girder Supply",      ar:"توريد كمرات",  col:"#D4A843",w:14},
  {id:"ERE",name:"Girder Erection",    ar:"تركيب كمرات",  col:"#06D6A0",w:9},
  {id:"DEC",name:"Deck Slab",          ar:"بلاطة الجسر",  col:"#80ED99",w:4}
];

// Direct foundations (no piling)
var DIRECT=["1L-ABT","2L-ABT","1ML-ABT","1MR-ABT","2ML-ABT","2MR-ABT","1NL-ABT","1NR-ABT","2NL-ABT","2NR-ABT"];

// Road Widening — standalone for abutments of G,K,L,M,N
var EMB_PIERS=["1G-ABT","7G-ABT","1K-ABT","5K-ABT","1L-ABT","2L-ABT","1ML-ABT","1MR-ABT","2ML-ABT","2MR-ABT","1NL-ABT","1NR-ABT","2NL-ABT","2NR-ABT"];

var STATUS_LIST=["Not Started","In Progress","On Hold","Complete","Inspected"];
var SCOL={"Not Started":"#4a5568","In Progress":"#58A6FF","On Hold":"#E63946","Complete":"#06D6A0","Inspected":"#D4A843"};

// ═══════════════════════════════════════════════
// SHARED PROGRESS CALCULATION
// ═══════════════════════════════════════════════
function calcBrPct(brId){
  var br=null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===brId){br=BRIDGES[i];break;}}
  if(!br) return 0;
  var earned=0,totalW=0;
  for(var p=0;p<br.piers.length;p++){
    var pier=br.piers[p]; var isDr=DIRECT.indexOf(pier)>-1;
    for(var s=0;s<STAGES.length;s++){
      if(STAGES[s].id==="PIL"&&isDr) continue;
      var w=STAGES[s].w; if(isDr) w=Math.round(w*(100/82)*10)/10;
      totalW+=w;
      var sv=gps(pier,STAGES[s].id);
      if(sv==="Complete"||sv==="Inspected") earned+=w;
      else if(sv==="In Progress") earned+=w*0.5;
    }
    if(EMB_PIERS.indexOf(pier)>-1){
      totalW+=0.5;
      var ev=gps(pier,"EMB");
      if(ev==="Complete"||ev==="Inspected") earned+=0.5;
      else if(ev==="In Progress") earned+=0.25;
    }
  }
  return totalW>0?Math.round(earned/totalW*1000)/10:0;
}

function calcOverallPct(){
  // Project = Preliminary(7%) + Bridges(83%) + Roads(10%)
  // Preliminary is fixed baseline (fully done)
  var BR_WEIGHT=83; var ROAD_WEIGHT=10; var PRE_WEIGHT=PRE_PCT;
  // Adjust bridge weight if pre changes
  BR_WEIGHT=100-ROAD_WEIGHT-PRE_WEIGHT;
  // Bridges earned
  var brEarned=0,brTotal=0;
  for(var b=0;b<BRIDGES.length;b++){
    for(var p=0;p<BRIDGES[b].piers.length;p++){
      var pier=BRIDGES[b].piers[p]; var isDr=DIRECT.indexOf(pier)>-1;
      for(var s=0;s<STAGES.length;s++){
        if(STAGES[s].id==="PIL"&&isDr) continue;
        var w=STAGES[s].w; if(isDr) w=Math.round(w*(100/82)*10)/10;
        brTotal+=w;
        var sv=gps(pier,STAGES[s].id);
        if(sv==="Complete"||sv==="Inspected") brEarned+=w;
        else if(sv==="In Progress") brEarned+=w*0.5;
      }
      if(EMB_PIERS.indexOf(pier)>-1){
        brTotal+=0.5;
        var ev=gps(pier,"EMB");
        if(ev==="Complete"||ev==="Inspected") brEarned+=0.5;
        else if(ev==="In Progress") brEarned+=0.25;
      }
    }
  }
  var brPctVal=brTotal>0?(brEarned/brTotal):0;
  // Roads earned
  var roadEarned=(ROADS.ibn.pct/100*5)+(ROADS.sattam.pct/100*5);
  // Total
  var total=PRE_WEIGHT + (brPctVal*BR_WEIGHT) + roadEarned;
  return Math.round(total*10)/10;
}

var SBGC={"Not Started":"#10161e","In Progress":"#0a1929","On Hold":"#1a0a0a","Complete":"#0a1f17","Inspected":"#1a1400"};

// Storage
var PS={};
var LOGS=[];
var ISSUES=[];
var SC_ACTUALS=[];
var DR_EMAILS=[];
var ANTHROPIC_KEY="";

var CONTACTS=[];
var ROADS={ibn:{pct:0,status:"Not Started"},sattam:{pct:0,status:"Not Started"}};
var PRE_PCT=7;

// Convert raw bridge % to project-level % (includes preliminary baseline)
function projPct(bridgeRawPct){
  var brW=100-10-PRE_PCT;
  return Math.round((PRE_PCT + (bridgeRawPct/100)*brW)*10)/10;
}
// Format for display: show both bridge % and project %
function projLabel(bridgeRawPct){
  var pp=projPct(bridgeRawPct);
  return pp+"% <span style=\"font-size:9px;color:var(--dimL);font-weight:400;\">(bridges: "+bridgeRawPct+"%)</span>";
}

function loadData(){
  try{PS=JSON.parse(localStorage.getItem("ic1b3_ps")||"{}");}catch(e){PS={};}
  try{LOGS=JSON.parse(localStorage.getItem("ic1b3_lg")||"[]");}catch(e){LOGS=[];}
  try{ISSUES=JSON.parse(localStorage.getItem("ic1b3_iss")||"[]");}catch(e){ISSUES=[];}
  try{SC_ACTUALS=JSON.parse(localStorage.getItem("ic1b3_sca")||"[]");}catch(e){SC_ACTUALS=[];}
  try{DR_EMAILS=JSON.parse(localStorage.getItem("ic1_dr_emails")||"[]");}catch(e){DR_EMAILS=[];}
  try{CONTACTS=JSON.parse(localStorage.getItem("ic1_contacts")||"[]");}catch(e){CONTACTS=[];}
  try{ROADS=JSON.parse(localStorage.getItem("ic1b3_roads")||'{"ibn":{"pct":0,"status":"Not Started"},"sattam":{"pct":0,"status":"Not Started"}}');}catch(e){ROADS={ibn:{pct:0,status:"Not Started"},sattam:{pct:0,status:"Not Started"}};}
  try{PRE_PCT=parseFloat(localStorage.getItem("ic1b3_pre")||"7");}catch(e){PRE_PCT=7;}
  try{ANTHROPIC_KEY=localStorage.getItem("ic1_ak")||"";}catch(e){}
}
function persist(){
  try{localStorage.setItem("ic1b3_ps",JSON.stringify(PS));}catch(e){}
  try{localStorage.setItem("ic1b3_lg",JSON.stringify(LOGS));}catch(e){}
  try{localStorage.setItem("ic1b3_iss",JSON.stringify(ISSUES));}catch(e){}
  try{localStorage.setItem("ic1b3_sca",JSON.stringify(SC_ACTUALS));}catch(e){}

function p2(n){return n<10?"0"+n:String(n);}
function td(){var d=new Date();return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());}

function gps(pier,sid){return PS[pier]&&PS[pier][sid]?PS[pier][sid]:"Not Started";}

function stageWeight(sid,isDirect){
  if(sid==="PIL"&&isDirect) return 0;
  var base=0;
  for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===sid){base=STAGES[i].w;break;}}
  if(isDirect){
    var pilW=18; var total=100;
    return Math.round(base*(total/(total-pilW))*10)/10;
  }
  return base;
}

var EMB_WEIGHT=0.5;

function overall(){
  var earned=0,totalW=0;
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i];
    for(var j=0;j<br.piers.length;j++){
      var p=br.piers[j];
      var isDr=DIRECT.indexOf(p)>-1;
      for(var k=0;k<STAGES.length;k++){
        var sid=STAGES[k].id;
        if(sid==="PIL"&&isDr) continue;
        var w=stageWeight(sid,isDr);
        totalW+=w;
        var v=gps(p,sid);
        if(v==="Complete"||v==="Inspected") earned+=w;
        else if(v==="In Progress") earned+=w*0.5;
      }
      // Road Widening weight
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=EMB_WEIGHT;
        var ev=gps(p,"EMB");
        if(ev==="Complete"||ev==="Inspected") earned+=EMB_WEIGHT;
        else if(ev==="In Progress") earned+=EMB_WEIGHT*0.5;
      }
      // Road Widening 0.5% weight per EMB pier
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=0.5;
        var rv=gps(p,"EMB");
        if(rv==="Complete"||rv==="Inspected") earned+=0.5;
        else if(rv==="In Progress") earned+=0.25;
      }
    }
  }
  var pct=totalW?parseFloat((earned/totalW*100).toFixed(2)):0;
  return{earned:Math.round(earned),totalW:Math.round(totalW),pct:pct};
}

function brPct(brId){
  var br=null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===brId){br=BRIDGES[i];break;}}
  if(!br) return 0;
  var earned=0,totalW=0;
  for(var j=0;j<br.piers.length;j++){
    var p=br.piers[j]; var isDr=DIRECT.indexOf(p)>-1;
    for(var k=0;k<STAGES.length;k++){
      var sid=STAGES[k].id;
      if(sid==="PIL"&&isDr) continue;
      var w=stageWeight(sid,isDr); totalW+=w;
      var v=gps(p,sid);
      if(v==="Complete"||v==="Inspected") earned+=w;
      else if(v==="In Progress") earned+=w*0.5;
    }
  }
  return totalW?parseFloat((earned/totalW*100).toFixed(1)):0;
}

function activP(){
  var n=0;
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i];
    for(var j=0;j<br.piers.length;j++){
      var p=br.piers[j]; var pst=PS[p]||{};
      var vals=Object.values(pst);
      if(vals.indexOf("In Progress")>-1||vals.indexOf("On Hold")>-1) n++;
    }
  }
  return n;
}

function pCol(pier){
  var any=false,allD=true,inP=false,hld=false;
  var isDr=DIRECT.indexOf(pier)>-1;
  for(var k=0;k<STAGES.length;k++){
    var sid=STAGES[k].id;
    if(sid==="PIL"&&isDr) continue;
    var v=gps(pier,sid);
    if(v==="Complete"||v==="Inspected") any=true; else allD=false;
    if(v==="In Progress") inP=true;
    if(v==="On Hold") hld=true;
  }
  // Also check EMB
  if(EMB_PIERS.indexOf(pier)>-1){
    var ev=gps(pier,"EMB");
    if(ev==="In Progress") inP=true;
    else if(ev==="Complete"){}
    else allD=false;
  }
  if(allD&&any) return"#06D6A0";
  if(inP) return"#58A6FF";
  if(any) return"#D4A843";
  if(hld) return"#E63946";
  return"#1a2233";
}

function nxt(v){
  var i=STATUS_LIST.indexOf(v);
  return STATUS_LIST[i<0?1:(i+1)%STATUS_LIST.length];
}

function flash(msg){
  var el=document.getElementById("flash-msg");
  el.textContent=msg; el.style.display="block";
  setTimeout(function(){el.style.display="none";},2200);
}

function formatDate(d){
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var dt=new Date(d+"T00:00:00");
  return days[dt.getDay()]+", "+dt.getDate()+" "+months[dt.getMonth()]+" "+dt.getFullYear();
}

function buildTicker(){
  var items=[];
  items.push({t:"TOTAL "+countAllPiers()+" PIERS",c:"#D4A843"});
  items.push({t:overall().pct+"% OVERALL PROGRESS",c:"#06D6A0"});
  items.push({t:activP()+" ACTIVE PIERS",c:"#58A6FF"});
  for(var i=0;i<BRIDGES.length;i++){
    var bp=brPct(BRIDGES[i].id);
    if(bp>0) items.push({t:"BR-"+BRIDGES[i].id+": "+bp+"%",c:"#D4A843"});
  }
  // Recent logs
  for(var j=LOGS.length-1;j>=Math.max(0,LOGS.length-3);j--){
    var stgN="";
    for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===LOGS[j].stage){stgN=STAGES[s].name;break;}}
    if(LOGS[j].stage==="EMB") stgN="Road Widening";
    items.push({t:"Pier "+LOGS[j].pier+" (Br-"+LOGS[j].bridge+") "+stgN+" "+LOGS[j].status,c:"#8892a4"});
  }
  var h='<span class="t-badge">📡 SITESYNC</span>';
  for(var k=0;k<items.length;k++){
    if(k>0) h+='<span class="t-sep">◆</span>';
    h+='<span class="t-item" style="color:'+items[k].c+';">'+items[k].t+'</span>';
  }
  document.getElementById("ticker-inner").innerHTML=h;
}

function countAllPiers(){

  for(var i=0;i<BRIDGES.length;i++) n+=BRIDGES[i].piers.length;

function extractEmail(){
  var txt=document.getElementById("em-text").value.trim();
  if(!txt){flash("Please paste email text first");return;}
  var btn=document.getElementById("em-btn");
  btn.textContent="Extracting..."; btn.disabled=true;

  var prompt='You are analyzing a construction site email for IC1 Bridges project, Diriyah, Saudi Arabia.\n\n'
    +'Extract all construction activities. For each identify:\n'
    +'1. Bridge letter (A,B,C,D,E,G,K,L,M,N)\n'
    +'2. Pier name (e.g. 3E, 1A-ABT)\n'
    +'3. Stage code - one of: PRB=Probing, EXC=Excavation, BLD=Blinding, FRB=Foundation Rebar, FRC=Foundation Concrete, PIL=Piling, STR=Pier Structure, BRG=Bearings, GRD=Girder Supply, ERE=Girder Erection, DEC=Deck Slab, EMB=Road Widening\n'
    +'4. Status: Complete, In Progress, or Not Started\n\n'
    +'EMAIL:\n'+txt+'\n\n'
    +'Respond ONLY with a JSON array:\n'
    +'[{"bridge":"E","pier":"3E","stage":"EXC","status":"Complete"},{"bridge":"E","pier":"4E","stage":"BLD","status":"In Progress"}]\n'
    +'If nothing found return []. No other text.';

  if(!ANTHROPIC_KEY||ANTHROPIC_KEY.length<10){flash("Save your API key first");btn.textContent="EXTRACT WITH AI";btn.disabled=false;return;}
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":ANTHROPIC_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    btn.textContent="EXTRACT WITH AI"; btn.disabled=false;
    var txt2=data.content&&data.content[0]?data.content[0].text:"[]";
    txt2=txt2.replace(/```json|```/g,"").trim();
    var items; try{items=JSON.parse(txt2);}catch(e){items=[];}
    showExtracted(items);
  })
  .catch(function(e){
    btn.textContent="EXTRACT WITH AI"; btn.disabled=false;
    flash("Error connecting to AI");
  });
}

function confirmImport(){

var SC_MONTHS=["Jun'25","Jul","Aug","Sep","Oct","Nov","Dec","Jan'26","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan'27","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep'27"];
var SC_PLANNED=[0,0.5,1,1.5,2,3,4,5,7,8,10,14,19,25,33,42,52,62,71,79,86,91,95,97,98,99,99.5,100];

function rSc(){
  var ov=overall();
  var h='<div class="card"><div class="ct">S-Curve — Planned vs Actual</div>';
  // Bar chart
  h+='<div style="display:flex;align-items:flex-end;gap:2px;height:120px;margin-bottom:8px;">';
  for(var i=0;i<SC_MONTHS.length;i++){
    var pvRaw=SC_PLANNED[i];
    // Shift planned curve: PRE_PCT already earned, bridge work = remaining 83%
    var pv=pvRaw>0?Math.min(100,Math.round((PRE_PCT+(pvRaw/100)*(100-10-PRE_PCT))*10)/10):0;
    var avRaw=SC_ACTUALS[i]!==undefined?SC_ACTUALS[i]:null;
    var av=avRaw!==null?Math.min(100,Math.round((PRE_PCT+(avRaw/100)*(100-10-PRE_PCT))*10)/10):null;
    var ph=Math.round(pv/100*110);
    var ah=av!==null?Math.round(av/100*110):0;
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0;">';
    h+='<div style="width:100%;display:flex;gap:1px;align-items:flex-end;height:110px;">';
    h+='<div style="flex:1;background:#D4A84344;border-radius:2px 2px 0 0;height:'+ph+'px;" title="Planned '+pv+'%"></div>';
    h+='<div style="flex:1;background:'+(av!==null?"var(--green)":"transparent")+';border-radius:2px 2px 0 0;height:'+ah+'px;" title="Actual '+(av||0)+'%"></div>';
    h+='</div>';
    if(i%4===0) h+='<div style="font-size:7px;color:var(--dim);white-space:nowrap;margin-top:2px;">'+SC_MONTHS[i]+'</div>';
    else h+='<div style="font-size:7px;color:transparent;">.</div>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div style="display:flex;gap:14px;margin-bottom:14px;">';
  h+='<div style="display:flex;align-items:center;gap:4px;"><div style="width:12px;height:8px;background:#D4A84344;border-radius:2px;"></div><span style="font-size:10px;color:var(--dimL);">Planned</span></div>';
  h+='<div style="display:flex;align-items:center;gap:4px;"><div style="width:12px;height:8px;background:var(--green);border-radius:2px;"></div><span style="font-size:10px;color:var(--dimL);">Actual</span></div>';

  h+='<div class="ct" style="margin-top:8px;">Update Actual Progress</div>';
  h+='<label>Month</label><select id="sc-month">';

  h+='</select>';
  h+='<label>Actual % (0-100)</label>';

  h+='</div>';

function setSyncDot(state){
  var dot=document.getElementById("sync-dot");
  if(state==="ok") dot.style.background="#06D6A0";
  else if(state==="sync") dot.style.background="#D4A843";
  else dot.style.background="#555";
}

function openSync(){
  var h='<div class="ct">Team Sync</div>';
  h+='<div style="font-size:12px;color:var(--dimL);margin-bottom:14px;line-height:1.6;">Connect to Google Apps Script to sync with your team in real time.</div>';
  h+='<label>Apps Script Web App URL</label>';
  h+='<input type="url" id="as-url-inp" placeholder="https://script.google.com/macros/s/..." value="'+AS_URL+'">';
  h+='<button class="btn gold" onclick="connectAs()">CONNECT</button>';
  if(AS_CONNECTED) h+='<button class="btn sec" onclick="disconnectAs()">DISCONNECT</button>';
  h+='<div style="font-size:10px;color:var(--dim);margin-top:8px;">Status: '+(AS_CONNECTED?'<span style="color:var(--green);">Connected</span>':'<span style="color:var(--dim);">Not connected</span>')+'</div>';
  openModal(h);
}

function connectAs(){
  var url=document.getElementById("as-url-inp").value.trim();
  if(!url||url.indexOf("script.google.com")<0){flash("Please enter a valid Apps Script URL");return;}
  AS_URL=url; AS_CONNECTED=true;
  try{localStorage.setItem(AS_URL_KEY,AS_URL);}catch(e){}
  setSyncDot("ok");
  if(asTimer) clearInterval(asTimer);
  asTimer=setInterval(pullSync,30000);
  closeModal(); flash("Connected to team sync!");
}

function disconnectAs(){
  AS_CONNECTED=false; AS_URL="";
  try{localStorage.removeItem(AS_URL_KEY);}catch(e){}
  if(asTimer) clearInterval(asTimer);
  setSyncDot(""); closeModal(); flash("Disconnected");
}

function pushSync(){
  if(!AS_CONNECTED||!AS_URL) return;
  setSyncDot("sync");
  var payload={ps:PS,logs:LOGS,issues:ISSUES,ts:Date.now()};
  fetch(AS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
  .then(function(){setSyncDot("ok");})
  .catch(function(){setSyncDot("");});
}

function pullSync(){
  if(!AS_CONNECTED||!AS_URL) return;
  setSyncDot("sync");
  var xhr=new XMLHttpRequest();
  xhr.open("GET",AS_URL+"?action=get",true);
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText);
      if(d.ps) PS=d.ps;
      if(d.logs) LOGS=d.logs;
      persist(); setSyncDot("ok");
    }catch(e){setSyncDot("");}
  };
  xhr.onerror=function(){setSyncDot("");};
  xhr.send();
}

if(AS_CONNECTED){
  setSyncDot("ok");
  asTimer=setInterval(pullSync,30000);
}

  var now=new Date();
  var day=now.getDay(); // 0=Sun
  var diff=now.getDate()-day+(day===0?-6:1); // Monday
  var mon=new Date(now.setDate(diff));
  var sun=new Date(mon); sun.setDate(mon.getDate()+6);
  var fmt=function(d){return d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1)+"-"+(d.getDate()<10?"0":"")+d.getDate();};
  return{start:fmt(mon),end:fmt(sun)};
}

function buildEmailBody(logs){
  var body="ACTIVITIES:\n";
  if(logs.length===0){body+="No activities logged.\n";}
  else{
    for(var i=0;i<logs.length;i++){
      var stgN=""; for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===logs[i].stage){stgN=STAGES[s].name;break;}}
      if(logs[i].stage==="EMB") stgN="Road Widening";
      body+="- "+logs[i].date+" | "+logs[i].pier+" (Br-"+logs[i].bridge+"): "+stgN+" - "+logs[i].status+"\n";
    }
  }
  body+="\nBRIDGE PROGRESS:\n";
  for(var j=0;j<BRIDGES.length;j++){
    var bp=brPct(BRIDGES[j].id);
    if(bp>0) body+="Bridge "+BRIDGES[j].id+": "+bp+"%\n";
  }
  body+="\nPrepared by: Kamel Dimachkie - Head of Surveying - Khatib & Alami\nSiteSync — Bridges, Diriyah, Saudi Arabia";
  return body;
}

function addContact(rt){
  var name=document.getElementById("ct-name-"+rt).value.trim();
  var email=document.getElementById("ct-email-"+rt).value.trim();
  if(!name||!email||email.indexOf("@")<0){flash("Enter valid name and email");return;}
  CONTACTS.push({name:name,email:email});
  saveContacts();
  flash("Contact added: "+name);
  // Refresh current report
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function delContact(i,rt){
  CONTACTS.splice(i,1); saveContacts();
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function selAllContacts(rt){
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk) chk.checked=true;
  }
}

function getSelectedContacts(rt){
  var out=[];
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk&&chk.checked) out.push(CONTACTS[i].email);
  }
  // Also include DR_EMAILS for backward compat
  for(var j=0;j<DR_EMAILS.length;j++){
    if(out.indexOf(DR_EMAILS[j])<0) out.push(DR_EMAILS[j]);
  }
  return out;
}

function copyEmails(rt){
  // Select all first
  selAllContacts(rt);
  var all=[];
  for(var i=0;i<CONTACTS.length;i++) all.push(CONTACTS[i].email);
  for(var j=0;j<DR_EMAILS.length;j++){
    if(all.indexOf(DR_EMAILS[j])<0) all.push(DR_EMAILS[j]);
  }
  if(all.length===0){flash("No contacts to copy");return;}
  var txt=all.join(", ");
  // Try modern clipboard API first
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){
      flash("Copied "+all.length+" emails to clipboard!");
    }).catch(function(){
      fallbackCopy(txt,all.length);
    });
  } else {
    fallbackCopy(txt,all.length);
  }
}

function fallbackCopy(txt,count){
  var ta=document.createElement("textarea");
  ta.value=txt;
  ta.style.position="fixed";
  ta.style.opacity="0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{
    document.execCommand("copy");
    flash("Copied "+count+" emails — paste into your mail app To: field");
  }catch(e){
    flash("Copy failed — try selecting manually");
  }
  document.body.removeChild(ta);
}

function elUpdPiers(){
  var br = document.getElementById("el-br").value;
  var sel = document.getElementById("el-pier"); sel.innerHTML = "";
  for(var i=0;i<BRIDGES.length;i++){
    if(BRIDGES[i].id===br){
      for(var j=0;j<BRIDGES[i].piers.length;j++){
        var o = document.createElement("option");
        o.value = BRIDGES[i].piers[j]; o.textContent = BRIDGES[i].piers[j];
        sel.appendChild(o);
      }
      break;
    }
  }
}

function saveEditLog(id){
  var date   = document.getElementById("el-date").value;
  var br     = document.getElementById("el-br").value;
  var pier   = document.getElementById("el-pier").value;
  var stage  = document.getElementById("el-stage").value;
  var status = document.getElementById("el-status").value;
  var notes  = document.getElementById("el-notes").value;

  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){
      LOGS[i].date=date; LOGS[i].bridge=br; LOGS[i].pier=pier;
      LOGS[i].stage=stage; LOGS[i].status=status; LOGS[i].notes=notes;
      break;
    }
  }
  // Also update PS
  if(!PS[pier]) PS[pier]={};
  PS[pier][stage]=status;
  persist();
  closeModal();
  flash("Log entry updated");
  rLg();
}

function deleteLog(id){
  if(!confirm("Delete this log entry?")) return;
  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){ LOGS.splice(i,1); break; }
  }
  persist();
  closeModal();
  flash("Entry deleted");
  rLg();
}

function saveEditLog(id){
  var date   = document.getElementById("el-date").value;
  var br     = document.getElementById("el-br").value;
  var pier   = document.getElementById("el-pier").value;
  var stage  = document.getElementById("el-stage").value;
  var status = document.getElementById("el-status").value;
  var notes  = document.getElementById("el-notes").value;

  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){
      LOGS[i].date=date; LOGS[i].bridge=br; LOGS[i].pier=pier;
      LOGS[i].stage=stage; LOGS[i].status=status; LOGS[i].notes=notes;
      break;
    }
  }
  // Also update PS
  if(!PS[pier]) PS[pier]={};
  PS[pier][stage]=status;
  persist();
  closeModal();
  flash("Log entry updated");
  rLg();
}

function deleteLog(id){
  if(!confirm("Delete this log entry?")) return;
  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){ LOGS.splice(i,1); break; }
  }
  persist();
  closeModal();
  flash("Entry deleted");
  rLg();
}

function clearAll(){
  if(!confirm("Clear ALL data? This cannot be undone!")) return;
  PS={}; LOGS=[]; ISSUES=[]; SC_ACTUALS=[];
  persist();
  closeModal();
  flash("All data cleared");
  rLg(); buildTicker();
}

function clearLogsOnly(){
  if(!confirm("Clear all log history?")) return;
  LOGS=[];
  try{localStorage.setItem("ic1b3_lg",JSON.stringify(LOGS));}catch(e){}
  closeModal();
  flash("Logs cleared");
  rLg(); buildTicker();
}

function clearBridge(){
  var br = document.getElementById("clear-br").value;
  if(!confirm("Clear all data for Bridge "+br+"?")) return;
  var brO = null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===br){brO=BRIDGES[i];break;}}
  if(!brO) return;
  // Remove pier statuses
  for(var j=0;j<brO.piers.length;j++) delete PS[brO.piers[j]];
  // Remove logs
  LOGS = LOGS.filter(function(l){return l.bridge!==br;});
  persist();
  closeModal();
  flash("Bridge "+br+" data cleared");
  rLg(); buildTicker();
}

          else if(bsv==="In Progress") bEarned+=bw*0.5;
        }
        bpctArr.push({pier:bpier,pct:bTotal>0?Math.round(bEarned/bTotal*1000)/10:0});
      }
    }
    bpctArr.sort(function(a,b){return b.pct-a.pct;});
    var topPierTxt=bpctArr.length>0&&bpctArr[0].pct>0?bpctArr[0].pier+" "+bpctArr[0].pct+"%":"—";
    var activeBJ=bpctArr.filter(function(x){return x.pct>0&&x.pct<100;}).length;
    h+='<div class="card" style="padding:12px;cursor:pointer;" onclick="nav(\'tr\');curBr=\''+brJ.id+'\';rTr();">';
    h+='<div style="font-size:18px;font-weight:900;color:var(--gold);">'+brJ.id+'</div>';
    h+='<div style="font-size:10px;color:var(--dimL);">'+brJ.piers.length+' piers &nbsp;·&nbsp; '+activeBJ+' active</div>';
    h+='<div style="font-size:20px;font-weight:900;color:'+colJ+';margin-top:4px;">'+pctJ+'%</div>';
    h+='<div style="font-size:10px;color:var(--dimL);">Best pier: <b style="color:var(--gold);">'+topPierTxt+'</b></div>';
    h+='<div style="height:4px;background:var(--panel);border-radius:2px;margin-top:6px;">';
    h+='<div style="width:'+pctJ+'%;height:100%;background:'+colJ+';border-radius:2px;"></div></div>';
    h+='</div>';
  }
  h+='</div>';

  document.getElementById("pg-mp").innerHTML=h;
}


</script>
</body>
</html>
