<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IC1 Field Entry</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#07090d; color:#f1f5f9; font-family:-apple-system,sans-serif; min-height:100vh; }

/* Header */
#hdr { 
  padding:12px 14px; 
  background:linear-gradient(135deg,#0a1628,#0d2444); 
  border-bottom:1px solid rgba(212,168,67,0.25);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
#hdr .title { font-size:18px; font-weight:900; color:#f1f5f9; }
#hdr .sub { font-size:9px; color:rgba(212,168,67,0.7); font-weight:700; letter-spacing:2px; }
#sync-dot { width:9px; height:9px; border-radius:50%; background:#D4A843; box-shadow:0 0 6px #D4A843; }

/* GPS bar */
#gps-bar {
  padding:7px 14px; background:#0a1628;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:11px; color:rgba(212,168,67,0.65); text-align:center;
}

/* Section title */
.sec-title {
  font-size:9px; font-weight:800; color:rgba(255,255,255,0.3);
  letter-spacing:2px; text-transform:uppercase;
  padding:14px 14px 8px;
}

/* Bridge block */
.bridge-block { margin-bottom:6px; }
.bridge-hdr {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px;
  border-left:3px solid var(--c);
  background:rgba(255,255,255,0.02);
}
.bridge-hdr .bl { font-size:15px; font-weight:900; color:var(--c); }
.bridge-hdr .bc { font-size:10px; color:rgba(255,255,255,0.3); }

/* Pier row */
.pier-row { display:flex; gap:6px; overflow-x:auto; padding:8px 14px; scrollbar-width:none; }
.pier-row::-webkit-scrollbar { display:none; }

.pier-btn {
  flex-shrink:0; min-width:64px; padding:8px 6px;
  border-radius:10px; border:2px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03); cursor:pointer;
  font-family:inherit; text-align:center;
  transition:all 0.15s;
}
.pier-btn .pn { font-size:11px; font-weight:800; color:rgba(255,255,255,0.6); }
.pier-btn .pd { width:6px; height:6px; border-radius:50%; margin:3px auto 0; display:none; }
.pier-btn.active-pier { border-color:var(--c) !important; background:rgba(255,255,255,0.06) !important; }

/* Stage panel */
.stage-panel {
  display:none; margin:0 10px 10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px; overflow:hidden;
}
.stage-panel .sp-hdr {
  padding:10px 12px;
  font-size:12px; font-weight:800;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.stage-row { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.04); }
.stage-row:last-child { border-bottom:none; }
.stage-name { font-size:12px; font-weight:600; color:#f1f5f9; margin-bottom:6px; }
.stage-status { font-size:10px; font-weight:700; margin-bottom:6px; }
.btn-row { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.st-btn {
  padding:10px 2px; border-radius:8px;
  border:2px solid rgba(255,255,255,0.1);
  background:transparent; cursor:pointer;
  font-family:inherit; font-size:10px; font-weight:700;
  color:rgba(255,255,255,0.25);
  transition:all 0.15s;
}
.st-btn.on { color:#000 !important; }

/* Road section */
.road-block { margin-bottom:6px; }
.road-hdr {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px;
  border-left:3px solid var(--c);
  background:rgba(255,255,255,0.02);
}
.road-hdr .rl { font-size:15px; font-weight:900; color:var(--c); }
.act-row { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.04); }
.act-row:last-child { border-bottom:none; }
.road-acts { margin:0 10px 10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px; overflow:hidden; }

.loc-card {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px; padding:8px 10px;
}
.loc-type { font-size:9px; color:rgba(255,255,255,0.3); margin-bottom:3px; font-weight:700; letter-spacing:0.5px; }
.loc-name { font-size:14px; font-weight:800; color:#D4A843; }
.loc-dist { font-size:10px; color:rgba(255,255,255,0.4); margin-top:2px; }

/* Flash */
#flash { 
  position:fixed; top:70px; left:50%; transform:translateX(-50%);
  background:#1e293b; border:1px solid rgba(212,168,67,0.4);
  border-radius:8px; padding:10px 18px;
  font-size:13px; font-weight:600;
  z-index:999; display:none; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
</style>

// ── FIREBASE ──────────────────────────────────────────
function startFirebase(){
  try{
    var app = firebase.initializeApp(FB_CFG);
    DB = firebase.database(app);
    var dot = document.getElementById('sync-dot');
    DB.ref('ic1_bridges/PS').on('value', function(snap){
      PS = snap.val()||{};
      renderAll();
      if(dot){dot.style.background='#06D6A0';dot.style.boxShadow='0 0 6px #06D6A0';}
    }, function(){
      if(dot){dot.style.background='#E63946';dot.style.boxShadow='0 0 6px #E63946';}
    });
    DB.ref('ic1_bridges/ROAD_ACTS_DATA').once('value').then(function(snap){
      var d=snap.val(); if(d) ROAD_DATA=d; renderAll();
    });
  }catch(e){ console.log('FB error:',e); }
}

function initFB(){
  // Dynamically load Firebase then initialize
  var loaded = 0;
  function onLoad(){ loaded++; if(loaded===2) startFirebase(); }
  function loadScript(src){
    var s=document.createElement('script');
    s.src=src; s.onload=onLoad; s.onerror=onLoad;
    document.head.appendChild(s);
  }
  loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
  loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
}

function pushPier(pier){
  if(!DB)return;
  DB.ref('ic1_bridges/PS/'+pier).set(PS[pier]||{});
}

function pushRoad(key){
  if(!DB)return;
  DB.ref('ic1_bridges/ROAD_ACTS_DATA/'+key).set(ROAD_DATA[key]||{});
}

var openPier = null;

function renderAll(){
  var h = '';

  // Bridges
  h += '<div class="sec-title">🌉 Bridges</div>';
  BRIDGES.forEach(function(br){
    h += '<div class="bridge-block">';
    h += '<div class="bridge-hdr" style="--c:'+br.col+';">';
    h += '<span class="bl">Bridge '+br.id+'</span>';
    h += '<span class="bc">'+br.piers.length+' piers</span>';
    h += '</div>';
    // Pier buttons
    h += '<div class="pier-row">';
    br.piers.forEach(function(pier){
      var col = getPierCol(pier);
      var isActive = col!=='#1e293b';
      var isOpen = openPier===pier;
      h += '<button class="pier-btn'+(isOpen?' active-pier':'')+'" ';
      h += 'onclick="togglePier(\''+pier+'\')" ';
      h += 'style="--c:'+br.col+';'+(isActive?'border-color:'+col+'66;background:'+col+'15;':'')+'">';
      h += '<div class="pn" style="color:'+(isActive?col:br.col)+'80;">'+pier+'</div>';
      if(isActive) h += '<div class="pd" style="display:block;background:'+col+';box-shadow:0 0 4px '+col+';"></div>';
      h += '</button>';
    });
    h += '</div>';
    // Stage panel
    h += '<div class="stage-panel" id="sp-'+safeid(br.id)+'">';
    if(openPier && br.piers.indexOf(openPier)>-1){
      h += buildStagePanel(openPier, br.col);
    }
    h += '</div>';
    h += '</div>';
  });

  // Roads
  h += '<div class="sec-title">🛣 Road Works</div>';
  [{key:'ibn',label:'Ibn Saud Road',col:'#58A6FF'},{key:'sattam',label:'Prince Sattam',col:'#A78BFA'}].forEach(function(rd){
    h += '<div class="road-block">';
    h += '<div class="road-hdr" style="--c:'+rd.col+';">';
    h += '<span class="rl">'+rd.label+'</span>';
    h += '</div>';
    h += '<div class="road-acts">';
    ROAD_ACTS.forEach(function(act){
      var k = act.replace(/[^a-zA-Z0-9]/g,'_');
      var cur = (ROAD_DATA[rd.key]&&ROAD_DATA[rd.key][k])||'Not Started';
      var curSt = STATUSES.find(function(s){return s.id===cur;})||STATUSES[0];
      h += '<div class="act-row">';
      h += '<div class="stage-name">'+act+'</div>';
      h += '<div class="stage-status" style="color:'+curSt.bg+';">'+cur+'</div>';
      h += '<div class="btn-row">';
      STATUSES.forEach(function(st){
        var isOn = cur===st.id;
        h += '<button class="st-btn'+(isOn?' on':'')+'" ';
        h += 'onclick="setRoad(\''+rd.key+'\',\''+k+'\',\''+st.id+'\')" ';
        h += 'style="border-color:'+(isOn?st.bg:st.bg+'44')+';background:'+(isOn?st.bg:'transparent')+';color:'+(isOn?st.col:'rgba(255,255,255,0.2)')+';">'+st.label+'</button>';
      });
      h += '</div></div>';
    });
    h += '</div></div>';
  });

  h += '<div style="height:30px;"></div>';
  document.getElementById('content').innerHTML = h;
}

function buildStagePanel(pier, col){
  var stages = PS[pier]||{};
  var h = '<div class="sp-hdr" style="color:'+col+';">📍 '+pier+'</div>';
  STAGES.forEach(function(s){
    var cur = stages[s.id]||'Not Started';
    var curSt = STATUSES.find(function(x){return x.id===cur;})||STATUSES[0];
    h += '<div class="stage-row">';
    h += '<div class="stage-name">'+s.name+'</div>';
    h += '<div class="stage-status" style="color:'+curSt.bg+';">'+cur+'</div>';
    h += '<div class="btn-row">';
    STATUSES.forEach(function(st){
      var isOn = cur===st.id;
      h += '<button class="st-btn'+(isOn?' on':'')+'" ';
      h += 'onclick="setStage(\''+pier+'\',\''+s.id+'\',\''+st.id+'\')" ';
      h += 'style="border-color:'+(isOn?st.bg:st.bg+'44')+';background:'+(isOn?st.bg:'transparent')+';color:'+(isOn?st.col:'rgba(255,255,255,0.2)')+';">'+st.label+'</button>';
    });
    h += '</div></div>';
  });
  return h;
}

function safeid(s){ return s.replace(/[^a-zA-Z0-9]/g,'_'); }

function getPierCol(name){
  if(!PS[name])return '#1e293b';
  var v=Object.values(PS[name]);
  if(v.some(function(x){return x==='In Progress';}))return '#D4A843';
  if(v.some(function(x){return x==='On Hold';}))return '#E63946';
  if(v.some(function(x){return x==='Complete'||x==='Inspected';}))return '#06D6A0';
  return '#1e293b';
}

function togglePier(pier){
  // Find bridge
  var brId = null;
  BRIDGES.forEach(function(br){ if(br.piers.indexOf(pier)>-1) brId=br.id; });
  if(!brId)return;

  if(openPier===pier){
    openPier=null;
  } else {
    openPier=pier;
  }
  // Update just the panel without full re-render
  BRIDGES.forEach(function(br){
    var panel=document.getElementById('sp-'+safeid(br.id));
    if(!panel)return;
    if(openPier && br.piers.indexOf(openPier)>-1){
      panel.style.display='block';
      panel.innerHTML=buildStagePanel(openPier,br.col);
      panel.scrollIntoView({behavior:'smooth',block:'nearest'});
    } else {
      panel.style.display='none';
      panel.innerHTML='';
    }
  });
  // Update pier button styles
  document.querySelectorAll('.pier-btn').forEach(function(btn){
    var p=btn.getAttribute('onclick').match(/'([^']+)'/)[1];
    if(p===openPier) btn.classList.add('active-pier');
    else btn.classList.remove('active-pier');
  });
}

function setStage(pier, sid, status){
  if(!PS[pier])PS[pier]={};
  PS[pier][sid]=status;
  pushPier(pier);
  var sname=''; STAGES.forEach(function(s){if(s.id===sid)sname=s.name;});
  flash(status==='Complete'?'✅ '+sname+' — Complete!':status==='In Progress'?'🔧 '+sname+' — In Progress':'📌 '+sname+' — '+status);
  // Refresh panel only
  var brId=null; BRIDGES.forEach(function(br){if(br.piers.indexOf(pier)>-1)brId=br.id;});
  if(brId){
    var br=BRIDGES.find(function(b){return b.id===brId;});
    var panel=document.getElementById('sp-'+safeid(brId));
    if(panel) panel.innerHTML=buildStagePanel(pier,br.col);
  }
}

function setRoad(key, actKey, status){
  if(!ROAD_DATA[key])ROAD_DATA[key]={};
  ROAD_DATA[key][actKey]=status;
  pushRoad(key);
  flash(status==='Complete'?'✅ Done!':'📌 '+status);
  renderAll();
}

function flash(msg){
  var el=document.getElementById('flash');
  el.textContent=msg; el.style.display='block';
  clearTimeout(flash._t);
  flash._t=setTimeout(function(){el.style.display='none';},2500);
}

// ── GPS ───────────────────────────────────────────────
var _locPanelOpen = false;
function toggleLocation(){
  _locPanelOpen = !_locPanelOpen;
  document.getElementById('location-panel').style.display = _locPanelOpen?'block':'none';
}

function toUTM(lat, lng){
  var a=6378137, e2=0.00669438, k0=0.9996;
  var latR=lat*Math.PI/180, lngR=lng*Math.PI/180, cm=45*Math.PI/180;
  var N=a/Math.sqrt(1-e2*Math.sin(latR)*Math.sin(latR));
  var T=Math.tan(latR)*Math.tan(latR);
  var C=e2/(1-e2)*Math.cos(latR)*Math.cos(latR);
  var A2=Math.cos(latR)*(lngR-cm);
  var M=a*((1-e2/4-3*e2*e2/64)*latR-(3*e2/8+3*e2*e2/32)*Math.sin(2*latR)+(15*e2*e2/256)*Math.sin(4*latR));
  var E=k0*N*(A2+(1-T+C)*A2*A2*A2/6)+500000;
  var Nv=k0*(M+N*Math.tan(latR)*(A2*A2/2+(5-T+9*C+4*C*C)*A2*A2*A2*A2/24));
  return {E:E, N:Nv};
}

function nearestFrom(list, utmE, utmN){
  var nearest=null, nd=Infinity;
  list.forEach(function(p){
    var d=Math.sqrt(Math.pow(p.n-utmN,2)+Math.pow(p.e-utmE,2));
    if(d<nd){nd=d;nearest=p;}
  });
  return nearest ? {name:nearest.name, dist:Math.round(nd)} : null;
}

function updateLocCard(id, result){
  if(!result)return;
  var el=document.getElementById(id);
  if(!el)return;
  el.querySelector('.loc-name').textContent=result.name;
  el.querySelector('.loc-dist').textContent=result.dist+'m away';
  var col=result.dist<10?'#E63946':result.dist<30?'#D4A843':'#06D6A0';
  el.querySelector('.loc-name').style.color=col;
}

function startGPS(){
  if(!navigator.geolocation)return;
  navigator.geolocation.watchPosition(function(pos){
    var utm = toUTM(pos.coords.latitude, pos.coords.longitude);

    // Nearest pier for header bar
    var np = nearestFrom(PIER_COORDS, utm.E, utm.N);
    if(np){
      document.getElementById('gps-nearest').innerHTML=
        '📍 Nearest Pier: <b style="color:#D4A843;">'+np.name+'</b> · '+np.dist+'m';
    }

    // Update location panel cards
    updateLocCard('loc-pier', nearestFrom(PIER_COORDS, utm.E, utm.N));
    updateLocCard('loc-pbm', nearestFrom(PRIMARY_BMS, utm.E, utm.N));
    updateLocCard('loc-sbm', nearestFrom(SECONDARY_BMS, utm.E, utm.N));
    updateLocCard('loc-sht', nearestFrom(SHEET_PTS, utm.E, utm.N));

    // Show UTM coords
    var utmEl=document.getElementById('loc-utm');
    if(utmEl) utmEl.textContent='UTM 38N — N: '+Math.round(utm.N)+' · E: '+Math.round(utm.E);

  }, function(){
    document.getElementById('gps-nearest').textContent='📡 GPS unavailable';
  },{enableHighAccuracy:true,maximumAge:8000});
}

// ── INIT ──────────────────────────────────────────────
window.onload = function(){
  renderAll();
  initFB();
  startGPS();
};
</script>
