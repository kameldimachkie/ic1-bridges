<style>
:root{
  --bg:#07090d; --card:#0d1117; --panel:#111827;
  --border:#1e2d3d; --gold:#D4A843; --goldL:#f0c96a;
  --text:#e8eaf0; --dimL:#8892a4; --dim:#4a5568;
  --green:#06D6A0; --blue:#58A6FF; --red:#E63946;
  --purple:#CE93D8; --orange:#FF9F1C;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; width:100%;
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden; position:fixed;
  -webkit-text-size-adjust:100%;
}

/* HEADER */
#hdr{
  background:linear-gradient(135deg,#07090d,#0d1420);
  border-bottom:1px solid var(--border);
  padding:calc(52px + env(safe-area-inset-top,0)) 14px 0;
  flex-shrink:0;
}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0 8px;}
.hdr-brand .title{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:.05em;}
.hdr-brand .sub{font-size:10px;color:var(--dimL);letter-spacing:.1em;text-transform:uppercase;}
.hdr-brand .name{font-size:10px;color:var(--gold);font-weight:700;margin-top:1px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
#clk{font-size:20px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
#cld{font-size:10px;color:var(--dimL);}
.hdr-btns{display:flex;gap:6px;align-items:center;}
#sync-dot{width:9px;height:9px;border-radius:50%;background:#555;flex-shrink:0;}
.btn-sm{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--dimL);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold);}

/* NAV */
#nav{
  display:flex; overflow-x:auto; gap:4px;
  padding:0 10px 10px; scrollbar-width:none;
}
#nav::-webkit-scrollbar{display:none;}
.nb{
  padding:9px 16px; border-radius:20px;
  border:1px solid transparent; background:transparent;
  color:var(--dim); font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap; font-family:inherit;
  min-height:40px; flex-shrink:0;
}
.nb.on{background:var(--gold);color:#000;border-color:var(--gold);}

/* MAIN */
#main{
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:12px 12px calc(16px + env(safe-area-inset-bottom,0));
  -webkit-overflow-scrolling:touch;
}
.pg{display:none;}
.pg.on{display:block;}

/* CARDS */
.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px; margin-bottom:12px;
}
.ct{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:10px;}

/* FORM ELEMENTS */
label{display:block;font-size:11px;color:var(--dimL);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
input,select,textarea{
  display:block; width:100%; padding:11px 13px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px;
  font-family:inherit; margin-bottom:12px; outline:none;
  -webkit-appearance:none; appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
textarea{min-height:100px;resize:vertical;line-height:1.5;}

/* BUTTONS */
.btn{
  display:block; width:100%; padding:14px;
  border-radius:10px; border:none; font-size:14px;
  font-weight:800; cursor:pointer; font-family:inherit;
  letter-spacing:.03em; margin-bottom:10px;
}
.btn.gold{background:var(--gold);color:#000;}
.btn.sec{background:var(--panel);color:var(--dimL);border:1px solid var(--border);}

/* STATUS COLORS */
.s-complete{color:var(--green);}
.s-progress{color:var(--blue);}
.s-hold{color:var(--red);}
.s-notstart{color:var(--dim);}

/* TICKER */
#ticker{
  position:fixed; top:0; left:0; right:0;
  height:52px;
  background:linear-gradient(90deg,#07090d,#0d1420,#07090d);
  border-bottom:2px solid var(--gold);
  overflow:hidden; z-index:200;
}
#ticker-inner{
  display:flex; align-items:center;
  height:52px; white-space:nowrap;
  will-change:transform;
}
100%{transform:translateX(-200%);}}
.t-badge{
  background:var(--gold); color:#000; font-size:12px;
  font-weight:900; padding:4px 10px; border-radius:4px;
  margin-right:14px; letter-spacing:.1em; flex-shrink:0;
}
.t-item{font-size:18px;color:var(--gold);margin-right:8px;flex-shrink:0;font-weight:600;}
.t-sep{color:var(--dim);margin:0 12px;font-size:18px;flex-shrink:0;}

/* LAYOUT */
body{display:flex;flex-direction:column;}
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.kpi-val{font-size:22px;font-weight:900;line-height:1;}
.kpi-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;}

/* PROGRESS BAR */
.pbar-wrap{height:5px;background:var(--panel);border-radius:3px;overflow:hidden;margin:4px 0;}
.pbar{height:100%;border-radius:3px;transition:width .4s;}

/* STAGE ROW */
.stage-row{
  display:flex;align-items:center;gap:10px;
  padding:11px;border-radius:8px;margin-bottom:6px;
  cursor:pointer;transition:opacity .15s;
}
.stage-row:active{opacity:.7;}

/* MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.on{display:flex;}
#modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px 16px 0 0;width:100%;max-height:80vh;
  overflow-y:auto;padding:20px 16px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0));
}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}

/* PRINT */
@media print{
  #hdr,#nav,#ticker,.no-print,#modal-overlay{display:none!important;}
  #main{padding:0!important;overflow:visible!important;}
  body{position:static!important;overflow:auto!important;height:auto!important;}
  .pg{display:none!important;}
  #pg-dr{display:block!important;}
  .card{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;}
  *{color:#000!important;}
  .gold-text{color:#b8860b!important;}
}

/* RESPONSIVE */
@media(min-width:768px){
  /* ── Layout ─────────────────────────────────────────────── */
  #app{flex-direction:row;}
  #hdr{
    width:240px;min-height:100vh;flex-direction:column;
    border-right:1px solid var(--border);border-bottom:none;
    padding-top:52px!important;
  }
  #nav{flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:12px 10px;}

  /* ── Nav tabs ───────────────────────────────────────────── */
  .nb{text-align:left;font-size:14px!important;padding:10px 16px!important;min-height:42px!important;}

  /* ── Main content area ──────────────────────────────────── */
  #main{flex:1;max-width:960px;padding:20px 28px;}

  /* ── Cards ─────────────────────────────────────────────── */
  .card{padding:20px;}
  .ct{font-size:14px!important;margin-bottom:12px!important;}

  /* ── Better contrast for LCD/desktop monitors ───────────── */
  --card:#111827;
  --border:#2a3f5a;
  --text:#f1f5f9;
  --dimL:#94a3b8;

  /* ── Typography ─────────────────────────────────────────── */
  .kpi-val{font-size:28px!important;}
  .kpi-lbl{font-size:9px!important;}
  label{font-size:13px!important;margin-top:12px!important;}
  input,select,textarea{font-size:14px!important;padding:10px 14px!important;}

  /* ── Section headings ───────────────────────────────────── */
  .hdr-brand .title{font-size:20px!important;}
  .hdr-brand .sub{font-size:11px!important;}
}

@media(max-width:767px){
  .nb{
    font-size:16px !important;
    padding:11px 16px !important;
    min-height:46px !important;
    border-radius:23px !important;
  }
  #nav{
    gap:5px;
    padding:0 8px 12px;
  }
}

@media(min-width:768px){

    --card:#111827;
    --border:#2a3f5a;
    --text:#f1f5f9;
    --dimL:#94a3b8;
  }
  body{font-size:14px;}
}</style>

function calcBrPct(brId){
  var br=null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===brId){br=BRIDGES[i];break;}}
  if(!br) return 0;
  var earned=0,totalW=0;
  for(var p=0;p<br.piers.length;p++){
    var pier=br.piers[p]; var isDr=DIRECT.indexOf(pier)>-1;
    for(var s=0;s<STAGES.length;s++){
      if(STAGES[s].id==="PIL"&&isDr) continue;
      var w=STAGES[s].w; if(isDr) w=Math.round(w*(100/82)*10)/10;
      totalW+=w;
      var sv=gps(pier,STAGES[s].id);
      if(sv==="Complete"||sv==="Inspected") earned+=w;
      else if(sv==="In Progress") earned+=w*0.3;
    }
    if(EMB_PIERS.indexOf(pier)>-1){
      totalW+=0.5;
      var ev=gps(pier,"EMB");
      if(ev==="Complete"||ev==="Inspected") earned+=0.5;
      else if(ev==="In Progress") earned+=0.25;
    }
  }
  return totalW>0?Math.round(earned/totalW*1000)/10:0;
}

function calcOverallPct(){
  // Project = Preliminary(7%) + Bridges(86.3%) + Roads(6%) + FillSlope(0.7%) = 100%
  // Preliminary is fixed baseline (fully done)
  var BR_WEIGHT=86.3; var ROAD_WEIGHT=6; var FS_WEIGHT=0.7; var PRE_WEIGHT=PRE_PCT;
  // Calculate total utility weight
  var UT_WEIGHT=typeof calcUtTotalWeight==='function'?calcUtTotalWeight():0;
  // Bridges absorb any utility weight (auto-deduction)
  // Use custom bridge weight if set by user, else auto-calculate
  if(CUSTOM_WEIGHTS&&CUSTOM_WEIGHTS.project&&CUSTOM_WEIGHTS.project.br){
    BR_WEIGHT=CUSTOM_WEIGHTS.project.br;
  } else {
    BR_WEIGHT=Math.max(0,Math.round((100-ROAD_WEIGHT-FS_WEIGHT-PRE_WEIGHT-UT_WEIGHT)*10)/10);
  }
  // Bridges earned
  var brEarned=0,brTotal=0;
  for(var b=0;b<BRIDGES.length;b++){
    for(var p=0;p<BRIDGES[b].piers.length;p++){
      var pier=BRIDGES[b].piers[p]; var isDr=DIRECT.indexOf(pier)>-1;
      for(var s=0;s<STAGES.length;s++){
        if(STAGES[s].id==="PIL"&&isDr) continue;
        var w=STAGES[s].w; if(isDr) w=Math.round(w*(100/82)*10)/10;
        brTotal+=w;
        var sv=gps(pier,STAGES[s].id);
        if(sv==="Complete"||sv==="Inspected") brEarned+=w;
        else if(sv==="In Progress") brEarned+=w*0.3;
      }
      if(EMB_PIERS.indexOf(pier)>-1){
        brTotal+=0.5;
        var ev=gps(pier,"EMB");
        if(ev==="Complete"||ev==="Inspected") brEarned+=0.5;
        else if(ev==="In Progress") brEarned+=0.25;
      }
    }
  }
  var brPctVal=brTotal>0?(brEarned/brTotal):0;
  // Roads earned
  // Road weight split — use custom if set
  var roadHalf=CUSTOM_WEIGHTS&&CUSTOM_WEIGHTS.project&&CUSTOM_WEIGHTS.project.roads?
    Math.round(CUSTOM_WEIGHTS.project.roads/2*10)/10:3;
  var roadEarned=(ROADS.ibn.pct/100*roadHalf)+(ROADS.sattam.pct/100*roadHalf);
  var fsEarned2=typeof calcFsEarned==='function'?calcFsEarned():0;
  // Utilities earned
  var utEarned=typeof calcUtTotalEarned==='function'?calcUtTotalEarned():0;
  // Total
  var total=PRE_WEIGHT + (brPctVal*BR_WEIGHT) + roadEarned + fsEarned2 + utEarned;
  return Math.round(total*10)/10;
}

function calcPierPct(pier){
  var isDr=DIRECT.indexOf(pier)>-1;
  var earned=0,total=0;
  for(var i=0;i<STAGES.length;i++){
    if(STAGES[i].id==="PIL"&&isDr) continue;
    var w=stageWeight(STAGES[i].id,isDr);
    total+=w;
    var sv=gps(pier,STAGES[i].id);
    if(sv==="Complete"||sv==="Inspected") earned+=w;
    else if(sv==="In Progress") earned+=w*0.3;
  }
  if(EMB_PIERS.indexOf(pier)>-1){
    total+=0.5;
    var ev=gps(pier,"EMB");
    if(ev==="Complete"||ev==="Inspected") earned+=0.5;
    else if(ev==="In Progress") earned+=0.25;
  }
  return total?Math.round(earned/total*1000)/10:0;
}

function p2(n){return n<10?"0"+n:""+n;}

function gps(pier,sid){return PS[pier]&&PS[pier][sid]?PS[pier][sid]:"Not Started";}


function isABT(pier){
  return pier.indexOf('-ABT') > -1;
}

function getStagesForPier(pier){
  var isDr=DIRECT.indexOf(pier)>-1;
  var abt=isABT(pier);
  if(abt){
    var abtIds=["EXC","BLD","FRC","STR","BRG","BCK","WNG","APS"];
    var result=[];
    for(var i=0;i<STAGES.length;i++){
      if(abtIds.indexOf(STAGES[i].id)>-1) result.push(STAGES[i]);
    }
    return result;
  }
  var result2=[];
  for(var j=0;j<STAGES.length;j++){
    if(STAGES[j].id==="PIL"&&isDr) continue;
    if(STAGES[j].id==="BCK"||STAGES[j].id==="WNG"||STAGES[j].id==="APS") continue;
    result2.push(STAGES[j]);
  }
  return result2;
}

function stageWeight(sid,isDirect){
  // ABT-only stages have w:0 — no weight impact
  if(sid==="BCK"||sid==="WNG"||sid==="APS") return 0;
  if(sid==="PIL"&&isDirect) return 0;
  var base=0;
  for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===sid){base=STAGES[i].w;break;}}
  if(isDirect){
    var pilW=18; var total=100;
    return Math.round(base*(total/(total-pilW))*10)/10;
  }
  return base;
}

var EMB_WEIGHT=0.5;

function overall(){
  var earned=0,totalW=0;
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i];
    for(var j=0;j<br.piers.length;j++){
      var p=br.piers[j];
      var isDr=DIRECT.indexOf(p)>-1;
      for(var k=0;k<STAGES.length;k++){
        var sid=STAGES[k].id;
        if(sid==="PIL"&&isDr) continue;
        var w=stageWeight(sid,isDr);
        totalW+=w;
        var v=gps(p,sid);
        if(v==="Complete"||v==="Inspected") earned+=w;
        else if(v==="In Progress") earned+=w*0.3;
      }
      // Road Widening weight
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=EMB_WEIGHT;
        var ev=gps(p,"EMB");
        if(ev==="Complete"||ev==="Inspected") earned+=EMB_WEIGHT;
        else if(ev==="In Progress") earned+=EMB_WEIGHT*0.3;
      }
      // Road Widening 0.5% weight per EMB pier
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=0.5;
        var rv=gps(p,"EMB");
        if(rv==="Complete"||rv==="Inspected") earned+=0.5;
        else if(rv==="In Progress") earned+=0.25;
      }
    }
  }
  var pct=totalW?parseFloat((earned/totalW*100).toFixed(2)):0;
  return{earned:Math.round(earned),totalW:Math.round(totalW),pct:pct};
}

  if(inP) return"#58A6FF";

function weUpdateTotal(){
  var inputs=document.querySelectorAll('[id^="we_"]');
  var total=0;
  inputs.forEach(function(inp){total+=parseFloat(inp.value)||0;});

  total=Math.round(total*10)/10;
  el.textContent=total+'%';
  el.style.color=Math.abs(total-100)<0.5?'var(--green)':'var(--red)';
}

function weSave(){
  var stages=window._weStages||[];
  var newW={};
  var total=0;
  for(var i=0;i<stages.length;i++){
    var inp=document.getElementById('we_'+stages[i].id);
    if(!inp) continue;
    var w=Math.round((parseFloat(inp.value)||0)*10)/10;
    newW[stages[i].id]=w;
    total+=w;
  }
  total=Math.round(total*10)/10;
  if(Math.abs(total-100)>0.5){flash('Total must be 100% (currently '+total+'%)');return;}
  if(window._weSaveCallback) window._weSaveCallback(newW);
  closeModal();
  flash('Weights saved ✅');
}

function weReset(){
  var stages=window._weStages||[];
  for(var i=0;i<stages.length;i++){
    var inp=document.getElementById('we_'+stages[i].id);
    if(inp) inp.value=stages[i].w;
  }
  weUpdateTotal();
}

function wsSave(){
  // Save project weights
  var pre=parseFloat(document.getElementById('ws-pre').value)||7;
  var br=parseFloat(document.getElementById('ws-br').value)||86.3;
  var roads=parseFloat(document.getElementById('ws-roads').value)||6;
  var fs=parseFloat(document.getElementById('ws-fs').value)||0.7;
  // Utilities weights saved via saveUtNetworks()
  var utTotal=typeof calcUtTotalWeight==="function"?calcUtTotalWeight():0;
  var total=Math.round((pre+br+roads+fs+utTotal)*10)/10;
  if(Math.abs(total-100)>0.5){flash('Total must be 100% — currently '+total+'%');return;}

  // Save stage weights
  var stageTotal=0;
  for(var i=0;i<STAGES.length;i++){
    var inp=document.getElementById('wss_'+STAGES[i].id);
    if(!inp) continue;
    var w=parseFloat(inp.value)||0;
    stageTotal+=w;
  }
  if(Math.abs(stageTotal-100)>0.5){flash('Bridge stage weights must total 100%');return;}

  // Save road weights
  var roadTotal=0;
  for(var i=0;i<ROAD_ACTS.length;i++){
    var inp2=document.getElementById('wsr_'+i);
    if(!inp2) continue;
    var w2=parseFloat(inp2.value)||0;
    roadTotal+=w2;
  }
  if(Math.abs(roadTotal-100)>0.5){flash('Road activity weights must total 100%');return;}

  // Apply all
  PRE_PCT=pre;
  CUSTOM_WEIGHTS.project={pre:pre,roads:roads,fs:fs};

  // Apply stage weights — skip abt-only stages (BCK,WNG,APS)
  var stageSum=0;
  for(var i=0;i<STAGES.length;i++){
    if(STAGES[i].id==='BCK'||STAGES[i].id==='WNG'||STAGES[i].id==='APS') continue;
    var inp3=document.getElementById('wss_'+STAGES[i].id);
    if(inp3){
      STAGES[i].w=Math.round((parseFloat(inp3.value)||0)*10)/10;
      stageSum+=STAGES[i].w;
    }
  }
  CUSTOM_WEIGHTS.stages={}; // mark as customized
  for(var i=0;i<STAGES.length;i++) CUSTOM_WEIGHTS.stages[STAGES[i].id]=STAGES[i].w;

  // Apply road weights
  for(var i=0;i<ROAD_ACTS.length;i++){
    var inp4=document.getElementById('wsr_'+i);
    if(inp4) ROAD_ACTS[i].w=parseFloat(inp4.value)||ROAD_ACTS[i].w;
  }

  // Save roads weight split (3+3)
  var halfRoads=Math.round(roads/2*10)/10;
  // Update calcOverallPct uses ROAD_WEIGHT constant — we need to update it
  // Store in CUSTOM_WEIGHTS for reference
  CUSTOM_WEIGHTS.project={pre:pre,br:Math.round(br*10)/10,roads:roads,fs:fs};
  PRE_PCT=pre;
  persist();
  rWs();
  rOv();
  buildTicker();
  flash('All weights saved ✅');
}

  var stageDefaults={PRB:2,EXC:5,BLD:3,FRB:8,FRC:10,PIL:18,STR:22,BRG:5,GRD:14,ERE:9,DEC:4,BCK:0,WNG:0,APS:0};
  for(var i=0;i<STAGES.length;i++) STAGES[i].w=stageDefaults[STAGES[i].id]||0;
  // Reset ROAD_ACTS to original defaults
  var rdDefaults=[3,7,8,12.8,11,12,14.8,18.7,4,8,0.7];

  h+='</div>';
  window._adminCallback=callback;
  openModal(h);

}

function adminSubmit(){
  var pw=document.getElementById('admin-pw');
  if(!pw) return;
  if(pw.value===ADMIN_HASH){
    ADMIN_UNLOCKED=true;
    closeModal();
    flash('Admin access granted ✅');
    if(window._adminCallback) window._adminCallback();
  } else {
    var err=document.getElementById('admin-err');
    if(err) err.textContent='❌ Incorrect password — try again';
    pw.value='';pw.focus();
  }
}

function lockAdmin(){
  ADMIN_UNLOCKED=false;
  flash('Admin locked 🔒');
  nav('ov');
}

// ── Load/Save ──────────────────────────────────────────────────
function loadUtNetworks(){
  try{
    var saved = JSON.parse(localStorage.getItem('ic1b3_utn')||'{}');
    for(var k in saved){
      if(UTIL_NETWORKS[k]){
        for(var i=0;i<UTIL_NETWORKS[k].acts.length;i++){
          if(saved[k]['a'+i]!==undefined) UTIL_NETWORKS[k]['a'+i]=saved[k]['a'+i];
        }
        if(saved[k].weight!==undefined) UTIL_NETWORKS[k].weight=saved[k].weight;
        // Always keep active:true — all networks visible by default
        UTIL_NETWORKS[k].active=true;
      }
    }
  }catch(e){}
  for(var i=0;i<UT_ORDER.length;i++) recalcUtPct(UT_ORDER[i]);
}

function saveUtNetworks(){
  var out={};
  for(var i=0;i<UT_ORDER.length;i++){
    var id=UT_ORDER[i], n=UTIL_NETWORKS[id];
    out[id]={weight:n.weight, active:n.active};
    for(var j=0;j<n.acts.length;j++){
      if(n['a'+j]) out[id]['a'+j]=n['a'+j];
    }
  }
  try{localStorage.setItem('ic1b3_utn',JSON.stringify(out));}catch(e){}
}

function recalcUtPct(id){
  var n=UTIL_NETWORKS[id];
  var earned=0;
  for(var i=0;i<n.acts.length;i++){
    var st=n['a'+i]||'Not Started';
    if(st==='Complete') earned+=n.acts[i].w;
    else if(st==='In Progress') earned+=n.acts[i].w*0.3;
  }
  n.pct=Math.round(earned*10)/10;
}

function calcUtTotalWeight(){
  var t=0;
  for(var i=0;i<UT_ORDER.length;i++){
    var n=UTIL_NETWORKS[UT_ORDER[i]];
    if(n.active) t+=n.weight||0;
  }
  return Math.round(t*10)/10;
}

function calcUtTotalEarned(){
  var e=0;
  for(var i=0;i<UT_ORDER.length;i++){
    var n=UTIL_NETWORKS[UT_ORDER[i]];
    if(n.active) e+=n.pct/100*(n.weight||0);
  }
  return Math.round(e*10)/10;
}

function setUtAct(netId, actIdx, status, btn){
  var n=UTIL_NETWORKS[netId];

  recalcUtPct(netId);

  // Update button styles
  var btns=btn.parentElement.querySelectorAll('button');
  var sColors=[SCOL['Not Started'],SCOL['In Progress'],SCOL['Complete']];

    btns[k].style.background=isSel?sColors[k]:'transparent';
    btns[k].style.color=isSel?'#000':'var(--dimL)';

function saveNewPw(){
  var oldPw=document.getElementById('cpw-old');
  var newPw=document.getElementById('cpw-new');
  var confirmPw=document.getElementById('cpw-confirm');
  var errEl=document.getElementById('cpw-err');
  if(!oldPw||!newPw||!confirmPw) return;

  // Validate current password
  if(oldPw.value!==ADMIN_HASH){
    errEl.textContent='❌ Current password is incorrect';
    oldPw.value='';oldPw.focus();
    return;
  }
  // Validate new password length
  if(newPw.value.length<6){
    errEl.textContent='❌ New password must be at least 6 characters';
    newPw.value='';newPw.focus();
    return;
  }
  // Validate confirmation
  if(newPw.value!==confirmPw.value){
    errEl.textContent='❌ Passwords do not match';
    confirmPw.value='';confirmPw.focus();
    return;
  }
  // Save new password
  ADMIN_HASH=newPw.value;
  try{localStorage.setItem('ic1_adminpw',ADMIN_HASH);}catch(e){}
  closeModal();
  flash('Password updated ✅');
}

    for(var p=0;p<BRIDGES[b].piers.length;p++){

// ── API: Get planned % for a specific date ─────────────────────
function getPlannedCurve(){ return PLAN.curve; }

function getPlannedPctForDate(dateStr){
  // Exact match
  for(var i=0;i<PLAN.curve.length;i++){
    if(PLAN.curve[i].date===dateStr) return PLAN.curve[i].pct;
  }
  // Interpolate between nearest points
  if(!PLAN.curve.length) return null;
  var sorted=PLAN.curve.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  if(dateStr<=sorted[0].date) return sorted[0].pct;
  if(dateStr>=sorted[sorted.length-1].date) return sorted[sorted.length-1].pct;
  for(var i=0;i<sorted.length-1;i++){
    if(dateStr>=sorted[i].date&&dateStr<=sorted[i+1].date){
      var t=(dateStr<sorted[i+1].date&&dateStr>sorted[i].date)?
        (new Date(dateStr)-new Date(sorted[i].date))/
        (new Date(sorted[i+1].date)-new Date(sorted[i].date)):0.5;
      return Math.round((sorted[i].pct+(sorted[i+1].pct-sorted[i].pct)*t)*10)/10;
    }
  }
  return null;
}

// ── API: Get planned activities ────────────────────────────────
function getPlannedActivities(discipline){
  if(discipline) return PLAN.activities[discipline]||[];
  return PLAN.activities;
}

// ── API: Get planned data for today ───────────────────────────
function getPlannedToday(){
  var today=new Date().toISOString().slice(0,10);
  var plannedPct=getPlannedPctForDate(today);
  var todayActivities=[];
  var discs=['bridges','roads','utilities','fillslope'];
  for(var d=0;d<discs.length;d++){
    var acts=PLAN.activities[discs[d]]||[];
    for(var i=0;i<acts.length;i++){
      if(acts[i].start<=today&&acts[i].end>=today){
        todayActivities.push({discipline:discs[d],name:acts[i].name,output:acts[i].output,unit:acts[i].unit||''});
      }
    }
  }
  return {date:today,plannedPct:plannedPct,activities:todayActivities};
}

// ── API: Compare planned vs actual ────────────────────────────
function comparePlannedActual(){
  var today=new Date().toISOString().slice(0,10);
  var plannedPct=getPlannedPctForDate(today);
  var actualPct=calcOverallPct();
  var variance2=plannedPct!==null?Math.round((actualPct-plannedPct)*10)/10:null;
  var todayPlan=getPlannedToday();
  return {
    date:today,
    planned:plannedPct,
    actual:actualPct,
    variance:variance2,
    status:variance2===null?'no_baseline':variance2>=0?'ahead':'behind',
    plannedActivities:todayPlan.activities,
    curve:PLAN.curve,
    hasBaseline:PLAN.curve.length>0
  };
}

// ── Add/remove curve point ─────────────────────────────────────
function planSetCurvePoint(dateStr,pct){
  pct=Math.max(0,Math.min(100,Math.round(parseFloat(pct)*10)/10));
  if(isNaN(pct)) return false;
  // Remove existing point for this date
  PLAN.curve=PLAN.curve.filter(function(p){return p.date!==dateStr;});
  PLAN.curve.push({date:dateStr,pct:pct});
  PLAN.curve.sort(function(a,b){return a.date<b.date?-1:1;});
  persist();
  return true;
}

function planDeleteCurvePoint(dateStr){
  PLAN.curve=PLAN.curve.filter(function(p){return p.date!==dateStr;});
  persist();
}

// ── Import CSV ─────────────────────────────────────────────────
function planImportCSV(csvText){
  var lines=csvText.trim().split(/\r?\n/);
  var imported=0,errors=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line||line.toLowerCase().indexOf('date')>-1) continue; // skip header
    var parts=line.split(',');
    if(parts.length<2){errors.push('Line '+(i+1)+': missing columns');continue;}
    var dateStr=parts[0].trim();
    var pctStr=parts[1].trim();
    // Validate date
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)){
      // Try DD/MM/YYYY
      var dp=dateStr.split('/');
      if(dp.length===3) dateStr=dp[2]+'-'+(dp[1].length<2?'0':'')+dp[1]+'-'+(dp[0].length<2?'0':'')+dp[0];
      else {errors.push('Line '+(i+1)+': invalid date '+dateStr);continue;}
    }
    var pct=parseFloat(pctStr);
    if(isNaN(pct)||pct<0||pct>100){errors.push('Line '+(i+1)+': invalid % '+pctStr);continue;}
    planSetCurvePoint(dateStr,pct);
    imported++;
  }
  return {imported:imported,errors:errors};
}

// ── Generate monthly baseline from P6 logic ───────────────────
function planGenerateMonthly(startDate,endDate,shape){
  // shape: 'linear','scurve','front_loaded','back_loaded'
  var start=new Date(startDate),end=new Date(endDate);
  var months=[];
  var d=new Date(start.getFullYear(),start.getMonth(),1);
  while(d<=end){
    months.push(d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-01');
    d.setMonth(d.getMonth()+1);
  }
  var n=months.length;
  PLAN.curve=[];
  for(var i=0;i<n;i++){
    var t=(i+1)/n;
    var pct;
    if(shape==='linear')      pct=t*100;
    else if(shape==='scurve') pct=(3*t*t-2*t*t*t)*100; // S-curve sigmoid
    else if(shape==='front')  pct=(1-Math.pow(1-t,2))*100;
    else                       pct=t*t*100; // back loaded
    PLAN.curve.push({date:months[i],pct:Math.round(pct*10)/10});
  }
  persist();
  return PLAN.curve.length;
}

// ── Add planned activity ───────────────────────────────────────
function planAddActivity(discipline,name,start,end,output,unit){
  if(!PLAN.activities[discipline]) PLAN.activities[discipline]=[];
  if(start>end){flash('Start date must be before end date');return false;}
  PLAN.activities[discipline].push({
    id:'pa_'+Date.now(),
    name:name.trim(),
    start:start,
    end:end,
    output:parseFloat(output)||0,
    unit:unit||'',
    discipline:discipline
  });
  persist();
  return true;
}

function planDeleteActivity(discipline,id){
  if(!PLAN.activities[discipline]) return;
  PLAN.activities[discipline]=PLAN.activities[discipline].filter(function(a){return a.id!==id;});
  persist();
}

// ── Validation ─────────────────────────────────────────────────
function validatePlanCurve(){
  var errors=[];
  if(!PLAN.curve.length){errors.push('No baseline curve defined');return errors;}
  var sorted=PLAN.curve.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  for(var i=0;i<sorted.length;i++){
    if(sorted[i].pct<0||sorted[i].pct>100) errors.push('Invalid %: '+sorted[i].date+' = '+sorted[i].pct+'%');
    if(i>0&&sorted[i].pct<sorted[i-1].pct) errors.push('Non-monotonic: '+sorted[i].date+' ('+sorted[i].pct+'%) < previous ('+sorted[i-1].pct+'%)');
  }
  return errors;
}

// PHASE 4 — DELAY DETECTION ENGINE
// ══════════════════════════════════════════════════════════════

function snapshotProgress(){
  var today=new Date().toISOString().slice(0,10);
  var pct=calcOverallPct();
  // Remove today's existing snapshot if any
  DAILY.snapshots=DAILY.snapshots.filter(function(s){return s.date!==today;});
  DAILY.snapshots.push({date:today,pct:pct});
  DAILY.snapshots.sort(function(a,b){return a.date<b.date?-1:1;});
  persist();
}

function detectDelays(){
  var today=new Date().toISOString().slice(0,10);
  var delays=[];
  var comp=comparePlannedActual();

  // ── 1. Planned vs Actual ─────────────────────────────────
  if(comp.hasBaseline&&comp.planned!==null){
    var gap=Math.round((comp.actual-comp.planned)*10)/10;
    if(gap<0){
      delays.push({
        type: gap<-5?'critical':'warning',
        discipline: 'Overall',
        title: 'Schedule Delay Detected',
        detail: 'Actual progress ('+comp.actual+'%) is '+Math.abs(gap)+'% below planned ('+comp.planned+'%)',
        impact: gap<-5?'High — critical path at risk':'Medium — monitor closely',
        action: 'Review with contractor and issue recovery schedule request'
      });
    }
    if(comp.actual===0&&comp.planned>0){
      delays.push({
        type:'critical',
        discipline:'Overall',
        title:'Zero Progress — Critical Alert',
        detail:'No progress recorded against planned '+comp.planned+'%',
        impact:'High — project has not started or data not updated',
        action:'Verify site mobilization and update all discipline progress'
      });
    }
  }

  // ── 2. Stagnation detection (3-day rule) ──────────────────
  var sorted=DAILY.snapshots.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  if(sorted.length>=3){
    var last3=sorted.slice(-3);
    var minPct=Math.min(last3[0].pct,last3[1].pct,last3[2].pct);
    var maxPct=Math.max(last3[0].pct,last3[1].pct,last3[2].pct);
    if(maxPct-minPct<0.5&&maxPct>0){
      delays.push({
        type:'warning',
        discipline:'Overall',
        title:'Progress Stagnation — 3-Day Alert',
        detail:'Progress has been static at ~'+Math.round(maxPct*10)/10+'% for the last 3 recorded days',
        impact:'Medium — indicates work stoppage or data entry gap',
        action:'Confirm site activity and update all discipline stages'
      });
    }
  }

  // ── 3. Discipline-specific checks ─────────────────────────
  // Bridges: any bridge with 0% and project >10% elapsed
  var tp=timePct?timePct():0;
  if(tp>10){
    for(var bi=0;bi<BRIDGES.length;bi++){
      var bp=brPct2?brPct2(BRIDGES[bi].id):0;
      if(bp===0){
        delays.push({
          type:'warning',
          discipline:'Bridges',
          title:'Bridge '+BRIDGES[bi].id+' — Not Started',
          detail:'Bridge '+BRIDGES[bi].id+' shows 0% progress with '+tp+'% of project time elapsed',
          impact:'Medium — may affect overall schedule',
          action:'Confirm mobilization status for Bridge '+BRIDGES[bi].id
        });
      }
    }
  }

  // Roads: both roads at 0 and project >20% elapsed
  var rdPct4=Math.round(((ROADS.ibn.pct||0)+(ROADS.sattam.pct||0))/2*10)/10;
  if(rdPct4===0&&tp>20){
    delays.push({
      type:'warning',
      discipline:'Roads',
      title:'Road Works — Not Started',
      detail:'No road activity recorded despite '+tp+'% of project time elapsed',
      impact:'Medium — road works should be active by now',
      action:'Coordinate with contractor on road pavement schedule'
    });
  }

  // Utilities: any active network with weight>0 and pct=0 and tp>15
  var utDelay=false;
  for(var ni=0;ni<UT_ORDER.length;ni++){
    var n=UTIL_NETWORKS[UT_ORDER[ni]];
    if(n.active&&(n.weight||0)>0&&(n.pct||0)===0&&tp>15&&!utDelay){
      delays.push({
        type:'info',
        discipline:'Utilities',
        title:'Utility Networks — No Progress Recorded',
        detail:'Active utility networks have 0% progress with '+tp+'% of project time elapsed',
        impact:'Low-Medium — utilities must be complete before road surfacing',
        action:'Update utility activity stages in the Utilities module'
      });
      utDelay=true;
    }
  }

  return delays;
}

  // Today photos and entries
  var todayPhotos=DAILY.photos.filter(function(p){return p.date===today;});

  var brSummary=[];

  ctx+='- Ibn Saud Road: '+(ROADS.ibn.pct||0)+'%\n';

  var utPct4=0,utActive=0;

    var n=UTIL_NETWORKS[UT_ORDER[ni]];
    if(n.active&&(n.weight||0)>0){utPct4+=n.pct||0;utActive++;}
  }
  ctx+='- Utilities: '+(utActive>0?Math.round(utPct4/utActive*10)/10+'% avg across '+utActive+' networks':'not configured')+'\n';
  ctx+='- Fill Slope: '+(typeof calcFsEarned==="function"?Math.round(calcFsEarned()/0.7*100*10)/10+'%':'0%')+'\n';

  if(todayPlan.activities.length){
    ctx+='\nPLANNED ACTIVITIES TODAY:\n';

      ctx+='- '+todayPlan.activities[ti].discipline.toUpperCase()+': '+todayPlan.activities[ti].name;
      if(todayPlan.activities[ti].output) ctx+=' ('+todayPlan.activities[ti].output+' '+todayPlan.activities[ti].unit+')';
      ctx+='\n';

  }

  if(todayEntries.length){

    for(var ei=0;ei<todayEntries.length;ei++){

      if(todayEntries[ei].notes) ctx+=': '+todayEntries[ei].notes;
      ctx+='\n';
    }
  }

  if(delays.length){
    ctx+='\nDETECTED DELAYS/ALERTS:\n';
    for(var di2=0;di2<delays.length;di2++){
      ctx+='- ['+delays[di2].type.toUpperCase()+'] '+delays[di2].discipline+': '+delays[di2].title+'\n';
      ctx+='  Detail: '+delays[di2].detail+'\n';
    }
  }

  ctx+='\nLOG ENTRIES (last 5):\n';
  var recentLogs=LOGS.slice(-5);
  for(var li2=0;li2<recentLogs.length;li2++){

  }

  return ctx;
}

// ── Generate AI Daily Report ───────────────────────────────────
async function generateAIReport(){
  if(DAILY_GENERATING){flash('Report generation in progress…');return;}
  if(!DAILY.workerUrl){aiSwitch('settings');flash('Configure Worker URL in Setup tab first');return;}

  DAILY_GENERATING=true;
  var btn=document.getElementById('ai-gen-btn');
  if(btn){btn.textContent='⏳ Generating…';btn.disabled=true;}

  var ctx=buildAIContext();
  var prompt=ctx+'\n\nBased on the project data above, write a professional daily progress report for the IC1 Road Improvements project. Structure your response EXACTLY as follows using these section headers:\n\n[ACHIEVEMENTS]\n(2-4 bullet points of what was accomplished today or recently)\n\n[DELAYS]\n(2-4 bullet points of any delays, if none write "No significant delays detected")\n\n[RISKS]\n(2-3 bullet points of upcoming risks)\n\n[TOMORROWS_PLAN]\n(3-4 bullet points of planned activities for tomorrow)\n\n[EXECUTIVE_SENTENCE]\n(One professional sentence summarizing the overall project status in consultant-grade language)\n\nKeep each bullet point concise (max 2 lines). Tone: professional, direct, consultant-grade. Do not repeat the data verbatim — synthesize and interpret it.';

  try{
    // Use Cloudflare Worker proxy (key is server-side, never exposed)
    var workerUrl=DAILY.workerUrl||localStorage.getItem('ic1_worker_url')||'';
    if(!workerUrl){
      DAILY_GENERATING=false;
      if(btn){btn.textContent='🤖 Generate Report';btn.disabled=false;}
      aiSwitch('settings');
      flash('Enter the Worker URL in Settings first');
      return;
    }

    var resp=await fetch(workerUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt})
    });
    var data=await resp.json();
    var text='';
    if(data.ok&&data.text){
      text=data.text;
    } else if(data.error){
      throw new Error(data.error);
    }
    // Parse sections
    var report=parseAIReport(text);
    // Save to history
    var today=new Date().toISOString().slice(0,10);
    DAILY.reports=DAILY.reports.filter(function(r){return r.date!==today;});
    DAILY.reports.push({
      id:'dr_'+Date.now(),
      date:today,
      generated:new Date().toISOString(),
      raw:text,
      parsed:report,
      delays:detectDelays(),
      overall:calcOverallPct()
    });
    persist();
    DAILY_GENERATING=false;
    rAi();
    flash('AI Report generated ✅');
  }catch(err){
    DAILY_GENERATING=false;
    if(btn){btn.textContent='🤖 Generate AI Report';btn.disabled=false;}
    flash('Error: '+err.message);
    console.error(err);
  }
}

function parseAIReport(text){
  var sections={achievements:[],delays:[],risks:[],tomorrow:[],executive:''};
  var current=null;
  var lines=text.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line) continue;
    if(line==='[ACHIEVEMENTS]'){current='achievements';continue;}
    if(line==='[DELAYS]'){current='delays';continue;}
    if(line==='[RISKS]'){current='risks';continue;}
    if(line==='[TOMORROWS_PLAN]'){current='tomorrow';continue;}
    if(line==='[EXECUTIVE_SENTENCE]'){current='executive';continue;}
    if(current==='executive'){sections.executive+=line+' ';continue;}
    if(current&&line.match(/^[-•*]/)){
      sections[current].push(line.replace(/^[-*]\s*/,''));
    } else if(current&&current!=='executive'&&line.length>10){
      sections[current].push(line);
    }
  }
  sections.executive=sections.executive.trim();
  return sections;
}

function aiAddPhoto(input){
  if(!input.files||!input.files[0]) return;
  var disc=document.getElementById('ai-ph-disc');
  var cap=document.getElementById('ai-ph-cap');
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result;
    // Create thumbnail
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var MAX=300;
      var ratio=Math.min(MAX/img.width,MAX/img.height);
      canvas.width=Math.round(img.width*ratio);
      canvas.height=Math.round(img.height*ratio);
      var ctx3=canvas.getContext('2d');
      ctx3.drawImage(img,0,0,canvas.width,canvas.height);
      var thumb=canvas.toDataURL('image/jpeg',0.7);
      var today=new Date().toISOString().slice(0,10);
      DAILY.photos.push({
        id:'ph_'+Date.now(),
        date:today,
        discipline:disc?disc.value:'general',
        caption:cap&&cap.value.trim()?cap.value.trim():'Site photo',
        base64:base64,
        thumb:thumb,
        ts:Date.now()
      });
      if(cap) cap.value='';
      persist();rAi();
      flash('Photo added ✅');
    };
    img.src=base64;
  };
  reader.readAsDataURL(input.files[0]);
}

function dlWorkerFile(){
  var workerCode=`/**
 * SiteSync AI Proxy — Cloudflare Worker
 * SETUP:
 * 1. Go to dash.cloudflare.com → Workers & Pages → Create Worker
 * 2. Paste this file → Deploy
 * 3. Settings → Variables → Add: ANTHROPIC_KEY = sk-ant-YOUR-KEY
 * 4. Copy worker URL → paste in SiteSync AI Report Settings
 */

export default {
  async fetch(request, env) {
    const cors = {
      'Access-Control-Allow-Origin': '*',
      'Access-Control-Allow-Methods': 'POST, OPTIONS',
      'Access-Control-Allow-Headers': 'Content-Type',
      'Content-Type': 'application/json'
    };
    if (request.method === 'OPTIONS') return new Response(null, { headers: cors });
    if (request.method !== 'POST') return new Response(JSON.stringify({ error: 'POST only' }), { status: 405, headers: cors });

    let body;
    try { body = await request.json(); } catch(e) { return new Response(JSON.stringify({ error: 'Invalid JSON' }), { status: 400, headers: cors }); }
    if (!body.prompt) return new Response(JSON.stringify({ error: 'Missing prompt' }), { status: 400, headers: cors });

    const apiKey = env.ANTHROPIC_KEY;
    if (!apiKey || !apiKey.startsWith('sk-ant-')) {
      return new Response(JSON.stringify({ error: 'Add ANTHROPIC_KEY to worker variables' }), { status: 500, headers: cors });
    }

    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: body.prompt }] })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error?.message || 'Anthropic error ' + r.status);
      return new Response(JSON.stringify({ text: d.content?.[0]?.text || '', ok: true }), { headers: cors });
    } catch(err) {
      return new Response(JSON.stringify({ error: err.message }), { status: 502, headers: cors });
    }
  }
};`;
  var blob=new Blob([workerCode],{type:'text/javascript'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='sitesync-worker.js';a.click();
  URL.revokeObjectURL(url);
  flash('Worker file downloaded ✅');
}

// ── Field Report handlers ──────────────────────────────────────
function frSwitch(tab){ _frTab=tab; rFr(); }

function frSetStatus(btn){
  _frDiaryStatus=btn.dataset.st;
  var btns=btn.parentElement.querySelectorAll('button');
  var sCols7=['var(--green)','var(--blue)','var(--amber)','var(--red)'];
  var sSts=['Completed','In Progress','Delayed','Blocked'];
  for(var k=0;k<btns.length;k++){
    var isSel=btns[k].dataset.st===_frDiaryStatus;
    btns[k].style.background=isSel?sCols7[k]:'transparent';
    btns[k].style.color=isSel?'#000':'var(--dimL)';
  }
}

function frAddDiary(){
  var act=document.getElementById('fr-act');
  if(!act||!act.value.trim()){flash('Enter activity description');return;}
  var disc=document.getElementById('fr-disc');
  var notes=document.getElementById('fr-notes');
  var today=new Date().toISOString().slice(0,10);
  FIELD.diary.push({
    id:'fd_'+Date.now(),
    date:today,
    discipline:disc?disc.value:'general',
    activity:act.value.trim(),
    status:_frDiaryStatus,
    notes:notes?notes.value.trim():'',
    ts:Date.now()
  });
  act.value='';
  if(notes) notes.value='';
  persist();rFr();flash('Activity logged ✅');
}

function frDeleteDiary(id){
  FIELD.diary=FIELD.diary.filter(function(e){return e.id!==id;});
  persist();rFr();
}

function frAddPhoto(input){
  if(!input.files||!input.files[0]) return;
  var disc=document.getElementById('fr-ph-disc');
  var cap=document.getElementById('fr-ph-cap');
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result;
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var MAX=400;
      var ratio=Math.min(MAX/img.width,MAX/img.height);
      canvas.width=Math.round(img.width*ratio);
      canvas.height=Math.round(img.height*ratio);
      var ctx2=canvas.getContext('2d');
      ctx2.drawImage(img,0,0,canvas.width,canvas.height);
      var thumb=canvas.toDataURL('image/jpeg',0.75);
      var today=new Date().toISOString().slice(0,10);
      FIELD.photos.push({
        id:'fp_'+Date.now(),
        date:today,
        discipline:disc?disc.value:'general',
        caption:cap&&cap.value.trim()?cap.value.trim():'Site photo',
        thumb:thumb,
        ts:Date.now()
      });
      if(cap) cap.value='';
      persist();rFr();flash('Photo saved ✅');
    };
    img.src=base64;
  };
  reader.readAsDataURL(input.files[0]);
}

function frDeletePhoto(id){
  FIELD.photos=FIELD.photos.filter(function(p){return p.id!==id;});
  persist();rFr();
}

function frInitInputs(){
  // Called once on load — binds change events to static inputs
  var cam=document.getElementById('fr-cam-static');
  var gal=document.getElementById('fr-gal-static');
  if(cam&&!cam._bound){
    cam.addEventListener('change',function(){
      if(this.files&&this.files[0]){frProcessPhoto(this.files[0]);}
      this.value='';
    });
    cam._bound=true;
  }
  if(gal&&!gal._bound){
    gal.addEventListener('change',function(){
      if(this.files&&this.files[0]){frProcessPhoto(this.files[0]);}
      this.value='';
    });
    gal._bound=true;
  }
}

function frProcessPhoto(file){
  var disc=document.getElementById('fr-ph-disc');
  var cap=document.getElementById('fr-ph-cap');
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result;
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var MAX=600;
      var ratio=Math.min(MAX/img.width,MAX/img.height,1);
      canvas.width=Math.round(img.width*ratio);
      canvas.height=Math.round(img.height*ratio);
      var ctx2=canvas.getContext('2d');
      ctx2.drawImage(img,0,0,canvas.width,canvas.height);
      var thumb=canvas.toDataURL('image/jpeg',0.75);
      var today=new Date().toISOString().slice(0,10);
      FIELD.photos.push({
        id:'fp_'+Date.now(),
        date:today,
        discipline:disc?disc.value:'general',
        caption:cap&&cap.value.trim()?cap.value.trim():'Site photo',
        thumb:thumb,
        ts:Date.now()
      });
      if(cap) cap.value='';
      persist();
      rFr();
      flash('Photo saved ✅');
    };
    img.src=base64;
  };
  reader.readAsDataURL(file);
}

function buildTicker(){
  var items=[];

  // ── Time elapsed % ────────────────────────────────────────
  var startD=new Date("2025-06-01");
  var endD=new Date("2027-09-01");
  var todayD=new Date();
  var timePct2=Math.round(Math.max(0,Math.min(100,(todayD-startD)/(endD-startD)*100))*10)/10;

  // ── Overall progress with variance arrow ─────────────────
  var ov2=calcOverallPct();
  var variance2=Math.round((ov2-timePct2)*10)/10;
  var ovArrow=variance2>0?"🟢▲":variance2<0?"🔴▼":"⚪";
  var ovCol=variance2>0?"#06D6A0":variance2<0?"#EF4444":"#94a3b8";
  items.push({t:ovArrow+" "+ov2+"% OVERALL  "+(variance2>=0?"+":"")+variance2+"% vs PLAN",c:ovCol});

  // ── Active piers ──────────────────────────────────────────
  items.push({t:"⚙ "+activP()+" ACTIVE PIERS",c:"#58A6FF"});

  // ── Total piers ───────────────────────────────────────────
  items.push({t:"🏗 "+countAllPiers()+" TOTAL PIERS",c:"#D4A843"});

  // ── Each bridge with arrow ────────────────────────────────
  for(var i=0;i<BRIDGES.length;i++){
    var bp=brPct(BRIDGES[i].id);
    var bArrow=bp>=50?"🟢▲":bp>0?"🟡▲":"⚪";
    var bCol=bp>=50?"#06D6A0":bp>0?"#D4A843":"#4a5568";
    items.push({t:bArrow+" BR-"+BRIDGES[i].id+": "+bp+"%",c:bCol});
  }

  // ── Roads ─────────────────────────────────────────────────
  var ibnP=Math.round(ROADS.ibn.pct*10)/10;
  var satP=Math.round(ROADS.sattam.pct*10)/10;
  var rArrow1=ibnP>=50?"🟢▲":ibnP>0?"🟡▲":"⚪";
  var rArrow2=satP>=50?"🟢▲":satP>0?"🟡▲":"⚪";
  items.push({t:rArrow1+" IBN SAUD: "+ibnP+"%",c:ibnP>0?"#3B82F6":"#4a5568"});
  items.push({t:rArrow2+" PR. SATTAM: "+satP+"%",c:satP>0?"#3B82F6":"#4a5568"});

  // ── Fill Slope ────────────────────────────────────────────
  var fsE=Math.round(calcFsEarned()/0.7*100);
  var fsArrow=fsE>=100?"🟢▲":fsE>0?"🟡▲":"⚪";
  items.push({t:fsArrow+" FILL SLOPE: "+fsE+"%",c:fsE>0?"#4ECDC4":"#4a5568"});

  // ── Recent logs ───────────────────────────────────────────
  for(var j=LOGS.length-1;j>=Math.max(0,LOGS.length-3);j--){
    var stgN="";
    for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===LOGS[j].stage){stgN=STAGES[s].name;break;}}
    if(LOGS[j].stage==="EMB") stgN="Road Widening";
    var lArrow=LOGS[j].status==="Complete"?"🟢✓":LOGS[j].status==="In Progress"?"🟡►":"⚪";
    items.push({t:lArrow+" Pier "+LOGS[j].pier+" (Br-"+LOGS[j].bridge+") "+stgN+" — "+LOGS[j].status,c:"#8892a4"});
  }

  var h='<span class="t-badge">📡 SITESYNC</span>';
  for(var k=0;k<items.length;k++){
    if(k>0) h+='<span class="t-sep">◆</span>';
    h+='<span class="t-item" style="color:'+items[k].c+';">'+items[k].t+'</span>';
  }
  var el=document.getElementById("ticker-inner");
  el.innerHTML=h;
  startTickerScroll();
}


function countAllPiers(){

  for(var i=0;i<BRIDGES.length;i++) n+=BRIDGES[i].piers.length;

function rOv(){
  // ── Gather all discipline data ────────────────────────────
  var ov=calcOverallPct();
  var tp=timePct ? timePct() : 0;
  var variance=Math.round((ov-tp)*10)/10;
  var dr=daysLeft ? daysLeft() : '--';

  // Utilities — from pre-defined networks
  var utTotal=typeof calcUtTotalWeight==='function'?calcUtTotalWeight():0;
  var utEarned=typeof calcUtTotalEarned==='function'?calcUtTotalEarned():0;
  var utPct=utTotal>0?Math.round(utEarned/utTotal*100*10)/10:0;

  // Bridges
  var utDeduct=utTotal;
  var brW=Math.round(Math.max(0,100-6-0.7-PRE_PCT-utDeduct)*10)/10;
  var brEarned=0,brWtotal=0;
  for(var b=0;b<BRIDGES.length;b++){
    for(var p=0;p<BRIDGES[b].piers.length;p++){
      var pier=BRIDGES[b].piers[p];
      var isDr=DIRECT.indexOf(pier)>-1;
      for(var s=0;s<STAGES.length;s++){
        if(STAGES[s].id==="PIL"&&isDr) continue;
        var w=STAGES[s].w;
        if(isDr) w=Math.round(w*(100/82)*10)/10;
        brWtotal+=w;
        var sv=gps(pier,STAGES[s].id);
        if(sv==="Complete"||sv==="Inspected") brEarned+=w;
        else if(sv==="In Progress") brEarned+=w*0.3;
      }
    }
  }
  var brPct=brWtotal>0?Math.round(brEarned/brWtotal*100*10)/10:0;

  // Roads
  var rdPct=Math.round(((ROADS.ibn.pct||0)+(ROADS.sattam.pct||0))/2*10)/10;
  var rdW=6;

  // Fill Slope
  var fsEarned=typeof calcFsEarned==="function"?calcFsEarned():0;
  var fsPct=Math.round(fsEarned/0.7*100*10)/10;
  var fsW=0.7;

  // Preliminary
  var prePct=100;
  var preW=PRE_PCT;

  // Discipline data array
  var discs=[
    {id:"tr", label:"Bridges",         icon:"🌉", pct:brPct,  w:brW,   col:"#D4A843", earned:Math.round(brPct/100*brW*10)/10},
    {id:"rd", label:"Roads",           icon:"🛣",  pct:rdPct,  w:rdW,   col:"#58A6FF", earned:Math.round(rdPct/100*rdW*10)/10},
    {id:"ut", label:"Utilities",       icon:"🔧", pct:utPct,  w:utTotal,col:"#38BDF8", earned:utEarned},
    {id:"fs", label:"Fill Slope",      icon:"⛰️", pct:fsPct,  w:fsW,   col:"#4ECDC4", earned:Math.round(fsEarned*10)/10},
    {id:"ws", label:"Prelim. Works",   icon:"📋", pct:prePct, w:preW,  col:"#06D6A0", earned:Math.round(prePct/100*preW*10)/10}
  ];

  // ── Warnings engine ────────────────────────────────────────
  var warns=[];
  var totalW=Math.round((brW+rdW+utTotal+fsW+preW)*10)/10;
  if(Math.abs(totalW-100)>0.5) warns.push({t:"error",m:"Total weights = "+totalW+"% (must be 100%)"});
  if(brW<60) warns.push({t:"error",m:"Bridge weight critically low ("+brW+"%)"});
  else if(brW<70) warns.push({t:"warn",m:"Bridge weight approaching limit ("+brW+"%)"});
  if(variance<-5) warns.push({t:"warn",m:"Project is "+Math.abs(variance)+"% behind schedule"});
  if(utTotal===0) warns.push({t:"info",m:"No utility networks configured — tap 🔧 Utilities to add"});
  if(brPct===0&&brW>0) warns.push({t:"info",m:"Bridge works not yet started"});
  if(rdPct===0) warns.push({t:"info",m:"Road works not yet started"});

  var h="";

  // ── Page header ────────────────────────────────────────────
  h+="<div style='background:linear-gradient(135deg,var(--card),#0d1420);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;'>";
  h+="<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;'>";
  h+="<div>";
  h+="<div style='font-size:11px;color:var(--dimL);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px;'>IC1 ROAD IMPROVEMENTS</div>";
  h+="<div style='font-size:18px;font-weight:900;color:var(--text);letter-spacing:-0.5px;'>Dashboard</div>";
  h+="</div>";
  var vCol=variance>=0?"var(--green)":"var(--red)";
  h+="<div style='text-align:right;'>";
  h+="<div style='font-size:28px;font-weight:900;color:var(--gold);'>"+ov+"%</div>";
  h+="<div style='font-size:11px;font-weight:700;color:"+vCol+";'>"+(variance>=0?"▲ +":"▼ ")+variance+"% vs plan</div>";
  h+="</div></div>";

  // ── Build donut SVG ───────────────────────────────────────
  function buildDonutSVG(segments, cx, sublabel){
    var r=52, stroke=14, circ=2*Math.PI*r;
    var total=0;
    for(var i=0;i<segments.length;i++) total+=segments[i].val;
    var svg="<svg viewBox='0 0 120 120' style='width:110px;height:110px;'>";
    svg+="<circle cx='60' cy='60' r='"+r+"' fill='none' stroke='var(--panel)' stroke-width='"+stroke+"'/>";
    if(total>0){
      var cumAngle=-90;
      for(var i=0;i<segments.length;i++){
        if(segments[i].val<=0) continue;
        var pct=segments[i].val/total;
        var dashArr=circ*pct+" "+(circ*(1-pct));
        svg+="<circle cx='60' cy='60' r='"+r+"' fill='none' stroke='"+segments[i].col+"' ";
        svg+="stroke-width='"+stroke+"' stroke-dasharray='"+dashArr+"' ";
        svg+="stroke-dashoffset='"+(circ*0.25)+"' ";
        svg+="transform='rotate("+cumAngle+" 60 60)' stroke-linecap='butt'/>";
        cumAngle+=pct*360;
      }
    } else {
      svg+="<circle cx='60' cy='60' r='"+r+"' fill='none' stroke='#2a3f5a' stroke-width='"+stroke+"'/>";
    }
    svg+="<text x='60' y='55' text-anchor='middle' font-family='Segoe UI,Arial,sans-serif' font-size='14' font-weight='900' fill='var(--text)'>"+cx+"</text>";
    svg+="<text x='60' y='70' text-anchor='middle' font-family='Segoe UI,Arial,sans-serif' font-size='8' fill='var(--dimL)'>"+sublabel+"</text>";
    svg+="</svg>";
    return svg;
  }

  // Weight segments
  var wSegs=[];
  for(var i=0;i<discs.length;i++){
    if(discs[i].w>0) wSegs.push({col:discs[i].col,val:discs[i].w,label:discs[i].label,icon:discs[i].icon});
  }
  // Progress segments
  var pSegs=[];
  for(var i=0;i<discs.length;i++){
    if(discs[i].w>0) pSegs.push({col:discs[i].col,val:Math.round(discs[i].pct*discs[i].w/100*10)/10,label:discs[i].label,icon:discs[i].icon});
  }

  // ── Donuts row ─────────────────────────────────────────────
  h+="<div style='display:flex;gap:10px;margin-bottom:14px;align-items:flex-start;'>";

  // LEFT: Weight donut + legend
  h+="<div style='flex:1;'>";
  h+="<div style='text-align:center;'>"+buildDonutSVG(wSegs,totalW+'%','WEIGHTS')+"</div>";
  h+="<div style='font-size:10px;color:var(--dimL);font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:8px;'>Weight Split</div>";
  // Legend
  h+="<div style='background:var(--panel);border-radius:8px;padding:8px 10px;'>";
  for(var i=0;i<discs.length;i++){
    if(discs[i].w<=0) continue;

    {col:'#E63946',lbl:'On Hold'},

    var pierEarned=0,pierTotal=0;
    for(var si=0;si<stages.length;si++){
      pierTotal+=stages[si].w;

    h+='</div></div>';
    h+='<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;';
    h+='background:'+statusColors[Math.max(0,curIdx)]+'22;color:'+statusColors[Math.max(0,curIdx)]+';">'+curStatus+'</span>';

    h+='<div style="display:flex;gap:4px;">';

      h+='<button data-pier="'+pier+'" data-sid="'+s.id+'" data-st="'+statusList[k]+'" ';

function trSetStage(btn){
  var pier=btn.dataset.pier;
  var sid=btn.dataset.sid;
  var status=btn.dataset.st;
  if(!PS[pier]) PS[pier]={};
  PS[pier][sid]=status;
  // Log it
  var today=new Date().toISOString().slice(0,10);
  var brId='?';
  for(var b=0;b<BRIDGES.length;b++) if(BRIDGES[b].piers.indexOf(pier)>-1){brId=BRIDGES[b].id;break;}
  var stageName='';
  for(var s=0;s<STAGES.length;s++) if(STAGES[s].id===sid){stageName=STAGES[s].name;break;}
  LOGS.unshift({pier:pier,bridge:brId,stage:stageName,status:status,date:today,ts:Date.now()});
  if(LOGS.length>200) LOGS=LOGS.slice(0,200);
  persist();
  rTr();
  buildTicker();
}

function tStage(pier,sid){
  var cur=gps(pier,sid);
  var nv=nxt(cur);
  if(!PS[pier]) PS[pier]={};
  PS[pier][sid]=nv;
  var stgN="";
  for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===sid){stgN=STAGES[i].name;break;}}
  var br="";
  for(var j=0;j<BRIDGES.length;j++){
    if(BRIDGES[j].piers.indexOf(pier)>-1){br=BRIDGES[j].id;break;}
  }
  LOGS.push({id:Date.now(),date:td(),bridge:br,pier:pier,stage:sid,status:nv,notes:""});
  persist(); rTr(); buildTicker();
  flash(pier+" - "+stgN+": "+nv);
}

function tEmb(pier){
  var cur=gps(pier,"EMB");
  var nv=nxt(cur);
  if(!PS[pier]) PS[pier]={};
  PS[pier]["EMB"]=nv;
  var br="";
  for(var j=0;j<BRIDGES.length;j++){
    if(BRIDGES[j].piers.indexOf(pier)>-1){br=BRIDGES[j].id;break;}
  }
  LOGS.push({id:Date.now(),date:td(),bridge:br,pier:pier,stage:"EMB",status:nv,notes:"Road Widening"});
  persist(); rTr(); buildTicker();
  flash("Road Widening: "+nv);
}

      break;

  }

function addLog(){

function addDrEmail(){
  var inp=document.getElementById("dr-email-input");

  if(DR_EMAILS.indexOf(em)>-1){flash("Already added");return;}
  DR_EMAILS.push(em);
  try{localStorage.setItem("ic1_dr_emails",JSON.stringify(DR_EMAILS));}catch(e){}
  inp.value=""; rDr(); flash("Email added");
}

function removeDrEmail(i){
  DR_EMAILS.splice(i,1);
  try{localStorage.setItem("ic1_dr_emails",JSON.stringify(DR_EMAILS));}catch(e){}
  rDr();
}

function emailReport(){
  var recipients=getSelectedContacts("dr");
  if(recipients.length===0){flash("Select at least one recipient");return;}
  var today=td(); var ov=overall();
  var todayLogs=LOGS.filter(function(l){return l.date===today;});
  var subj="IC1 Bridges - Daily Progress Report - "+formatDate(today);
  var body="Dear Team,\n\nDaily Progress Report for IC1 Bridges.\n\n";
  body+="Date: "+formatDate(today)+"\n";
  body+="Overall Progress: "+ov.pct+"%\n";
  body+="Active Piers: "+activP()+"\n\n";
  body+="TODAY'S ACTIVITIES:\n";
  if(todayLogs.length===0){body+="No activities logged today.\n";}
  else{
    for(var i=0;i<todayLogs.length;i++){
      var stgN3="";
      for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===todayLogs[i].stage){stgN3=STAGES[s].name;break;}}
      if(todayLogs[i].stage==="EMB") stgN3="Road Widening";
      body+="- "+todayLogs[i].pier+" (Br-"+todayLogs[i].bridge+"): "+stgN3+" - "+todayLogs[i].status+"\n";
    }
  }
  body+="\nBRIDGE PROGRESS:\n";
  for(var bi=0;bi<BRIDGES.length;bi++){
    var bp3=brPct(BRIDGES[bi].id);
    if(bp3>0) body+="Bridge "+BRIDGES[bi].id+": "+bp3+"%\n";

  body+="\nPrepared by: Kamel Dimachkie - Head of Surveying\nKhatib & Alami - SiteSync Bridges";
  var ml="mailto:"+recipients.join(",")+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
  window.location.href=ml;
  flash("Opening email app...");
}

function extractEmail(){

  if(!txt){flash("Please paste email text first");return;}
  var btn=document.getElementById("em-btn");
  btn.textContent="Extracting..."; btn.disabled=true;

  var prompt='You are analyzing a construction site email for IC1 Bridges project, Diriyah, Saudi Arabia.\n\n'
    +'Extract all construction activities. For each identify:\n'
    +'1. Bridge letter (A,B,C,D,E,G,K,L,M,N)\n'
    +'2. Pier name (e.g. 3E, 1A-ABT)\n'
    +'3. Stage code - one of: PRB=Probing, EXC=Excavation, BLD=Blinding, FRB=Foundation Rebar, FRC=Foundation Concrete, PIL=Piling, STR=Pier Structure, BRG=Bearings, GRD=Girder Supply, ERE=Girder Erection, DEC=Deck Slab, EMB=Road Widening\n'
    +'4. Status: Complete, In Progress, or Not Started\n\n'
    +'EMAIL:\n'+txt+'\n\n'
    +'Respond ONLY with a JSON array:\n'
    +'[{"bridge":"E","pier":"3E","stage":"EXC","status":"Complete"},{"bridge":"E","pier":"4E","stage":"BLD","status":"In Progress"}]\n'
    +'If nothing found return []. No other text.';

  if(!ANTHROPIC_KEY||ANTHROPIC_KEY.length<10){flash("Save your API key first");btn.textContent="EXTRACT WITH AI";btn.disabled=false;return;}
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":ANTHROPIC_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    btn.textContent="EXTRACT WITH AI"; btn.disabled=false;
    var txt2=data.content&&data.content[0]?data.content[0].text:"[]";
    txt2=txt2.replace(/```json|```/g,"").trim();
    var items; try{items=JSON.parse(txt2);}catch(e){items=[];}
    showExtracted(items);
  })
  .catch(function(e){
    btn.textContent="EXTRACT WITH AI"; btn.disabled=false;

  });

function showExtracted(items){

  EM_EXTRACTED=items;

  h+='<div style="font-size:11px;color:var(--dimL);margin-bottom:10px;">Select which to add:</div>';

    h+='<div style="font-size:11px;font-weight:700;color:'+sc+';">'+it.status+'</div>';

function confirmImport(){
  var added=0; var today2=td();
  for(var i=0;i<EM_EXTRACTED.length;i++){
    var chk=document.getElementById("em-chk-"+i);
    if(!chk||!chk.checked) continue;
    var it=EM_EXTRACTED[i];
    if(!PS[it.pier]) PS[it.pier]={};
    PS[it.pier][it.stage]=it.status;
    var stgN=""; for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===it.stage){stgN=STAGES[s].name;break;}}
    if(it.stage==="EMB") stgN="Road Widening";
    LOGS.push({id:Date.now()+i,date:today2,bridge:it.bridge,pier:it.pier,stage:it.stage,status:it.status,notes:"Imported from email",source:"email"});
    added++;
  }
  persist(); buildTicker();
  flash(added+" activities added to Tracker!");
  document.getElementById("em-text").value="";
  document.getElementById("em-results").innerHTML="";
  EM_EXTRACTED=[];
}

        var sv=gps(pier,STAGES[s].id);

    var r=42, stroke=12, circ=2*Math.PI*r;
    var total=0; for(var i=0;i<segs.length;i++) total+=segs[i].val;
    var svg='<svg viewBox="0 0 100 100" style="width:'+sz+'pt;height:'+sz+'pt;">';
    svg+='<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="#E9ECEF" stroke-width="'+stroke+'"/>';
    if(total>0){
      var cumAngle=-90;
      for(var i=0;i<segs.length;i++){
        if(segs[i].val<=0) continue;
        var pct=segs[i].val/total;
        var dash=circ*pct+' '+(circ*(1-pct));
        svg+='<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+segs[i].col+'" ';
        svg+='stroke-width="'+stroke+'" stroke-dasharray="'+dash+'" ';
        svg+='stroke-dashoffset="'+(circ*0.25)+'" ';
        svg+='transform="rotate('+cumAngle+' 50 50)" stroke-linecap="butt"/>';
        cumAngle+=pct*360;
      }

    svg+='</svg>';
    return svg;
  }

function startSyncTimer(){
  if(asTimer) clearInterval(asTimer);
  pullSync();
  asTimer=setInterval(function(){pullSync();},15000);
}

function connectAs(){
  var url=document.getElementById("as-url-inp").value.trim();
  // JSONBin is always connected — no URL needed
  flash("Already connected via JSONBin ✅");
  closeModal();
  setSyncDot("ok");
  return;
  if(!url||url.indexOf("script.google.com")<0){flash("Please enter a valid Apps Script URL");return;}
  AS_URL=url;
  try{localStorage.setItem(AS_URL_KEY,AS_URL);}catch(e){}
  setSyncDot("sync");
  flash("Connecting...");
  // Test connection with a GET request
  var xhr=new XMLHttpRequest();
  xhr.open("GET",AS_URL,true);
  xhr.timeout=8000;
  xhr.onload=function(){
    AS_CONNECTED=true;
    setSyncDot("ok");
    flash("Connected ✅ Sync active");
    closeModal();
    startSyncTimer();
  };
  xhr.onerror=function(){
    // no-cors mode — if no error thrown, assume connected
    AS_CONNECTED=true;
    try{localStorage.setItem(AS_URL_KEY,AS_URL);}catch(e){}
    setSyncDot("ok");
    flash("Connected ✅");
    closeModal();
    startSyncTimer();
  };
  xhr.ontimeout=function(){
    flash("Connection timed out — check URL");
    setSyncDot("");
  };
  try{ xhr.send(); } catch(e){
    AS_CONNECTED=true;
    setSyncDot("ok");
    flash("Connected ✅");
    closeModal();
    startSyncTimer();
  }
}

function disconnectAs(){
  AS_CONNECTED=false; AS_URL="";
  try{localStorage.removeItem(AS_URL_KEY);}catch(e){}
  if(asTimer) clearInterval(asTimer);
  setSyncDot(""); closeModal(); flash("Disconnected");
}

function pushSync(){
  JB_PUSHING=true;
  JB_LAST_PUSH=Date.now();
  setSyncDot("sync");
  var rds={};
  try{rds=JSON.parse(localStorage.getItem('ic1b3_roads')||'{}');}catch(e){}
  var now2=new Date();
  var ts2=Date.now();
  var hh2=now2.getHours(); var mm2=now2.getMinutes();
  var timeStr2=(hh2<10?"0"+hh2:hh2)+":"+(mm2<10?"0"+mm2:mm2);
  // First GET latest to merge, then PUT merged result
  fetch(JB_URL+"/latest",{
    method:"GET",
    headers:{"X-Master-Key":JB_KEY,"X-Bin-Meta":"false"}
  })
  .then(function(r){return r.json();})
  .then(function(resp){
    var remote=resp.record||resp;
    var mergedPS=remote&&remote.ps?JSON.parse(JSON.stringify(remote.ps)):{};
    // Apply local changes on top of remote
    for(var pier in PS){
      if(!mergedPS[pier]) mergedPS[pier]={};
      for(var stage in PS[pier]){
        mergedPS[pier][stage]=PS[pier][stage];
      }
    }
    // Merge messages — combine remote + local, deduplicate by ts
    var remoteMsgs=remote&&remote.messages?remote.messages:[];
    var mergedMsgs=remoteMsgs.slice();
    for(var mi=0;mi<MESSAGES.length;mi++){
      var exists=false;
      for(var mj=0;mj<mergedMsgs.length;mj++){
        if(mergedMsgs[mj].ts===MESSAGES[mi].ts){exists=true;break;}
      }
      if(!exists) mergedMsgs.push(MESSAGES[mi]);
    }
    mergedMsgs.sort(function(a,b){return a.ts-b.ts;});
    mergedMsgs=mergedMsgs.slice(-20);
    MESSAGES=mergedMsgs;
    try{localStorage.setItem('ic1b3_msg',JSON.stringify(MESSAGES));}catch(e){}
    var payload={ps:mergedPS,logs:LOGS,issues:ISSUES,roads:rds,pre:PRE_PCT,messages:mergedMsgs,ts:ts2,
    syncedBy:MY_NAME,syncedAt:timeStr2,
    teamLocs:TEAM_LOCS,
    myLoc:{name:MY_NAME,lat:MY_LOC.lat,lng:MY_LOC.lng,acc:MY_LOC.acc,ts:ts2,lastAction:"Updated data"}
  };
    return fetch(JB_URL,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JB_KEY,"X-Bin-Versioning":"false"},
      body:JSON.stringify(payload)
    });
  })
  .then(function(r){return r.json();})
  .then(function(d){
    JB_PUSHING=false;
    JB_LAST_PUSH=Date.now();

function getMyLocation(callback){
  if(!navigator.geolocation){
    if(callback) callback(null);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      MY_LOC={
        lat:Math.round(pos.coords.latitude*100000)/100000,
        lng:Math.round(pos.coords.longitude*100000)/100000,
        acc:Math.round(pos.coords.accuracy),
        ts:Date.now()
      };
      if(callback) callback(MY_LOC);
    },
    function(err){if(callback) callback(null);},
    {enableHighAccuracy:true,timeout:8000,maximumAge:60000}
  );
}

function updateMyLocation(){

    if(loc) pushSync();
  });
}

function getLocLabel(loc){
  if(!loc||!loc.lat) return "Location unavailable";

function getGoogleMapsUrl(lat,lng){

function sendHeartbeat(){
  if(!JB_CONNECTED) return;
  getMyLocation(function(loc){
    var now3=new Date();
    var ts3=Date.now();
    var hh3=now3.getHours(); var mm3=now3.getMinutes();
    var timeStr3=(hh3<10?"0"+hh3:hh3)+":"+(mm3<10?"0"+mm3:mm3);
    // Update my location in TEAM_LOCS
    TEAM_LOCS[MY_NAME]={
      name:MY_NAME,
      lat:loc?loc.lat:MY_LOC.lat,
      lng:loc?loc.lng:MY_LOC.lng,
      acc:loc?loc.acc:MY_LOC.acc,
      ts:ts3,
      online:true,
      lastSeen:timeStr3,
      lastAction:"Online"
    };
    // Push heartbeat — GET current data, merge my location, PUT back
    fetch(JB_URL+"/latest",{
      method:"GET",
      headers:{"X-Master-Key":JB_KEY,"X-Bin-Meta":"false"}
    })
    .then(function(r){return r.json();})
    .then(function(resp){
      var d=resp.record||resp;
      var tl=d.teamLocs||{};
      tl[MY_NAME]={
        name:MY_NAME,
        lat:loc?loc.lat:MY_LOC.lat,
        lng:loc?loc.lng:MY_LOC.lng,
        acc:loc?loc.acc:MY_LOC.acc,
        ts:ts3,
        online:true,
        lastSeen:timeStr3,
        lastAction:d.teamLocs&&d.teamLocs[MY_NAME]?d.teamLocs[MY_NAME].lastAction||"Online":"Online"
      };
      // Only update teamLocs — don't change pier data
      var payload=JSON.parse(JSON.stringify(d));
      payload.teamLocs=tl;
      payload.myLoc=tl[MY_NAME];
      return fetch(JB_URL,{
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":JB_KEY,"X-Bin-Versioning":"false"},
        body:JSON.stringify(payload)
      });
    })
    .catch(function(){});
  });
}

function isOnline(ts){
  // Online if last seen within 5 minutes
  return ts&&(Date.now()-ts)<300000;
}

function startHeartbeat(){
  sendHeartbeat();
  setInterval(sendHeartbeat,120000); // every 2 minutes
}

function pullSync(){
  if(JB_PUSHING) return;
  if(Date.now()-JB_LAST_PUSH < 5000) return;
  setSyncDot("sync");
  fetch(JB_URL+"/latest",{
    method:"GET",
    headers:{"X-Master-Key":JB_KEY,"X-Bin-Meta":"false"}
  })
  .then(function(r){return r.json();})
  .then(function(resp){
    var d=resp.record||resp;
      // ── Always update locations regardless of timestamp ──
      if(d.teamLocs) TEAM_LOCS=d.teamLocs;
      // ── Always update messages ───────────────────────────
      if(d.messages!==undefined&&d.messages!==null){
        var oldLen=MESSAGES.length;
        MESSAGES=d.messages;
        try{localStorage.setItem('ic1b3_msg',JSON.stringify(MESSAGES));}catch(e){}
        // Notify if new messages arrived
        if(MESSAGES.length>oldLen){
          var lastMsg=MESSAGES[MESSAGES.length-1];
          if(lastMsg.sender!==MY_NAME) showMsgAlert(lastMsg);
          // Update chat tab badge
          var chTab=document.getElementById('tab-ch');
          if(chTab&&document.querySelector('#tab-ch.on')===null){
            chTab.innerHTML='💬 Chat <span style="background:#E53E3E;color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;margin-left:3px;">'+
              (MESSAGES.length-oldLen)+'</span>';
          }
        }
      }
      if(d.myLoc&&d.myLoc.name&&d.myLoc.name!==MY_NAME){
        TEAM_LOCS[d.myLoc.name]=d.myLoc;
      }
      // ── Pier data — only update if newer ────────────────
      if(d&&d.ps&&d.ts){
      if(d.ts<=JB_LAST_PULL_TS){setSyncDot("ok");return;}
      JB_LAST_PULL_TS=d.ts;
      // MERGE pier data — don't replace, only add new entries
      var remotePiers=d.ps;
      var changed=false;
      var syncedBy=d.syncedBy||"Team";
      var syncedAt=d.syncedAt||"";
      for(var pier in remotePiers){
        if(!PS[pier]){
          // New pier data from remote
          PS[pier]=remotePiers[pier];
          changed=true;
        } else {
          // Merge stage-by-stage
          for(var stage in remotePiers[pier]){
            if(PS[pier][stage]!==remotePiers[pier][stage]){
              PS[pier][stage]=remotePiers[pier][stage];
              changed=true;
            }
          }
        }
      }
      // Merge roads if remote is newer
      if(d.roads&&Object.keys(d.roads).length){
        for(var rk in d.roads){
          if(!ROADS[rk]) ROADS[rk]=d.roads[rk];
        }
      }
      if(d.pre&&!PRE_PCT) PRE_PCT=parseFloat(d.pre)||7;
      // Save merged data
      try{localStorage.setItem("ic1b3_ps",JSON.stringify(PS));}catch(e){}
      try{localStorage.setItem("ic1b3_roads",JSON.stringify(ROADS));}catch(e){}
      try{localStorage.setItem("ic1b3_pre",String(PRE_PCT));}catch(e){}
  try{localStorage.setItem("ic1b3_fs",JSON.stringify(FILL_SLOPE));}catch(e){}
  // Utilities saved via saveUtNetworks()
  try{localStorage.setItem("ic1b3_cw",JSON.stringify(CUSTOM_WEIGHTS));}catch(e){}
  try{localStorage.setItem('ic1b3_msg',JSON.stringify(MESSAGES.slice(-20)));}catch(e){}
  try{localStorage.setItem('ic1b3_plan',JSON.stringify(PLAN));}catch(e){}
  try{localStorage.setItem('ic1b3_field',JSON.stringify({photos:FIELD.photos.slice(-100),diary:FIELD.diary.slice(-500)}));}catch(e){}
  try{localStorage.setItem('ic1b3_daily',JSON.stringify({photos:DAILY.photos.slice(-50),entries:DAILY.entries.slice(-200),reports:DAILY.reports.slice(-30),snapshots:DAILY.snapshots.slice(-90),apiKey:DAILY.apiKey}));}catch(e){}
      // Update sync label
      var lsEl=document.getElementById("last-sync-lbl");
      var now=new Date();
      var ts=(now.getHours()<10?"0"+now.getHours():now.getHours())+":"+(now.getMinutes()<10?"0"+now.getMinutes():now.getMinutes());
      if(lsEl){lsEl.textContent="Synced: "+ts;lsEl.style.display="inline";}
      // Refresh Map or Chat tab if currently open
      var activeTab=document.querySelector('.nb.on');
      if(activeTab&&activeTab.id==='tab-mp') nav('mp');
      if(activeTab&&activeTab.id==='tab-ch') rCh();
      // Refresh other tabs + alert only when pier data changed
      if(changed){
        showSyncAlert(syncedBy,syncedAt);
        if(activeTab&&activeTab.id!=='tab-mp'&&activeTab.id!=='tab-ch') nav(activeTab.id.replace('tab-',''));
      }
    }
    setSyncDot("ok");
    JB_CONNECTED=true;
  })
  .catch(function(e){setSyncDot("ok");});
}

  var mon=new Date(now.setDate(diff));
  var sun=new Date(mon); sun.setDate(mon.getDate()+6);

function buildEmailBody(logs){
  var body="ACTIVITIES:\n";
  if(logs.length===0){body+="No activities logged.\n";}
  else{
    for(var i=0;i<logs.length;i++){
      var stgN=""; for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===logs[i].stage){stgN=STAGES[s].name;break;}}
      if(logs[i].stage==="EMB") stgN="Road Widening";
      body+="- "+logs[i].date+" | "+logs[i].pier+" (Br-"+logs[i].bridge+"): "+stgN+" - "+logs[i].status+"\n";
    }
  }
  body+="\nBRIDGE PROGRESS:\n";
  for(var j=0;j<BRIDGES.length;j++){
    var bp=brPct(BRIDGES[j].id);
    if(bp>0) body+="Bridge "+BRIDGES[j].id+": "+bp+"%\n";
  }
  body+="\nPrepared by: Kamel Dimachkie - Head of Surveying - Khatib & Alami\nSiteSync — Bridges, Diriyah, Saudi Arabia";
  return body;
}

function addContact(rt){
  var name=document.getElementById("ct-name-"+rt).value.trim();
  var email=document.getElementById("ct-email-"+rt).value.trim();
  if(!name||!email||email.indexOf("@")<0){flash("Enter valid name and email");return;}
  CONTACTS.push({name:name,email:email});
  saveContacts();
  flash("Contact added: "+name);
  // Refresh current report
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function delContact(i,rt){
  CONTACTS.splice(i,1); saveContacts();
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function selAllContacts(rt){
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk) chk.checked=true;
  }
}

function getSelectedContacts(rt){
  var out=[];
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk&&chk.checked) out.push(CONTACTS[i].email);
  }
  // Also include DR_EMAILS for backward compat
  for(var j=0;j<DR_EMAILS.length;j++){
    if(out.indexOf(DR_EMAILS[j])<0) out.push(DR_EMAILS[j]);
  }
  return out;
}

function copyEmails(rt){
  // Select all first
  selAllContacts(rt);
  var all=[];
  for(var i=0;i<CONTACTS.length;i++) all.push(CONTACTS[i].email);
  for(var j=0;j<DR_EMAILS.length;j++){
    if(all.indexOf(DR_EMAILS[j])<0) all.push(DR_EMAILS[j]);
  }
  if(all.length===0){flash("No contacts to copy");return;}
  var txt=all.join(", ");
  // Try modern clipboard API first
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){
      flash("Copied "+all.length+" emails to clipboard!");
    }).catch(function(){
      fallbackCopy(txt,all.length);
    });
  } else {
    fallbackCopy(txt,all.length);
  }
}

function fallbackCopy(txt,count){
  var ta=document.createElement("textarea");
  ta.value=txt;
  ta.style.position="fixed";
  ta.style.opacity="0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{
    document.execCommand("copy");
    flash("Copied "+count+" emails — paste into your mail app To: field");
  }catch(e){
    flash("Copy failed — try selecting manually");
  }
  document.body.removeChild(ta);
}

function editLog(idx){

  var h = '<div class="ct">Edit Log Entry</div>';

  h += '<label>Date</label>';
  h += '<input type="date" id="el-date" value="'+lg.date+'">';

  h += '<label>Bridge</label>';
  h += '<select id="el-br" onchange="elUpdPiers()">';
  for(var i=0;i<BRIDGES.length;i++){
    h += '<option value="'+BRIDGES[i].id+'"'+(BRIDGES[i].id===lg.bridge?' selected':'')+'>Bridge '+BRIDGES[i].id+'</option>';
  }
  h += '</select>';

  h += '<label>Pier</label>';
  h += '<select id="el-pier">';
  var brO = null;

  if(brO){
    for(var p=0;p<brO.piers.length;p++){
      h += '<option value="'+brO.piers[p]+'"'+(brO.piers[p]===lg.pier?' selected':'')+'>'+brO.piers[p]+'</option>';
    }
  }
  h += '</select>';

  h += '<label>Stage</label>';
  h += '<select id="el-stage">';
  for(var s=0;s<STAGES.length;s++){
    h += '<option value="'+STAGES[s].id+'"'+(STAGES[s].id===lg.stage?' selected':'')+'>'+STAGES[s].name+'</option>';
  }
  h += '<option value="EMB"'+(lg.stage==="EMB"?' selected':'')+'>Road Widening</option>';
  h += '</select>';

  h += '<label>Status</label>';
  h += '<select id="el-status">';
  for(var st=0;st<STATUS_LIST.length;st++){
    h += '<option'+(STATUS_LIST[st]===lg.status?' selected':'')+'>'+STATUS_LIST[st]+'</option>';
  }
  h += '</select>';

  h += '<textarea id="el-notes" style="min-height:70px;">'+lg.notes+'</textarea>';

  h += '<div style="display:flex;gap:8px;margin-top:4px;">';
  h += '<button class="btn gold" onclick="saveEditLog('+lg.id+')">Save Changes</button>';
  h += '<button class="btn sec" onclick="deleteLog('+lg.id+')">Delete Entry</button>';
  h += '</div>';

  openModal(h);
}

function elUpdPiers(){
  var br = document.getElementById("el-br").value;
  var sel = document.getElementById("el-pier"); sel.innerHTML = "";
  for(var i=0;i<BRIDGES.length;i++){
    if(BRIDGES[i].id===br){
      for(var j=0;j<BRIDGES[i].piers.length;j++){
        var o = document.createElement("option");
        o.value = BRIDGES[i].piers[j]; o.textContent = BRIDGES[i].piers[j];
        sel.appendChild(o);
      }
      break;
    }
  }
}

function saveEditLog(id){
  var date   = document.getElementById("el-date").value;
  var br     = document.getElementById("el-br").value;
  var pier   = document.getElementById("el-pier").value;
  var stage  = document.getElementById("el-stage").value;
  var status = document.getElementById("el-status").value;
  var notes  = document.getElementById("el-notes").value;

  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){
      LOGS[i].date=date; LOGS[i].bridge=br; LOGS[i].pier=pier;
      LOGS[i].stage=stage; LOGS[i].status=status; LOGS[i].notes=notes;
      break;
    }
  }
  // Also update PS
  if(!PS[pier]) PS[pier]={};
  PS[pier][stage]=status;
  persist();
  closeModal();
  flash("Log entry updated");
  rLg();
}

function deleteLog(id){
  if(!confirm("Delete this log entry?")) return;
  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){ LOGS.splice(i,1); break; }
  }
  persist();
  closeModal();
  flash("Entry deleted");
  rLg();
}

  closeModal();

  rLg(); buildTicker();
}

function clearLogsOnly(){
  if(!confirm("Clear all log history?")) return;
  LOGS=[];
  try{localStorage.setItem("ic1b3_lg",JSON.stringify(LOGS));}catch(e){}
  closeModal();
  flash("Logs cleared");
  rLg(); buildTicker();
}

function clearBridge(){
  var br = document.getElementById("clear-br").value;
  if(!confirm("Clear all data for Bridge "+br+"?")) return;
  var brO = null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===br){brO=BRIDGES[i];break;}}
  if(!brO) return;
  // Remove pier statuses
  for(var j=0;j<brO.piers.length;j++) delete PS[brO.piers[j]];
  // Remove logs
  LOGS = LOGS.filter(function(l){return l.bridge!==br;});
  persist();
  closeModal();
  flash("Bridge "+br+" data cleared");
  rLg(); buildTicker();
}
