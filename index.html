function sendMsg(){
  var inp=document.getElementById('ch-inp');
  if(!inp) return;
  var txt=inp.value.trim();
  if(!txt) return;
  var now=new Date();
  var ts=(now.getHours()<10?'0'+now.getHours():now.getHours())+':'+(now.getMinutes()<10?'0'+now.getMinutes():now.getMinutes());
  var msg={sender:MY_NAME,text:txt,time:ts,ts:Date.now()};
  MESSAGES.push(msg);
  if(MESSAGES.length>20) MESSAGES=MESSAGES.slice(-20);
  inp.value='';
  // Reset tab badge
  var chTab=document.getElementById('tab-ch');
  if(chTab) chTab.innerHTML='💬 Chat';
  persist();
  pushSync();
  rCh();
}

function clearChat(){
  if(!confirm('Clear all chat messages for the entire team?')) return;
  MESSAGES=[];
  try{localStorage.setItem('ic1b3_msg','[]');}catch(e){}
  setSyncDot("sync");
  // GET current data → wipe messages only → PUT back (bypass merge)
  fetch(JB_URL+"/latest",{
    method:"GET",
    headers:{"X-Master-Key":JB_KEY,"X-Bin-Meta":"false"}
  })
  .then(function(r){return r.json();})
  .then(function(resp){
    var d=resp.record||resp;
    d.messages=[];
    d.clearTs=Date.now();
    return fetch(JB_URL,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JB_KEY,"X-Bin-Versioning":"false"},
      body:JSON.stringify(d)
    });
  })
  .then(function(){
    setSyncDot("ok");
    flash("Chat cleared for all team ✅");
    rCh();
  })
  .catch(function(){
    setSyncDot("ok");
    rCh();
  });
}

function calcFsEarned(){
  var total=0;
  var items=[
    {key:"lm_r",w:0.175},{key:"lm_l",w:0.175},
    {key:"mn_r",w:0.175},{key:"mn_l",w:0.175}
  ];
  for(var i=0;i<items.length;i++){
    var st=FILL_SLOPE[items[i].key]||"Not Started";
    if(st==="Complete") total+=items[i].w;
    else if(st==="In Progress") total+=items[i].w*0.3;

  return Math.round(total*1000)/1000;
}

function rdSetAct(btn){
  var rdKey=btn.dataset.rdkey;
  var ai=parseInt(btn.dataset.ai);
  var st=btn.dataset.st;
  ROADS[rdKey+'.act.'+ai]=st;
  // Recalc pct for this road
  var ROAD_ACTS2=[{w:3},{w:7},{w:8},{w:12.8},{w:11},{w:12},{w:14.8},{w:18.7},{w:4},{w:8},{w:0.7}];
  var earned3=0,total3=0;
  for(var i=0;i<ROAD_ACTS2.length;i++){
    total3+=ROAD_ACTS2[i].w;
    var s3=ROADS[rdKey+'.act.'+i]||'Not Started';
    if(s3==='Complete') earned3+=ROAD_ACTS2[i].w;
    else if(s3==='In Progress') earned3+=ROAD_ACTS2[i].w*0.3;
  }
  ROADS[rdKey].pct=total3>0?Math.round(earned3/total3*100*10)/10:0;
  persist();
  rRd();
  buildTicker();
}

function rdReset(rdKey){
  if(!confirm('Reset all stages for '+rdKey+' road?')) return;
  for(var i=0;i<ROAD_ACTS.length;i++) delete ROADS[rdKey+'.act.'+i];
  ROADS[rdKey].pct=0;
  persist();rRd();buildTicker();flash('Road reset ✅');
}

  var h=hPrefix||'';

  // Build S-curve data: planned vs actual per month
  var months=["Jun'25","Jul","Aug","Sep","Oct","Nov","Dec","Jan'26","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan'27","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep'27"];

  var planned=[0,1,2,3,4,5,6,7,10,14,18,23,28,34,41,48,55,62,68,74,79,84,88,92,95,97,99,100];
  // Actual: read from saved S-curve data
  var SCA={};
  try{ SCA=JSON.parse(localStorage.getItem("ic1b3_sca")||"{}"); }catch(e){}

  var actual=[];
  for(var mi=0;mi<months.length;mi++){
    var key=months[mi].replace("'","");
    if(SCA[key]!==undefined) actual.push(SCA[key]);
    else actual.push(null);
  }
  // Fill last known actual up to today
  var lastKnown=null;
  for(var ai=0;ai<actual.length;ai++){
    if(actual[ai]!==null) lastKnown=actual[ai];
  }

  var W=320; var H=180; var PAD=36;
  var chartW=W-PAD-8; var chartH=H-PAD-16;

  function px(i){ return PAD+Math.round(i/(months.length-1)*chartW); }
  function py(v){ return (H-PAD)-Math.round(v/100*chartH); }

  h+='<div class="card">';

  h+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:500px;display:block;margin:0 auto;">';

    h+='<line x1="'+PAD+'" y1="'+gy+'" x2="'+(PAD+chartW)+'" y2="'+gy+'" stroke="#ffffff0a" stroke-width="1"/>';
    h+='<text x="'+(PAD-4)+'" y="'+(gy+3)+'" text-anchor="end" font-size="7" fill="#4a6a8a">'+gv+'</text>';
  }
  // Month labels (every 4)
  for(var ml=0;ml<months.length;ml+=4){
    var lx=px(ml);
    h+='<line x1="'+lx+'" y1="'+(H-PAD)+'" x2="'+lx+'" y2="'+(H-PAD+3)+'" stroke="#4a6a8a" stroke-width="1"/>';
    h+='<text x="'+lx+'" y="'+(H-PAD+10)+'" text-anchor="middle" font-size="7" fill="#4a6a8a">'+months[ml]+'</text>';

  h+='<line x1="'+PAD+'" y1="'+(H-PAD)+'" x2="'+(PAD+chartW)+'" y2="'+(H-PAD)+'" stroke="#2a3a54" stroke-width="1.5"/>';
  h+='<line x1="'+PAD+'" y1="16" x2="'+PAD+'" y2="'+(H-PAD)+'" stroke="#2a3a54" stroke-width="1.5"/>';

  // Planned curve (dashed gold)
  var planPath="M";
  for(var pi2=0;pi2<planned.length;pi2++){
    planPath+=(pi2>0?" L":"")+px(pi2)+" "+py(planned[pi2]);
  }
  h+='<path d="'+planPath+'" stroke="#D4A843" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.7"/>';

  // Planned fill
  var planFill=planPath+" L"+(PAD+chartW)+" "+(H-PAD)+" L"+PAD+" "+(H-PAD)+" Z";
  h+='<path d="'+planFill+'" fill="#D4A84312"/>';

  // Actual curve — always starts at project start (0,0)
  var actPts=[{x:px(0),y:py(0)}];
  for(var ai2=0;ai2<actual.length;ai2++){
    if(actual[ai2]!==null) actPts.push({x:px(ai2),y:py(actual[ai2])});
  }
  // Always add current overall as latest point
  var todayMIdx=Math.min(months.length-1, Math.floor((new Date()-new Date("2025-06-01"))/(30*86400000)));
  // Avoid duplicate if today already in actPts
  var lastAct=actPts[actPts.length-1];
  if(lastAct.x!==px(todayMIdx)||lastAct.y!==py(ov)){
    actPts.push({x:px(todayMIdx),y:py(ov)});

  // Draw actual line (always — starts from project start)

  // TODAY line
  var todayX2=px(Math.min(months.length-1,todayMIdx));
  h+='<line x1="'+todayX2+'" y1="16" x2="'+todayX2+'" y2="'+(H-PAD)+'" stroke="#E63946" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>';

  h+='<text x="80" y="8" font-size="7" fill="#06D6A0">Actual</text>';
  h+='</g>';

  h+='</svg>';

  var plannedNow=planned[Math.min(planned.length-1,todayMIdx)]||0;

  h+='<div style="text-align:center;padding:8px 16px;background:var(--panel);border-radius:8px;">';
  h+='<div style="font-size:11px;color:var(--dimL);">Actual</div>';
  h+='<div style="font-size:20px;font-weight:900;color:var(--green);">'+ov+'%</div>';
  h+='</div>';
  h+='<div style="text-align:center;padding:8px 16px;background:var(--panel);border-radius:8px;">';
  h+='<div style="font-size:11px;color:var(--dimL);">Variance</div>';
  h+='<div style="font-size:20px;font-weight:900;color:'+varC+';">'+varLbl+' '+Math.abs(variance)+'%</div>';

  document.getElementById("pg-gn").innerHTML=h;

function rGnMatrix(hPrefix){
  var h=hPrefix||'';

  h+='<div style="display:flex;min-width:700px;">';
  h+='<div style="min-width:90px;font-size:8px;color:var(--dimL);padding:3px 6px;font-weight:700;">BRIDGE / PIER</div>';
  for(var si=0;si<STAGES.length;si++){
    h+='<div style="flex:1;min-width:32px;text-align:center;padding:3px 1px;">';
    h+='<div style="font-size:7px;font-weight:700;color:'+STAGES[si].col+';">'+STAGES[si].id+'</div>';
    h+='<div style="font-size:7px;color:var(--dimL);white-space:nowrap;overflow:hidden;">'+STAGES[si].w+'%</div>';

  }
  h+='<div style="min-width:36px;text-align:center;padding:3px 2px;font-size:7px;font-weight:700;color:var(--gold);">PCT</div>';
  h+='</div>';

  // Each bridge block
  for(var bi=0;bi<BRIDGES.length;bi++){
    var br=BRIDGES[bi];
    var brPctV=calcBrPct(br.id);
    var brC=brPctV===100?"var(--green)":brPctV>0?"var(--gold)":"var(--dim)";

    // Bridge header row
    h+='<div style="display:flex;min-width:700px;background:var(--panel);border-top:2px solid var(--border);margin-top:4px;">';
    h+='<div style="min-width:90px;padding:5px 6px;">';
    h+='<div style="font-size:11px;font-weight:900;color:var(--gold);">Bridge '+br.id+'</div>';
    h+='<div style="font-size:9px;color:var(--dimL);">'+br.piers.length+' piers</div>';
    h+='</div>';
    // Stage progress per bridge
    for(var si2=0;si2<STAGES.length;si2++){
      var done3=0,act3=0,hold3=0,tot3=0;
      for(var pi3=0;pi3<br.piers.length;pi3++){
        var p3=br.piers[pi3]; var d3=DIRECT.indexOf(p3)>-1;
        if(STAGES[si2].id==="PIL"&&d3) continue;
        tot3++;
        var sv3=gps(p3,STAGES[si2].id);
        if(sv3==="Complete"||sv3==="Inspected") done3++;
        else if(sv3==="In Progress") act3++;
        else if(sv3==="On Hold") hold3++;
      }
      var stPct3=tot3>0?Math.round((done3+act3*0.3)/tot3*100):0;
      var stC3=done3===tot3&&tot3>0?"#06D6A0":act3>0?"#58A6FF":hold3>0?"#E63946":"var(--dim)";
      h+='<div style="flex:1;min-width:32px;text-align:center;padding:4px 1px;">';
      if(tot3===0){
        h+='<div style="font-size:8px;color:var(--dim);">—</div>';
      } else {
        h+='<div style="font-size:9px;font-weight:700;color:'+stC3+';">'+stPct3+'%</div>';
        // Mini bar
        h+='<div style="height:3px;background:var(--card);border-radius:2px;margin:1px 3px;">';
        h+='<div style="width:'+stPct3+'%;height:3px;background:'+stC3+';border-radius:2px;"></div></div>';
      }
      h+='</div>';
    }
    h+='<div style="min-width:36px;text-align:center;padding:4px 2px;">';
    h+='<div style="font-size:11px;font-weight:900;color:'+brC+';">'+brPctV+'%</div>';
    h+='</div></div>';

    // Pier rows
    for(var pi=0;pi<br.piers.length;pi++){
      var pier=br.piers[pi];
      var isDr=DIRECT.indexOf(pier)>-1;
      var pp=calcPierPct(pier);
      var pc=pp===100?"#06D6A0":pp>0?"#D4A843":"#3a4a5a";
      var rowBg=pi%2===0?"var(--card)":"var(--panel)";

      h+='<div style="display:flex;align-items:center;min-width:700px;background:'+rowBg+';border-bottom:1px solid var(--border)11;">';
      h+='<div style="min-width:90px;padding:3px 6px 3px 14px;">';
      h+='<div style="font-size:8.5px;color:var(--dimL);">'+pier+'</div>';
      h+='</div>';

      for(var si=0;si<STAGES.length;si++){
        var stId=STAGES[si].id;
        var isDrPIL=stId==="PIL"&&isDr;
        var sv=isDrPIL?"N/A":gps(pier,stId);
        var bg=SC[sv]||"";
        var sym=sv==="Complete"||sv==="Inspected"?"✓":sv==="In Progress"?"▶":sv==="On Hold"?"⏸":isDrPIL?"—":"·";
        var fc=SC[sv]||"#3a4a5a";

        h+='<div title="'+pier+' · '+stId+': '+sv+'" ';
        h+='style="flex:1;min-width:32px;height:24px;display:flex;align-items:center;justify-content:center;';
        h+='background:'+(bg?bg+"22":"transparent")+';cursor:default;">';
        h+='<span style="font-size:10px;font-weight:900;color:'+fc+';">'+sym+'</span>';
        h+='</div>';
      }
      h+='<div style="min-width:36px;text-align:center;padding:3px 2px;">';
      h+='<div style="font-size:9px;font-weight:700;color:'+pc+';">'+pp+'%</div>';
      h+='</div></div>';
    }
  }

  // Road rows
  h+='<div style="margin-top:12px;border-top:2px solid var(--blue)33;padding-top:8px;">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px;">🛣 Road Works</div>';
  var rdList=[{key:"ibn",lbl:"Ibn Saud Road"},{key:"sattam",lbl:"Sattam Road"}];
  for(var ri=0;ri<rdList.length;ri++){
    var rp=ROADS[rdList[ri].key].pct||0; var rs=ROADS[rdList[ri].key].status||"Not Started";
    var rc=rp===100?"#06D6A0":rp>0?"#58A6FF":"var(--dim)";

    h+='<div style="font-size:10px;color:'+rc+';">'+rs+'</div>';
    h+='</div>';
  }
  h+='</div>';

  h+='</div>';
  document.getElementById("pg-gn").innerHTML=h;
}

    h+='<div style="font-size:13px;font-weight:700;color:var(--gold);">Bridge '+brJ.id+'</div>';
    h+='<div style="font-size:10px;color:var(--dimL);">'+brJ.piers.length+' piers · '+activeCnt+' active</div>';
    h+='<div class="pbar-wrap" style="margin:6px 0;"><div class="pbar" style="width:'+pctJ+'%;background:'+colJ+';"></div></div>';
    h+='</div>';
  }
  // Road cards
  h+='<div style="display:flex;gap:8px;margin-top:10px;">';
  var mpRds=[{key:"ibn",lbl:"Ibn Saud Road",icon:"🛣"},{key:"sattam",lbl:"Prince Sattam Road",icon:"🛤"}];
  for(var ri=0;ri<mpRds.length;ri++){
    var rk=mpRds[ri].key; var rl=mpRds[ri].icon;
    var rp=ROADS[rk].pct||0; var rs=ROADS[rk].status||"Not Started";
    var rc=rs==="Complete"?"var(--green)":rs==="In Progress"?"var(--blue)":rs==="On Hold"?"var(--red)":"var(--dim)";
    h+='<div class="card" style="flex:1;padding:12px;cursor:pointer;border-top:2px solid var(--blue);" onclick="nav(\'rd\');rRd();">';
    h+='<div style="font-size:15px;">'+rl+'</div>';
    h+='<div style="font-size:11px;font-weight:700;color:var(--blue);margin:2px 0;">'+mpRds[ri].lbl+'</div>';
    h+='<div style="font-size:24px;font-weight:900;color:'+rc+';">'+rp+'%</div>';
    h+='<div style="height:4px;background:var(--panel);border-radius:2px;margin:5px 0;"><div style="width:'+rp+'%;height:100%;background:var(--blue);border-radius:2px;"></div></div>';
    h+='<div style="font-size:10px;color:'+rc+';">'+rs+'</div>';
    h+='</div>';
  }
  h+='</div>';
  h+='</div>';

  
  // ── Team Location Panel ───────────────────────────────────
  h+='<div class="card" style="margin-top:12px;">';
  h+='<div class="ct" style="margin-bottom:10px;">📍 Team Locations</div>';

  // My location
  h+='<div style="margin-bottom:10px;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">';
  h+='<span style="font-size:11px;font-weight:700;color:var(--gold);">📌 My Location</span>';
  h+='<button onclick="updateMyLocation();rMp();" style="padding:4px 10px;background:var(--gold);border:none;border-radius:6px;color:#000;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;">Update</button>';
  h+='</div>';

  if(MY_LOC.lat){
    var myMapsUrl=getGoogleMapsUrl(MY_LOC.lat,MY_LOC.lng);
    var myTime=new Date(MY_LOC.ts);
    var myTs=(myTime.getHours()<10?"0"+myTime.getHours():myTime.getHours())+":"+(myTime.getMinutes()<10?"0"+myTime.getMinutes():myTime.getMinutes());
    h+='<div style="background:var(--panel);border-radius:8px;padding:8px 12px;border-left:3px solid var(--gold);">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;">'+MY_NAME+'</div>';
    h+='<div style="font-size:10px;color:var(--dimL);">'+MY_LOC.lat+', '+MY_LOC.lng+'</div>';
    h+='<div style="font-size:10px;color:var(--dimL);">Accuracy: ±'+MY_LOC.acc+'m &nbsp;·&nbsp; Updated: '+myTs+'</div>';
    h+='<a href="'+myMapsUrl+'" target="_blank" style="display:inline-block;margin-top:5px;font-size:10px;color:var(--gold);font-weight:700;">🗺️ Open in Google Maps</a>';
    h+='</div>';
  } else {
    h+='<div style="background:var(--panel);border-radius:8px;padding:10px 12px;text-align:center;">';
    h+='<div style="font-size:11px;color:var(--dimL);margin-bottom:6px;">Location not yet recorded</div>';
    h+='<button onclick="getMyLocation(function(){rMp();});" style="padding:6px 14px;background:var(--gold);border:none;border-radius:6px;color:#000;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">📍 Get My Location</button>';
    h+='</div>';
  }
  h+='</div>';

  // Team members locations — with online/offline status
  var teamKeys=Object.keys(TEAM_LOCS);
  var onlineCount=0;
  for(var tc=0;tc<teamKeys.length;tc++){
    if(TEAM_LOCS[teamKeys[tc]]&&isOnline(TEAM_LOCS[teamKeys[tc]].ts)) onlineCount++;
  }
  if(teamKeys.length>0){
    h+='<div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--dimL);">👥 Team Members ('+teamKeys.length+')</div>';
    h+='<div style="background:#06C98F22;border:1px solid #06C98F44;border-radius:12px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--green);">'+onlineCount+' Online Now</div>';
    h+='</div>';
    for(var ti=0;ti<teamKeys.length;ti++){
      var tm=TEAM_LOCS[teamKeys[ti]];
      if(!tm||!tm.lat) continue;
      var tmOnline=isOnline(tm.ts);
      var tmUrl=getGoogleMapsUrl(tm.lat,tm.lng);
      var tmTime=new Date(tm.ts);
      var tmTs=(tmTime.getHours()<10?"0"+tmTime.getHours():tmTime.getHours())+":"+(tmTime.getMinutes()<10?"0"+tmTime.getMinutes():tmTime.getMinutes());
      var tmAgo=Math.round((Date.now()-tm.ts)/60000);
      var tmAgoStr=tmAgo<1?"just now":tmAgo<60?tmAgo+"m ago":Math.round(tmAgo/60)+"h ago";
      var tmBorderCol=tmOnline?"var(--green)":"var(--border)";
      var tmStatusDot=tmOnline?'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#06C98F;margin-right:4px;box-shadow:0 0 6px #06C98F88;"></span>':'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:4px;"></span>';
      h+='<div style="background:var(--panel);border-radius:10px;padding:10px 14px;margin-bottom:8px;border-left:3px solid '+tmBorderCol+';">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">';
      h+='<div style="display:flex;align-items:center;">'+tmStatusDot+'<span style="font-size:12px;font-weight:700;color:var(--text);">'+teamKeys[ti]+'</span></div>';
      h+='<span style="font-size:9px;font-weight:700;color:'+(tmOnline?"var(--green)":"var(--dimL)")+';">'+(tmOnline?"🟢 Online":"⚫ "+tmAgoStr)+'</span>';
      h+='</div>';
      h+='<div style="font-size:10px;color:var(--dimL);margin-bottom:3px;">📍 '+tm.lat+', '+tm.lng+' (±'+tm.acc+'m)</div>';
      if(tm.lastAction) h+='<div style="font-size:10px;color:var(--dimL);margin-bottom:5px;">Last action: '+tm.lastAction+'</div>';
      h+='<div style="display:flex;gap:8px;">';
      h+='<a href="'+tmUrl+'" target="_blank" style="flex:1;text-align:center;padding:5px;background:var(--gold);border-radius:6px;font-size:10px;font-weight:700;color:#000;text-decoration:none;">🗺️ Google Maps</a>';
      h+='<button onclick="rMp();" style="flex:1;padding:5px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:10px;font-weight:700;color:var(--dimL);cursor:pointer;font-family:inherit;">🔄 Refresh</button>';
      h+='</div>';
      h+='</div>';
    }
    h+='</div>';
  } else {
    h+='<div style="text-align:center;padding:16px;">';
    h+='<div style="font-size:24px;margin-bottom:8px;">👥</div>';
    h+='<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;">No team members yet</div>';
    h+='<div style="font-size:11px;color:var(--dimL);">Share the app link with colleagues to see them here</div>';
    h+='</div>';
  }

  h+='</div>';


  document.getElementById("pg-mp").innerHTML=h;
}
</script>
<!-- Camera inputs — static in HTML, label-triggered (Android-safe) -->
<input type="file" accept="image/*" capture="environment" id="fr-cam-static" style="position:fixed;left:-9999px;opacity:0;width:1px;height:1px;" tabindex="-1">
<input type="file" accept="image/*" id="fr-gal-static" style="position:fixed;left:-9999px;opacity:0;width:1px;height:1px;" tabindex="-1">
</body>
</html>
