<style>
:root{
  --bg:#07090d; --card:#0d1117; --panel:#111827;
  --border:#1e2d3d; --gold:#D4A843; --goldL:#f0c96a;
  --text:#e8eaf0; --dimL:#8892a4; --dim:#4a5568;
  --green:#06D6A0; --blue:#58A6FF; --red:#E63946;
  --purple:#CE93D8; --orange:#FF9F1C;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; width:100%;
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden; position:fixed;
  -webkit-text-size-adjust:100%;
}

/* HEADER */
#hdr{
  background:linear-gradient(135deg,#07090d,#0d1420);
  border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,0) 14px 0;
  flex-shrink:0;
}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0 8px;}
.hdr-brand .title{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:.05em;}
.hdr-brand .sub{font-size:10px;color:var(--dimL);letter-spacing:.1em;text-transform:uppercase;}
.hdr-brand .name{font-size:10px;color:var(--gold);font-weight:700;margin-top:1px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
#clk{font-size:20px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
#cld{font-size:10px;color:var(--dimL);}
.hdr-btns{display:flex;gap:6px;align-items:center;}
#sync-dot{width:9px;height:9px;border-radius:50%;background:#555;flex-shrink:0;}
.btn-sm{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--dimL);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold);}

/* NAV */
#nav{
  display:flex; overflow-x:auto; gap:2px;
  padding:0 10px 10px; scrollbar-width:none;
}
#nav::-webkit-scrollbar{display:none;}
.nb{
  padding:7px 13px; border-radius:20px;
  border:1px solid transparent; background:transparent;
  color:var(--dim); font-size:11px; font-weight:700;
  cursor:pointer; white-space:nowrap; font-family:inherit;
  min-height:34px; flex-shrink:0;
}
.nb.on{background:var(--gold);color:#000;border-color:var(--gold);}

/* MAIN */
#main{
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:12px 12px calc(60px + env(safe-area-inset-bottom,0));
  -webkit-overflow-scrolling:touch;
}
.pg{display:none;}
.pg.on{display:block;}

/* CARDS */
.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:14px; margin-bottom:12px;
}
.ct{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:10px;}

/* FORM ELEMENTS */
label{display:block;font-size:11px;color:var(--dimL);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
input,select,textarea{
  display:block; width:100%; padding:11px 13px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px;
  font-family:inherit; margin-bottom:12px; outline:none;
  -webkit-appearance:none; appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
textarea{min-height:100px;resize:vertical;line-height:1.5;}

/* BUTTONS */
.btn{
  display:block; width:100%; padding:14px;
  border-radius:10px; border:none; font-size:14px;
  font-weight:800; cursor:pointer; font-family:inherit;
  letter-spacing:.03em; margin-bottom:10px;
}
.btn.gold{background:var(--gold);color:#000;}
.btn.sec{background:var(--panel);color:var(--dimL);border:1px solid var(--border);}

/* STATUS COLORS */
.s-complete{color:var(--green);}
.s-progress{color:var(--blue);}
.s-hold{color:var(--red);}
.s-notstart{color:var(--dim);}

/* TICKER */
#ticker{
  position:fixed; bottom:0; left:0; right:0;
  height:calc(48px + env(safe-area-inset-bottom,0));
  background:linear-gradient(90deg,#07090d,#0d1420,#07090d);
  border-top:1px solid var(--border);
  overflow:hidden; z-index:100;
}
#ticker-inner{
  display:flex; align-items:center;
  height:48px; white-space:nowrap;
  animation:scroll-left 40s linear infinite;
}
@keyframes scroll-left{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}
.t-badge{
  background:var(--gold); color:#000; font-size:10px;
  font-weight:900; padding:3px 8px; border-radius:4px;
  margin-right:12px; letter-spacing:.1em; flex-shrink:0;
}
.t-item{font-size:13px;color:var(--gold);margin-right:6px;flex-shrink:0;}
.t-sep{color:var(--dim);margin:0 10px;font-size:16px;flex-shrink:0;}

/* LAYOUT */
body{display:flex;flex-direction:column;}
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.kpi-val{font-size:22px;font-weight:900;line-height:1;}
.kpi-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;}

/* PROGRESS BAR */
.pbar-wrap{height:5px;background:var(--panel);border-radius:3px;overflow:hidden;margin:4px 0;}
.pbar{height:100%;border-radius:3px;transition:width .4s;}

/* STAGE ROW */
.stage-row{
  display:flex;align-items:center;gap:10px;
  padding:11px;border-radius:8px;margin-bottom:6px;
  cursor:pointer;transition:opacity .15s;
}
.stage-row:active{opacity:.7;}

/* MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.on{display:flex;}
#modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px 16px 0 0;width:100%;max-height:80vh;
  overflow-y:auto;padding:20px 16px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0));
}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}

/* PRINT */
@media print{
  #hdr,#nav,#ticker,.no-print,#modal-overlay{display:none!important;}
  #main{padding:0!important;overflow:visible!important;}
  body{position:static!important;overflow:auto!important;height:auto!important;}
  .pg{display:none!important;}
  #pg-dr{display:block!important;}
  .card{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;}
  *{color:#000!important;}
  .gold-text{color:#b8860b!important;}
}

/* RESPONSIVE */
@media(min-width:768px){
  #app{flex-direction:row;}
  #hdr{width:200px;min-height:100vh;flex-direction:column;border-right:1px solid var(--border);border-bottom:none;}
  #nav{flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:10px 10px;}
  .nb{text-align:left;}
  #main{flex:1;}
}
</style>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
var BRIDGES=[
  {id:"A",piers:["1A-ABT","1A","2A","3A","4A","5A","6A","7A","8A","9A","10A","10A-ABT"]},
  {id:"B",piers:["1B-ABT","1B","2B","3B","4B","5B","6B","7B","8B","9B","9B-ABT"]},
  {id:"C",piers:["1C-ABT","1C","2C","3C","4C","5C","6C","7C","8C","9C","10C","11C","11C-ABT"]},
  {id:"D",piers:["1D-ABT","1D","2D","3D","4D","5D","6D","7D","7D-ABT"]},
  {id:"E",piers:["1E","2E","3E","4E","5E","6E","7E","8E","9E","10E","11E","12E","13E","14E","15E","16E","17E"]},
  {id:"G",piers:["1G-ABT","1G","2G","3G","4G","5G","6G","7G","7G-ABT"]},
  {id:"K",piers:["1K-ABT","1K","2K","3K","4K","5K","5K-ABT"]},
  {id:"L",piers:["1L-ABT","2L-ABT"]},
  {id:"M",piers:["1ML-ABT","1MR-ABT","2ML-ABT","2MR-ABT"]},
  {id:"N",piers:["1NL-ABT","1NR-ABT","2NL-ABT","2NR-ABT"]}
];

var STAGES=[
  {id:"PRB",name:"Probing",            ar:"بروبنغ",       col:"#CE93D8",w:2},
  {id:"EXC",name:"Excavation",         ar:"حفرية",        col:"#FF9F1C",w:5},
  {id:"BLD",name:"Blinding",           ar:"بلايندنغ",     col:"#FFD166",w:3},
  {id:"FRB",name:"Foundation Rebar",   ar:"حديد أساس",    col:"#4CC9F0",w:8},
  {id:"FRC",name:"Foundation Concrete",ar:"خرسانة أساس",  col:"#7EE8FA",w:10},
  {id:"PIL",name:"Piling",             ar:"خوازيق",       col:"#58A6FF",w:18},
  {id:"STR",name:"Pier Structure",     ar:"جسم العامود",  col:"#2979FF",w:22},
  {id:"BRG",name:"Bearings",           ar:"بيرنغ",        col:"#9B5DE5",w:5},
  {id:"GRD",name:"Girder Supply",      ar:"توريد كمرات",  col:"#D4A843",w:14},
  {id:"ERE",name:"Girder Erection",    ar:"تركيب كمرات",  col:"#06D6A0",w:9},
  {id:"DEC",name:"Deck Slab",          ar:"بلاطة الجسر",  col:"#80ED99",w:4}
];

// Direct foundations (no piling)
var DIRECT=["1L-ABT","2L-ABT","1ML-ABT","1MR-ABT","2ML-ABT","2MR-ABT","1NL-ABT","1NR-ABT","2NL-ABT","2NR-ABT"];

// Road Widening — standalone for abutments of G,K,L,M,N
var EMB_PIERS=["1G-ABT","7G-ABT","1K-ABT","5K-ABT","1L-ABT","2L-ABT","1ML-ABT","1MR-ABT","2ML-ABT","2MR-ABT","1NL-ABT","1NR-ABT","2NL-ABT","2NR-ABT"];

var STATUS_LIST=["Not Started","In Progress","On Hold","Complete","Inspected"];
var SCOL={"Not Started":"#4a5568","In Progress":"#58A6FF","On Hold":"#E63946","Complete":"#06D6A0","Inspected":"#D4A843"};

// ═══════════════════════════════════════════════
// SHARED PROGRESS CALCULATION
// ═══════════════════════════════════════════════
function calcBrPct(brId){
  var br=null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===brId){br=BRIDGES[i];break;}}
  if(!br) return 0;
  var earned=0,totalW=0;
  for(var p=0;p<br.piers.length;p++){
    var pier=br.piers[p]; var isDr=DIRECT.indexOf(pier)>-1;
    for(var s=0;s<STAGES.length;s++){
      if(STAGES[s].id==="PIL"&&isDr) continue;
      var w=STAGES[s].w; if(isDr) w=Math.round(w*(100/82)*10)/10;
      totalW+=w;
      var sv=gps(pier,STAGES[s].id);
      if(sv==="Complete"||sv==="Inspected") earned+=w;
      else if(sv==="In Progress") earned+=w*0.5;
    }
    if(EMB_PIERS.indexOf(pier)>-1){
      totalW+=0.5;
      var ev=gps(pier,"EMB");
      if(ev==="Complete"||ev==="Inspected") earned+=0.5;
      else if(ev==="In Progress") earned+=0.25;
    }
  }
  return totalW>0?Math.round(earned/totalW*1000)/10:0;
}

function calcOverallPct(){
  // Project = Preliminary(7%) + Bridges(83%) + Roads(10%)
  // Preliminary is fixed baseline (fully done)
  var BR_WEIGHT=87; var ROAD_WEIGHT=6; var PRE_WEIGHT=PRE_PCT;
  // Adjust bridge weight if pre changes
  BR_WEIGHT=100-ROAD_WEIGHT-PRE_WEIGHT;
  // Bridges earned
  var brEarned=0,brTotal=0;
  for(var b=0;b<BRIDGES.length;b++){
    for(var p=0;p<BRIDGES[b].piers.length;p++){
      var pier=BRIDGES[b].piers[p]; var isDr=DIRECT.indexOf(pier)>-1;
      for(var s=0;s<STAGES.length;s++){
        if(STAGES[s].id==="PIL"&&isDr) continue;
        var w=STAGES[s].w; if(isDr) w=Math.round(w*(100/82)*10)/10;
        brTotal+=w;
        var sv=gps(pier,STAGES[s].id);
        if(sv==="Complete"||sv==="Inspected") brEarned+=w;
        else if(sv==="In Progress") brEarned+=w*0.5;
      }
      if(EMB_PIERS.indexOf(pier)>-1){
        brTotal+=0.5;
        var ev=gps(pier,"EMB");
        if(ev==="Complete"||ev==="Inspected") brEarned+=0.5;
        else if(ev==="In Progress") brEarned+=0.25;
      }
    }
  }
  var brPctVal=brTotal>0?(brEarned/brTotal):0;
  // Roads earned
  var roadEarned=(ROADS.ibn.pct/100*3)+(ROADS.sattam.pct/100*3);
  // Total
  var total=PRE_WEIGHT + (brPctVal*BR_WEIGHT) + roadEarned;
  return Math.round(total*10)/10;
}

function calcPierPct(pier){
  var isDr=DIRECT.indexOf(pier)>-1;
  var earned=0,total=0;
  for(var i=0;i<STAGES.length;i++){
    if(STAGES[i].id==="PIL"&&isDr) continue;
    var w=stageWeight(STAGES[i].id,isDr);
    total+=w;
    var sv=gps(pier,STAGES[i].id);
    if(sv==="Complete"||sv==="Inspected") earned+=w;
    else if(sv==="In Progress") earned+=w*0.5;
  }
  if(EMB_PIERS.indexOf(pier)>-1){
    total+=0.5;
    var ev=gps(pier,"EMB");
    if(ev==="Complete"||ev==="Inspected") earned+=0.5;
    else if(ev==="In Progress") earned+=0.25;
  }
  return total?Math.round(earned/total*1000)/10:0;
}

function p2(n){return n<10?"0"+n:""+n;}

function gps(pier,sid){return PS[pier]&&PS[pier][sid]?PS[pier][sid]:"Not Started";}

function stageWeight(sid,isDirect){
  if(sid==="PIL"&&isDirect) return 0;
  var base=0;
  for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===sid){base=STAGES[i].w;break;}}
  if(isDirect){
    var pilW=18; var total=100;
    return Math.round(base*(total/(total-pilW))*10)/10;
  }
  return base;
}

var EMB_WEIGHT=0.5;

function overall(){
  var earned=0,totalW=0;
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i];
    for(var j=0;j<br.piers.length;j++){
      var p=br.piers[j];
      var isDr=DIRECT.indexOf(p)>-1;
      for(var k=0;k<STAGES.length;k++){
        var sid=STAGES[k].id;
        if(sid==="PIL"&&isDr) continue;
        var w=stageWeight(sid,isDr);
        totalW+=w;
        var v=gps(p,sid);
        if(v==="Complete"||v==="Inspected") earned+=w;
        else if(v==="In Progress") earned+=w*0.5;
      }
      // Road Widening weight
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=EMB_WEIGHT;
        var ev=gps(p,"EMB");
        if(ev==="Complete"||ev==="Inspected") earned+=EMB_WEIGHT;
        else if(ev==="In Progress") earned+=EMB_WEIGHT*0.5;
      }
      // Road Widening 0.5% weight per EMB pier
      if(EMB_PIERS.indexOf(p)>-1){
        totalW+=0.5;
        var rv=gps(p,"EMB");
        if(rv==="Complete"||rv==="Inspected") earned+=0.5;
        else if(rv==="In Progress") earned+=0.25;
      }
    }
  }
  var pct=totalW?parseFloat((earned/totalW*100).toFixed(2)):0;
  return{earned:Math.round(earned),totalW:Math.round(totalW),pct:pct};
}

function brPct(brId){
  var br=null;
  for(var i=0;i<BRIDGES.length;i++){if(BRIDGES[i].id===brId){br=BRIDGES[i];break;}}
  if(!br) return 0;
  var earned=0,totalW=0;
  for(var j=0;j<br.piers.length;j++){
    var p=br.piers[j]; var isDr=DIRECT.indexOf(p)>-1;
    for(var k=0;k<STAGES.length;k++){
      var sid=STAGES[k].id;
      if(sid==="PIL"&&isDr) continue;
      var w=stageWeight(sid,isDr); totalW+=w;
      var v=gps(p,sid);
      if(v==="Complete"||v==="Inspected") earned+=w;
      else if(v==="In Progress") earned+=w*0.5;
    }
  }
  return totalW?parseFloat((earned/totalW*100).toFixed(1)):0;
}

function activP(){
  var n=0;
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i];
    for(var j=0;j<br.piers.length;j++){
      var p=br.piers[j]; var pst=PS[p]||{};
      var vals=Object.values(pst);
      if(vals.indexOf("In Progress")>-1||vals.indexOf("On Hold")>-1) n++;
    }
  }
  return n;
}

function pCol(pier){
  var any=false,allD=true,inP=false,hld=false;
  var isDr=DIRECT.indexOf(pier)>-1;
  for(var k=0;k<STAGES.length;k++){
    var sid=STAGES[k].id;
    if(sid==="PIL"&&isDr) continue;
    var v=gps(pier,sid);
    if(v==="Complete"||v==="Inspected") any=true; else allD=false;
    if(v==="In Progress") inP=true;
    if(v==="On Hold") hld=true;
  }
  // Also check EMB
  if(EMB_PIERS.indexOf(pier)>-1){
    var ev=gps(pier,"EMB");
    if(ev==="In Progress") inP=true;
    else if(ev==="Complete"){}
    else allD=false;
  }
  if(allD&&any) return"#06D6A0";
  if(inP) return"#58A6FF";
  if(any) return"#D4A843";
  if(hld) return"#E63946";
  return"#1a2233";
}

function nxt(v){
  var i=STATUS_LIST.indexOf(v);
  return STATUS_LIST[i<0?1:(i+1)%STATUS_LIST.length];
}

function flash(msg){
  var el=document.getElementById("flash-msg");

}

function formatDate(d){
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var dt=new Date(d+"T00:00:00");
  return days[dt.getDay()]+", "+dt.getDate()+" "+months[dt.getMonth()]+" "+dt.getFullYear();
}

function buildTicker(){
  var items=[];
  items.push({t:"TOTAL "+countAllPiers()+" PIERS",c:"#D4A843"});
  items.push({t:overall().pct+"% OVERALL PROGRESS",c:"#06D6A0"});
  items.push({t:activP()+" ACTIVE PIERS",c:"#58A6FF"});
  for(var i=0;i<BRIDGES.length;i++){
    var bp=brPct(BRIDGES[i].id);
    if(bp>0) items.push({t:"BR-"+BRIDGES[i].id+": "+bp+"%",c:"#D4A843"});
  }
  // Recent logs
  for(var j=LOGS.length-1;j>=Math.max(0,LOGS.length-3);j--){
    var stgN="";
    for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===LOGS[j].stage){stgN=STAGES[s].name;break;}}
    if(LOGS[j].stage==="EMB") stgN="Road Widening";
    items.push({t:"Pier "+LOGS[j].pier+" (Br-"+LOGS[j].bridge+") "+stgN+" "+LOGS[j].status,c:"#8892a4"});
  }
  var h='<span class="t-badge">📡 SITESYNC</span>';
  for(var k=0;k<items.length;k++){
    if(k>0) h+='<span class="t-sep">◆</span>';
    h+='<span class="t-item" style="color:'+items[k].c+';">'+items[k].t+'</span>';
  }
  document.getElementById("ticker-inner").innerHTML=h;
}

function countAllPiers(){
  var n=0;
  for(var i=0;i<BRIDGES.length;i++) n+=BRIDGES[i].piers.length;
  return n;
}

  for(var j=0;j<BRIDGES.length;j++){if(BRIDGES[j].id===curBr){curBrO=BRIDGES[j];break;}}
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">';
  if(curBrO){
    for(var k=0;k<curBrO.piers.length;k++){
      var pier=curBrO.piers[k];
      var dc=pCol(pier); var isSel=pier===curPier;
      var isDr=DIRECT.indexOf(pier)>-1;
      var hasEmb=EMB_PIERS.indexOf(pier)>-1;
      h+='<div onclick="sPier(\''+pier+'\')" style="padding:7px 5px;border-radius:8px;border:2px solid '+(isSel?dc:"var(--border)")+';background:var(--card);cursor:pointer;text-align:center;min-width:54px;">';
      h+='<div style="font-size:10px;font-weight:700;color:'+(isSel?"var(--gold)":"var(--dimL)")+';">'+pier+'</div>';
      if(isDr) h+='<div style="font-size:7px;color:var(--dim);">DIR</div>';
      // Stage dots
      h+='<div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px;">';
      for(var m=0;m<STAGES.length;m++){
        if(STAGES[m].id==="PIL"&&isDr) continue;
        var sv=gps(pier,STAGES[m].id);
        var done=sv==="Complete"||sv==="Inspected";
        var ip=sv==="In Progress";
        var dc2=done?STAGES[m].col:ip?STAGES[m].col+"66":"#1a2233";
        h+='<div style="width:7px;height:7px;border-radius:2px;background:'+dc2+'"></div>';
      }
      h+='</div>';
      // EMB badge
      if(hasEmb){
        var ev=gps(pier,"EMB");
        var ec=ev==="Complete"?"var(--green)":ev==="In Progress"?"var(--blue)":"#555";
        h+='<div style="font-size:7px;color:'+ec+';margin-top:2px;font-weight:700;">EMB</div>';
      }
      h+='</div>';
    }
  }
  h+='</div>';

  // Pier detail
  if(curPier){
    var isDr2=DIRECT.indexOf(curPier)>-1;
    var doneC=0;
    for(var n=0;n<STAGES.length;n++){
      if(STAGES[n].id==="PIL"&&isDr2) continue;
      var sv2=gps(curPier,STAGES[n].id);
      if(sv2==="Complete"||sv2==="Inspected") doneC++;
    }
    h+='<div class="card">';
    h+='<div style="margin-bottom:14px;">';
    h+='<div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;">Selected</div>';
    h+='<div style="font-size:22px;font-weight:800;color:var(--gold);">Pier '+curPier+'</div>';
    h+='<div style="font-size:11px;color:var(--dim);">Bridge '+curBr+' &mdash; '+(isDr2?"Direct Foundation":"Piled")+'  &mdash; '+doneC+'/'+(isDr2?STAGES.length-1:STAGES.length)+' stages done</div>';
    h+='</div>';

    for(var q=0;q<STAGES.length;q++){
      var s=STAGES[q];
      var dis=isDr2&&s.id==="PIL";
      var sv3=gps(curPier,s.id);
      var sc3=SCOL[sv3]||"#888";
      var sbg3=SBGC[sv3]||"#10161e";
      var nxtV=nxt(sv3);
      var ca=dis?"":'onclick="tStage(\''+curPier+'\',\''+s.id+'\')"';
      h+='<div '+ca+' style="display:flex;align-items:center;gap:9px;padding:11px;border-radius:8px;margin-bottom:6px;cursor:'+(dis?"default":"pointer")+';background:'+sbg3+';border:1px solid '+sc3+'33;opacity:'+(dis?.35:1)+';transition:opacity .15s;">';
      h+='<div style="width:9px;height:9px;border-radius:2px;background:'+s.col+';flex-shrink:0;"></div>';
      h+='<div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--text);">'+s.name+'</div>';
      h+='<div style="font-size:10px;color:var(--dim);">'+s.ar+(dis?" &mdash; N/A":" &mdash; tap: "+nxtV)+'</div></div>';
      h+='<div style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:9px;background:'+sc3+'22;color:'+sc3+';white-space:nowrap;">'+sv3+'</div>';
      h+='</div>';
    }

    // Road Widening — standalone
    if(EMB_PIERS.indexOf(curPier)>-1){
      var embV=gps(curPier,"EMB");
      var embSc=SCOL[embV]||"#888";
      var embBg=SBGC[embV]||"#10161e";
      h+='<div style="margin-top:12px;padding-top:12px;border-top:2px solid #D4A84333;">';
      h+='<div style="font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;margin-bottom:8px;">Road Widening</div>';
      h+='<div onclick="tEmb(\''+curPier+'\')" style="display:flex;align-items:center;gap:9px;padding:11px;border-radius:8px;cursor:pointer;background:'+embBg+';border:2px solid #D4A84344;">';
      h+='<div style="width:10px;height:10px;border-radius:2px;background:var(--gold);flex-shrink:0;"></div>';
      h+='<div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--text);">Road Widening</div>';
      h+='<div style="font-size:10px;color:var(--dim);">Tap to update &mdash; next: '+nxt(embV)+'</div></div>';
      h+='<div style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:9px;background:'+embSc+'22;color:'+embSc+';">'+embV+'</div>';
      h+='</div></div>';
    }
    h+='</div>';
  } else {
    h+='<div style="text-align:center;color:var(--dim);padding:22px;font-size:13px;">Tap a pier to manage its stages</div>';
  }

  document.getElementById("pg-tr").innerHTML=h;
}

function tStage(pier,sid){
  var cur=gps(pier,sid);
  var nv=nxt(cur);
  if(!PS[pier]) PS[pier]={};
  PS[pier][sid]=nv;
  var stgN="";
  for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===sid){stgN=STAGES[i].name;break;}}
  var br="";
  for(var j=0;j<BRIDGES.length;j++){
    if(BRIDGES[j].piers.indexOf(pier)>-1){br=BRIDGES[j].id;break;}
  }
  LOGS.push({id:Date.now(),date:td(),bridge:br,pier:pier,stage:sid,status:nv,notes:""});
  persist(); rTr(); buildTicker();
  flash(pier+" - "+stgN+": "+nv);
}

function tEmb(pier){
  var cur=gps(pier,"EMB");
  var nv=nxt(cur);
  if(!PS[pier]) PS[pier]={};
  PS[pier]["EMB"]=nv;
  var br="";
  for(var j=0;j<BRIDGES.length;j++){
    if(BRIDGES[j].piers.indexOf(pier)>-1){br=BRIDGES[j].id;break;}
  }
  LOGS.push({id:Date.now(),date:td(),bridge:br,pier:pier,stage:"EMB",status:nv,notes:"Road Widening"});
  persist(); rTr(); buildTicker();
  flash("Road Widening: "+nv);
}

function lgUpdPiers(){
  var br=document.getElementById("lg-br").value;

  for(var i=0;i<BRIDGES.length;i++){

        o.value=BRIDGES[i].piers[j]; o.textContent=BRIDGES[i].piers[j];
        sel.appendChild(o);
      }
      break;
    }
  }

function addLog(){

function addDrEmail(){
  var inp=document.getElementById("dr-email-input");
  var em=inp.value.trim();
  if(!em||em.indexOf("@")<0){flash("Enter a valid email");return;}
  if(DR_EMAILS.indexOf(em)>-1){flash("Already added");return;}
  DR_EMAILS.push(em);
  try{localStorage.setItem("ic1_dr_emails",JSON.stringify(DR_EMAILS));}catch(e){}
  inp.value=""; rDr(); flash("Email added");
}

function removeDrEmail(i){
  DR_EMAILS.splice(i,1);
  try{localStorage.setItem("ic1_dr_emails",JSON.stringify(DR_EMAILS));}catch(e){}
  rDr();
}

function emailReport(){
  var recipients=getSelectedContacts("dr");
  if(recipients.length===0){flash("Select at least one recipient");return;}
  var today=td(); var ov=overall();
  var todayLogs=LOGS.filter(function(l){return l.date===today;});
  var subj="IC1 Bridges - Daily Progress Report - "+formatDate(today);
  var body="Dear Team,\n\nDaily Progress Report for IC1 Bridges.\n\n";
  body+="Date: "+formatDate(today)+"\n";
  body+="Overall Progress: "+ov.pct+"%\n";
  body+="Active Piers: "+activP()+"\n\n";
  body+="TODAY'S ACTIVITIES:\n";
  if(todayLogs.length===0){body+="No activities logged today.\n";}
  else{
    for(var i=0;i<todayLogs.length;i++){
      var stgN3="";
      for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===todayLogs[i].stage){stgN3=STAGES[s].name;break;}}
      if(todayLogs[i].stage==="EMB") stgN3="Road Widening";
      body+="- "+todayLogs[i].pier+" (Br-"+todayLogs[i].bridge+"): "+stgN3+" - "+todayLogs[i].status+"\n";
    }
  }
  body+="\nBRIDGE PROGRESS:\n";
  for(var bi=0;bi<BRIDGES.length;bi++){
    var bp3=brPct(BRIDGES[bi].id);
    if(bp3>0) body+="Bridge "+BRIDGES[bi].id+": "+bp3+"%\n";
  }
  body+="\nPrepared by: Kamel Dimachkie - Head of Surveying\nKhatib & Alami - SiteSync Bridges";
  var ml="mailto:"+recipients.join(",")+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
  window.location.href=ml;
  flash("Opening email app...");
}

  if(!ANTHROPIC_KEY||ANTHROPIC_KEY.length<10){flash("Save your API key first");btn.textContent="EXTRACT WITH AI";btn.disabled=false;return;}
  fetch("https://api.anthropic.com/v1/messages",{

function confirmImport(){

    var stgN=""; for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===it.stage){stgN=STAGES[s].name;break;}}

function rIs(){

      h+='<div style="flex:1;">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--gold);">Bridge '+iss.bridge+' &mdash; '+iss.date+'</div>';
      h+='<div style="font-size:12px;color:var(--dimL);margin-top:2px;">'+iss.desc+'</div>';
      h+='</div>';
      h+='<span onclick="delIssue('+j+')" style="color:var(--red);cursor:pointer;font-size:18px;padding:0 4px;">&times;</span>';

function addIssue(){
  var date=document.getElementById("is-date").value;
  var br=document.getElementById("is-br").value;
  var pri=document.getElementById("is-pri").value;
  var desc=document.getElementById("is-desc").value.trim();
  if(!desc){flash("Please describe the issue");return;}
  ISSUES.push({id:Date.now(),date:date,bridge:br,priority:pri,desc:desc});
  persist(); rIs(); flash("Issue logged");
}

function delIssue(i){
  ISSUES.splice(i,1); persist(); rIs();
}

function setSyncDot(state){
  var dot=document.getElementById("sync-dot");
  if(state==="ok") dot.style.background="#06D6A0";
  else if(state==="sync") dot.style.background="#D4A843";
  else dot.style.background="#555";
}

function openSync(){
  var h='<div class="ct">Team Sync</div>';
  h+='<div style="font-size:12px;color:var(--dimL);margin-bottom:14px;line-height:1.6;">Connect to Google Apps Script to sync with your team in real time.</div>';
  h+='<label>Apps Script Web App URL</label>';
  h+='<input type="url" id="as-url-inp" placeholder="https://script.google.com/macros/s/..." value="'+AS_URL+'">';
  h+='<button class="btn gold" onclick="connectAs()">CONNECT</button>';
  if(AS_CONNECTED) h+='<button class="btn sec" onclick="disconnectAs()">DISCONNECT</button>';
  h+='<div style="font-size:10px;color:var(--dim);margin-top:8px;">Status: '+(AS_CONNECTED?'<span style="color:var(--green);">Connected</span>':'<span style="color:var(--dim);">Not connected</span>')+'</div>';
  openModal(h);
}

function connectAs(){
  var url=document.getElementById("as-url-inp").value.trim();
  if(!url||url.indexOf("script.google.com")<0){flash("Please enter a valid Apps Script URL");return;}
  AS_URL=url; AS_CONNECTED=true;
  try{localStorage.setItem(AS_URL_KEY,AS_URL);}catch(e){}
  setSyncDot("ok");
  if(asTimer) clearInterval(asTimer);
  asTimer=setInterval(pullSync,30000);
  closeModal(); flash("Connected to team sync!");
}

function disconnectAs(){
  AS_CONNECTED=false; AS_URL="";
  try{localStorage.removeItem(AS_URL_KEY);}catch(e){}
  if(asTimer) clearInterval(asTimer);
  setSyncDot(""); closeModal(); flash("Disconnected");
}

function pushSync(){
  if(!AS_CONNECTED||!AS_URL) return;
  setSyncDot("sync");
  var payload={ps:PS,logs:LOGS,issues:ISSUES,ts:Date.now()};
  fetch(AS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
  .then(function(){setSyncDot("ok");})
  .catch(function(){setSyncDot("");});
}

function pullSync(){
  if(!AS_CONNECTED||!AS_URL) return;
  setSyncDot("sync");
  var xhr=new XMLHttpRequest();
  xhr.open("GET",AS_URL+"?action=get",true);
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText);
      if(d.ps) PS=d.ps;
      if(d.logs) LOGS=d.logs;
      persist(); setSyncDot("ok");
    }catch(e){setSyncDot("");}
  };
  xhr.onerror=function(){setSyncDot("");};
  xhr.send();
}

function getWeekRange(){
  var now=new Date();
  var day=now.getDay(); // 0=Sun
  var diff=now.getDate()-day+(day===0?-6:1); // Monday
  var mon=new Date(now.setDate(diff));
  var sun=new Date(mon); sun.setDate(mon.getDate()+6);
  var fmt=function(d){return d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1)+"-"+(d.getDate()<10?"0":"")+d.getDate();};
  return{start:fmt(mon),end:fmt(sun)};
}

function getMonthRange(){
  var now=new Date();
  var y=now.getFullYear(); var m=now.getMonth();
  var start=y+"-"+(m<9?"0":"")+(m+1)+"-01";
  var lastDay=new Date(y,m+1,0).getDate();
  var end=y+"-"+(m<9?"0":"")+(m+1)+"-"+lastDay;
  var mNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return{start:start,end:end,name:mNames[m]+" "+y};
}

function buildBridgeSummaryTable(){
  var h='<div class="card"><div class="ct">Bridge Status Summary</div>';

  h+='<tr style="border-bottom:2px solid var(--gold);"><th style="text-align:left;padding:6px;color:var(--gold);">Bridge</th><th style="padding:6px;color:var(--gold);text-align:center;">Piers</th><th style="padding:6px;color:var(--gold);text-align:center;">Active</th><th style="padding:6px;color:var(--gold);text-align:right;">Progress</th></tr>';
  for(var i=0;i<BRIDGES.length;i++){
    var br=BRIDGES[i]; var bp=brPct(br.id);
    var bAct=0;
    for(var pi=0;pi<br.piers.length;pi++){
      var pst=PS[br.piers[pi]]||{};

function buildEmailBody(logs){
  var body="ACTIVITIES:\n";
  if(logs.length===0){body+="No activities logged.\n";}
  else{
    for(var i=0;i<logs.length;i++){
      var stgN=""; for(var s=0;s<STAGES.length;s++){if(STAGES[s].id===logs[i].stage){stgN=STAGES[s].name;break;}}
      if(logs[i].stage==="EMB") stgN="Road Widening";
      body+="- "+logs[i].date+" | "+logs[i].pier+" (Br-"+logs[i].bridge+"): "+stgN+" - "+logs[i].status+"\n";
    }
  }
  body+="\nBRIDGE PROGRESS:\n";
  for(var j=0;j<BRIDGES.length;j++){
    var bp=brPct(BRIDGES[j].id);
    if(bp>0) body+="Bridge "+BRIDGES[j].id+": "+bp+"%\n";
  }
  body+="\nPrepared by: Kamel Dimachkie - Head of Surveying - Khatib & Alami\nSiteSync — Bridges, Diriyah, Saudi Arabia";
  return body;
}

function addContact(rt){
  var name=document.getElementById("ct-name-"+rt).value.trim();
  var email=document.getElementById("ct-email-"+rt).value.trim();
  if(!name||!email||email.indexOf("@")<0){flash("Enter valid name and email");return;}
  CONTACTS.push({name:name,email:email});
  saveContacts();
  flash("Contact added: "+name);
  // Refresh current report
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function delContact(i,rt){
  CONTACTS.splice(i,1); saveContacts();
  if(rt==="dr") rDr();
  else if(rt==="wr") rWr();
  else if(rt==="mr") rMr();
}

function selAllContacts(rt){
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk) chk.checked=true;
  }
}

function getSelectedContacts(rt){
  var out=[];
  for(var i=0;i<CONTACTS.length;i++){
    var chk=document.getElementById("ct-chk-"+rt+"-"+i);
    if(chk&&chk.checked) out.push(CONTACTS[i].email);
  }
  // Also include DR_EMAILS for backward compat
  for(var j=0;j<DR_EMAILS.length;j++){
    if(out.indexOf(DR_EMAILS[j])<0) out.push(DR_EMAILS[j]);
  }
  return out;
}

function copyEmails(rt){
  // Select all first
  selAllContacts(rt);
  var all=[];
  for(var i=0;i<CONTACTS.length;i++) all.push(CONTACTS[i].email);
  for(var j=0;j<DR_EMAILS.length;j++){
    if(all.indexOf(DR_EMAILS[j])<0) all.push(DR_EMAILS[j]);
  }
  if(all.length===0){flash("No contacts to copy");return;}
  var txt=all.join(", ");
  // Try modern clipboard API first
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){
      flash("Copied "+all.length+" emails to clipboard!");
    }).catch(function(){
      fallbackCopy(txt,all.length);
    });
  } else {
    fallbackCopy(txt,all.length);
  }
}

function fallbackCopy(txt,count){
  var ta=document.createElement("textarea");
  ta.value=txt;
  ta.style.position="fixed";
  ta.style.opacity="0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{
    document.execCommand("copy");
    flash("Copied "+count+" emails — paste into your mail app To: field");
  }catch(e){
    flash("Copy failed — try selecting manually");
  }
  document.body.removeChild(ta);
}

function elUpdPiers(){
  var br = document.getElementById("el-br").value;
  var sel = document.getElementById("el-pier"); sel.innerHTML = "";
  for(var i=0;i<BRIDGES.length;i++){
    if(BRIDGES[i].id===br){
      for(var j=0;j<BRIDGES[i].piers.length;j++){
        var o = document.createElement("option");
        o.value = BRIDGES[i].piers[j]; o.textContent = BRIDGES[i].piers[j];
        sel.appendChild(o);
      }
      break;
    }
  }
}

function saveEditLog(id){
  var date   = document.getElementById("el-date").value;
  var br     = document.getElementById("el-br").value;
  var pier   = document.getElementById("el-pier").value;
  var stage  = document.getElementById("el-stage").value;
  var status = document.getElementById("el-status").value;
  var notes  = document.getElementById("el-notes").value;

  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){
      LOGS[i].date=date; LOGS[i].bridge=br; LOGS[i].pier=pier;
      LOGS[i].stage=stage; LOGS[i].status=status; LOGS[i].notes=notes;
      break;
    }
  }
  // Also update PS
  if(!PS[pier]) PS[pier]={};
  PS[pier][stage]=status;
  persist();
  closeModal();
  flash("Log entry updated");
  rLg();
}

function deleteLog(id){
  if(!confirm("Delete this log entry?")) return;
  for(var i=0;i<LOGS.length;i++){
    if(LOGS[i].id===id){ LOGS.splice(i,1); break; }
  }
  persist();
  closeModal();
  flash("Entry deleted");
  rLg();
}

function rGnSCurve(hPrefix){
  var h=hPrefix||'';
  var ov=calcOverallPct();

  // Build S-curve data: planned vs actual per month
  var months=["Jun'25","Jul","Aug","Sep","Oct","Nov","Dec","Jan'26","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan'27","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep'27"];
  // Planned curve (linear for now — can be loaded from P6 later)
  var planned=[0,1,2,3,4,5,6,7,10,14,18,23,28,34,41,48,55,62,68,74,79,84,88,92,95,97,99,100];
  // Actual: read from saved S-curve data
  var SCA={};
  try{ SCA=JSON.parse(localStorage.getItem("ic1b3_sca")||"{}"); }catch(e){}

  var actual=[];
  for(var mi=0;mi<months.length;mi++){
    var key=months[mi].replace("'","");
    if(SCA[key]!==undefined) actual.push(SCA[key]);
    else actual.push(null);
  }
  // Fill last known actual up to today
  var lastKnown=null;
  for(var ai=0;ai<actual.length;ai++){
    if(actual[ai]!==null) lastKnown=actual[ai];
  }

  var W=320; var H=180; var PAD=36;
  var chartW=W-PAD-8; var chartH=H-PAD-16;

  function px(i){ return PAD+Math.round(i/(months.length-1)*chartW); }
  function py(v){ return (H-PAD)-Math.round(v/100*chartH); }

  h+='<div class="card">';
  h+='<div class="ct">S-Curve — Planned vs Actual</div>';
  h+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:500px;display:block;margin:0 auto;">';

  // Grid lines
  for(var g=0;g<=4;g++){
    var gv=g*25; var gy=py(gv);
    h+='<line x1="'+PAD+'" y1="'+gy+'" x2="'+(PAD+chartW)+'" y2="'+gy+'" stroke="#ffffff0a" stroke-width="1"/>';
    h+='<text x="'+(PAD-4)+'" y="'+(gy+3)+'" text-anchor="end" font-size="7" fill="#4a6a8a">'+gv+'</text>';
  }
  // Month labels (every 4)
  for(var ml=0;ml<months.length;ml+=4){
    var lx=px(ml);
    h+='<line x1="'+lx+'" y1="'+(H-PAD)+'" x2="'+lx+'" y2="'+(H-PAD+3)+'" stroke="#4a6a8a" stroke-width="1"/>';
    h+='<text x="'+lx+'" y="'+(H-PAD+10)+'" text-anchor="middle" font-size="7" fill="#4a6a8a">'+months[ml]+'</text>';
  }
  // Axes
  h+='<line x1="'+PAD+'" y1="'+(H-PAD)+'" x2="'+(PAD+chartW)+'" y2="'+(H-PAD)+'" stroke="#2a3a54" stroke-width="1.5"/>';
  h+='<line x1="'+PAD+'" y1="16" x2="'+PAD+'" y2="'+(H-PAD)+'" stroke="#2a3a54" stroke-width="1.5"/>';

  // Planned curve (dashed gold)
  var planPath="M";
  for(var pi2=0;pi2<planned.length;pi2++){
    planPath+=(pi2>0?" L":"")+px(pi2)+" "+py(planned[pi2]);
  }
  h+='<path d="'+planPath+'" stroke="#D4A843" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.7"/>';

  // Planned fill
  var planFill=planPath+" L"+(PAD+chartW)+" "+(H-PAD)+" L"+PAD+" "+(H-PAD)+" Z";
  h+='<path d="'+planFill+'" fill="#D4A84312"/>';

  // Actual curve (solid blue/green)
  var actPts=[];
  for(var ai2=0;ai2<actual.length;ai2++){
    if(actual[ai2]!==null) actPts.push({x:px(ai2),y:py(actual[ai2])});
  }
  // Add current overall as latest point
  var todayMIdx=Math.min(months.length-1, Math.floor((new Date()-new Date("2025-06-01"))/(30*86400000)));
  actPts.push({x:px(todayMIdx),y:py(ov)});

  if(actPts.length>1){
    var actPath="M"+actPts[0].x+" "+actPts[0].y;
    for(var ap=1;ap<actPts.length;ap++) actPath+=" L"+actPts[ap].x+" "+actPts[ap].y;
    h+='<path d="'+actPath+'" stroke="#06D6A0" stroke-width="2" fill="none" stroke-linecap="round"/>';
    // Dot at latest
    var last=actPts[actPts.length-1];
    h+='<circle cx="'+last.x+'" cy="'+last.y+'" r="4" fill="#06D6A0"/>';

        h+='</div>';
      }

  h+='</div>';

}

  }
  h+='<rect x="4" y="320" width="126" height="20" rx="4" fill="#0a0f16bb"/>';
  h+='<text x="10" y="334" font-size="9" font-weight="700" fill="'+ibnCol+'" font-family="Arial" letter-spacing="0.3">IBN SAUD ROAD</text>';
  h+='<rect x="498" y="320" width="138" height="20" rx="4" fill="#0a0f16bb"/>';
  h+='<text x="504" y="334" font-size="9" font-weight="700" fill="'+ibnCol+'" font-family="Arial">'+ibnPct+'%  '+ibnSt+'</text>';

  // Cross-streets linking all three roads
  var cxs=[50,150,250,350,450,570];
  for(var ci=0;ci<cxs.length;ci++){
    var cx=cxs[ci];
    h+='<line x1="'+cx+'" y1="104" x2="'+cx+'" y2="178" stroke="#1e2d3d" stroke-width="6"/>';
    h+='<line x1="'+cx+'" y1="222" x2="'+cx+'" y2="316" stroke="#1e2d3d" stroke-width="6"/>';
    h+='<line x1="'+cx+'" y1="104" x2="'+cx+'" y2="178" stroke="#ffffff08" stroke-width="3" stroke-dasharray="8,6"/>';
    h+='<line x1="'+cx+'" y1="222" x2="'+cx+'" y2="316" stroke="#ffffff08" stroke-width="3" stroke-dasharray="8,6"/>';
  }

  // Bridge nodes on King Khalid Road
  var BPOS=[
    {id:"A",x:72},{id:"B",x:130},{id:"C",x:190},{id:"D",x:252},
    {id:"E",x:304},{id:"G",x:344},{id:"K",x:406},{id:"L",x:454},
    {id:"M",x:496},{id:"N",x:546}
  ];
  for(var bi=0;bi<BRIDGES.length;bi++){
    var br=BRIDGES[bi];
    var bpos=null;
    for(var bpi=0;bpi<BPOS.length;bpi++){if(BPOS[bpi].id===br.id){bpos=BPOS[bpi];break;}}
    if(!bpos) continue;
    var pct=calcBrPct(br.id);
    var col=pct===100?"#06D6A0":pct>0?"#D4A843":"#3a4a5a";
    var bx=bpos.x;
    // Bridge span indicator
    h+='<rect x="'+(bx-8)+'" y="172" width="16" height="56" fill="'+col+'" opacity="0.1" rx="2"/>';
    h+='<line x1="'+bx+'" y1="158" x2="'+bx+'" y2="228" stroke="'+col+'" stroke-width="1.5" opacity="0.5"/>';
    h+='<line x1="'+(bx-8)+'" y1="172" x2="'+(bx+8)+'" y2="172" stroke="'+col+'" stroke-width="2.5" opacity="0.7"/>';
    h+='<line x1="'+(bx-8)+'" y1="222" x2="'+(bx+8)+'" y2="222" stroke="'+col+'" stroke-width="2.5" opacity="0.7"/>';
    // Circle
    h+='<circle cx="'+bx+'" cy="200" r="16" fill="'+col+'" opacity="0.2"/>';
    h+='<circle cx="'+bx+'" cy="200" r="12" fill="#0d1520" stroke="'+col+'" stroke-width="1.8"/>';
    h+='<text x="'+bx+'" y="204" text-anchor="middle" font-size="10" font-weight="900" fill="'+col+'" font-family="Arial">'+br.id+'</text>';
    // Pct below
    h+='<text x="'+bx+'" y="242" text-anchor="middle" font-size="8" font-weight="700" fill="'+col+'" font-family="Arial">'+pct+'%</text>';
    // Label above
    h+='<text x="'+bx+'" y="162" text-anchor="middle" font-size="7" fill="#4a6a8a" font-family="Arial">Br'+br.id+'</text>';
  }

  // Overall progress bar at top
  var ovW=Math.round(640*ov/100);
  h+='<rect x="0" y="0" width="640" height="5" fill="#0d1520"/>';
  h+='<rect x="0" y="0" width="'+ovW+'" height="5" fill="#D4A843" opacity="0.8"/>';
  h+='<rect x="2" y="1" width="78" height="14" rx="3" fill="#0a0f16bb"/>';
  h+='<text x="6" y="12" font-size="7" font-weight="700" fill="#D4A84399" font-family="Arial">PROJECT '+ov+'%</text>';

  // Legend
  h+='<rect x="8" y="362" width="260" height="50" rx="5" fill="#0d1520cc" stroke="#1e2d3d" stroke-width="1"/>';
  h+='<text x="16" y="375" font-size="7" font-weight="700" fill="#6b7a8d" font-family="Arial">LEGEND</text>';
  h+='<circle cx="22" cy="387" r="4" fill="#D4A843"/><text x="30" y="391" font-size="7" fill="#888" font-family="Arial">Bridge In Progress</text>';
  h+='<circle cx="120" cy="387" r="4" fill="#06D6A0"/><text x="128" y="391" font-size="7" fill="#888" font-family="Arial">Bridge Complete</text>';
  h+='<circle cx="210" cy="387" r="4" fill="#3a4a5a"/><text x="218" y="391" font-size="7" fill="#888" font-family="Arial">Not Started</text>';
  h+='<rect x="14" y="398" width="14" height="5" rx="2" fill="#58A6FF" opacity="0.5"/><text x="32" y="405" font-size="7" fill="#888" font-family="Arial">Road In Progress</text>';
  h+='<rect x="122" y="398" width="14" height="5" rx="2" fill="#06D6A0" opacity="0.5"/><text x="140" y="405" font-size="7" fill="#888" font-family="Arial">Road Complete</text>';

  // North arrow
  h+='<g transform="translate(614,385)">';
  h+='<circle r="16" fill="#0d1520" stroke="#1e2d3d" stroke-width="1"/>';
  h+='<text x="0" y="-2" text-anchor="middle" font-size="13" fill="#4a6a8a" font-family="Arial">&#8593;</text>';
  h+='<text x="0" y="10" text-anchor="middle" font-size="7" font-weight="700" fill="#6b7a8d" font-family="Arial">N</text>';
  h+='</g>';

  h+='</svg>';
  h+='</div></div>';

  // Bridge cards grid
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px;">';
  for(var bj=0;bj<BRIDGES.length;bj++){
    var brJ=BRIDGES[bj];
    var pctJ=calcBrPct(brJ.id);
    var colJ=pctJ===100?"var(--green)":pctJ>0?"var(--gold)":"var(--dim)";
    var activeCnt=0;
    for(var pp=0;pp<brJ.piers.length;pp++){
      var ppct=calcPierPct(brJ.piers[pp]);
      if(ppct>0&&ppct<100) activeCnt++;
    }
    h+='<div class="card" style="padding:12px;cursor:pointer;" onclick="nav(\'tr\');curBr=\''+brJ.id+'\';rTr();">';
    h+='<div style="font-size:22px;font-weight:900;color:'+colJ+';">'+pctJ+'%</div>';
    h+='<div style="font-size:13px;font-weight:700;color:var(--gold);">Bridge '+brJ.id+'</div>';
    h+='<div style="font-size:10px;color:var(--dimL);">'+brJ.piers.length+' piers · '+activeCnt+' active</div>';
    h+='<div class="pbar-wrap" style="margin:6px 0;"><div class="pbar" style="width:'+pctJ+'%;background:'+colJ+';"></div></div>';
    h+='</div>';
  }
  // Road cards
  h+='<div style="display:flex;gap:8px;margin-top:10px;">';
  var mpRds=[{key:"ibn",lbl:"Ibn Saud Road",icon:"🛣"},{key:"sattam",lbl:"Prince Sattam Road",icon:"🛤"}];
  for(var ri=0;ri<mpRds.length;ri++){
    var rk=mpRds[ri].key; var rl=mpRds[ri].icon;
    var rp=ROADS[rk].pct||0; var rs=ROADS[rk].status||"Not Started";
    var rc=rs==="Complete"?"var(--green)":rs==="In Progress"?"var(--blue)":rs==="On Hold"?"var(--red)":"var(--dim)";
    h+='<div class="card" style="flex:1;padding:12px;cursor:pointer;border-top:2px solid var(--blue);" onclick="nav(\'rd\');rRd();">';
    h+='<div style="font-size:15px;">'+rl+'</div>';
    h+='<div style="font-size:11px;font-weight:700;color:var(--blue);margin:2px 0;">'+mpRds[ri].lbl+'</div>';
    h+='<div style="font-size:24px;font-weight:900;color:'+rc+';">'+rp+'%</div>';
    h+='<div style="height:4px;background:var(--panel);border-radius:2px;margin:5px 0;"><div style="width:'+rp+'%;height:100%;background:var(--blue);border-radius:2px;"></div></div>';
    h+='<div style="font-size:10px;color:'+rc+';">'+rs+'</div>';
    h+='</div>';
  }
  h+='</div>';
  h+='</div>';

  document.getElementById("pg-mp").innerHTML=h;
}
</script>
</body>
</html>
